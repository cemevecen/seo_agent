name: Deploy Health Check

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:
    inputs:
      force_alert:
        description: "true: deploy SUCCESS olsa bile sahte alert mail gönder (test için)"
        type: boolean
        default: false

permissions:
  contents: read

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  PROJECT_ID: eb62c02c-f447-4279-b87e-e09114ba4d26
  SERVICE_ID: b3660507-c346-48ec-8062-e464d1df9ce9
  ENVIRONMENT_ID: c16602df-5fc0-4f3d-9a82-d277979d3e71
  SMTP_HOST: smtp.gmail.com
  SMTP_PORT: '587'
  MAIL_FROM: cemevecen@nokta.com
  MAIL_TO: cemevecen@nokta.com

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy + runtime errors, alert if any
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FORCE_ALERT: ${{ inputs.force_alert && 'true' || 'false' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import os, json, re, ssl, smtplib, urllib.request
          from datetime import datetime, timedelta, timezone
          from email.message import EmailMessage

          # ─────────────────────────────────────────────────────────────
          # 1) Yardımcılar: Railway API
          # ─────────────────────────────────────────────────────────────
          API = "https://backboard.railway.app/graphql/v2"
          TOKEN = os.environ["RAILWAY_TOKEN"]

          UA = "seo-agent-deploy-monitor/1.0 (+github-actions)"

          def graphql(query: str) -> dict:
              data = json.dumps({"query": query}).encode()
              req = urllib.request.Request(
                  API, data=data,
                  headers={
                      "Authorization": f"Bearer {TOKEN}",
                      "Content-Type": "application/json",
                      "User-Agent": UA,
                  },
              )
              with urllib.request.urlopen(req, timeout=25) as r:
                  return json.loads(r.read().decode("utf-8"), strict=False)

          def fetch_latest_deployment() -> dict:
              q = (
                  '{ deployments(first: 1, input: { '
                  f'projectId: "{os.environ["PROJECT_ID"]}", '
                  f'serviceId: "{os.environ["SERVICE_ID"]}", '
                  f'environmentId: "{os.environ["ENVIRONMENT_ID"]}" '
                  '}) { edges { node { id status createdAt staticUrl meta } } } }'
              )
              edges = graphql(q)["data"]["deployments"]["edges"]
              if not edges:
                  raise RuntimeError("Hiç deployment bulunamadı")
              return edges[0]["node"]

          def fetch_error_logs(dep_id: str, limit: int = 150) -> list[dict]:
              q = (
                  f'{{ deploymentLogs(deploymentId: "{dep_id}", limit: {limit}, '
                  f'filter: "@level:error") {{ timestamp message severity }} }}'
              )
              return graphql(q)["data"].get("deploymentLogs", []) or []

          # ─────────────────────────────────────────────────────────────
          # 2) Türkçe status etiketleri
          # ─────────────────────────────────────────────────────────────
          TR_STATUS = {
              "SUCCESS": "Başarılı",
              "FAILED": "Başarısız",
              "CRASHED": "Çöktü",
              "BUILD_FAILED": "Build başarısız",
              "DEPLOY_FAILED": "Deploy başarısız",
              "BUILDING": "Build oluyor",
              "DEPLOYING": "Deploy oluyor",
              "REMOVED": "Kaldırıldı",
              "INITIALIZING": "Başlatılıyor",
              "QUEUED": "Sırada",
              "SKIPPED": "Atlandı",
          }
          BAD_DEPLOY = {"FAILED", "CRASHED", "BUILD_FAILED", "DEPLOY_FAILED"}

          # ─────────────────────────────────────────────────────────────
          # 3) Statik hata pattern'leri (Türkçe açıklama)
          # ─────────────────────────────────────────────────────────────
          PATTERNS = [
              (r"(read )?time(d)? ?out|TimeoutError|ETIMEDOUT",
               "Dış servise istek zaman aşımına uğradı — üçüncü taraf yavaş ya da cevap vermiyor."),
              (r"psycopg2|OperationalError|connection (lost|refused|reset).*postgres|could not connect to server",
               "PostgreSQL bağlantı sorunu — DB restart, max connection limiti veya network kesintisi olabilir."),
              (r"psycopg2.errors\.|IntegrityError|UniqueViolation|ForeignKeyViolation",
               "PostgreSQL veri bütünlüğü hatası — migration/constraint eksik olabilir."),
              (r"redis|connection refused.*6379",
               "Redis bağlantısı kurulamadı — service down ya da REDIS_URL yanlış."),
              (r"exited with code 1|Worker process exited|SIGKILL|SIGTERM",
               "Process beklenmedik şekilde sonlandı — yakalanmamış exception veya OOM olabilir."),
              (r"out of memory|MemoryError|OOMKilled|Cannot allocate memory",
               "Bellek tükendi — Railway planını ya da kodda memory leak'i kontrol et."),
              (r"ModuleNotFoundError|ImportError|No module named",
               "Python paket eksik — requirements.txt veya import path'i kontrol et."),
              (r"address already in use|port \d+ is already",
               "Port çakışması — eski instance hala bağlı olabilir, redeploy gerekebilir."),
              (r"healthcheck|/health.*(failed|timeout)|Healthcheck failed",
               "Sağlık kontrolü başarısız — /health endpoint cevap vermiyor ya da app boot olmadı."),
              (r"oauth.*(refresh|expired|invalid_grant)|invalid_grant|RefreshError|token (expired|invalid)",
               "OAuth token yenilenemedi — refresh token geçersiz, yeniden bağlantı gerek."),
              (r"401|Unauthorized|forbidden|permission denied|403",
               "Yetkilendirme hatası — token/API key/izinler kontrol edilmeli."),
              (r"5\d\d|bad gateway|service unavailable",
               "Upstream/dış servis 5xx döndü — geçici hata, retry gerekebilir."),
              (r"SSLError|certificate|SSL handshake",
               "SSL/TLS hatası — sertifika geçersiz ya da eksik."),
              (r"BOT haftalık|boxofficeturkiye|fetch hatası",
               "Bot dış siteye erişemedi — kaynak site down ya da network engeli."),
              (r"GA4|Google Analytics|search.*console|googleapis",
               "Google API hatası — quota dolmuş ya da credentials geçersiz olabilir."),
              (r"PageSpeed|pagespeedonline",
               "PageSpeed API hatası — quota veya geçici Google hatası."),
              (r"rate limit|429|too many requests",
               "Rate limit aşıldı — quota cooldown'a girmiş olabilir."),
              (r"Migration|alembic|relation.*does not exist",
               "DB şeması güncel değil — alembic migration eksik olabilir."),
              (r"DNS|NXDOMAIN|getaddrinfo",
               "DNS çözümlenemedi — host yanlış veya internet kesintisi."),
              (r"build (failed|error)|nixpacks|docker build",
               "Build aşamasında hata — Dockerfile/dependencies kontrol edilmeli."),
              (r"SMTPException|SMTPAuthenticationError|smtp.*fail",
               "SMTP gönderim hatası — kimlik/quota/host kontrol edilmeli."),
              (r"yenileme|refresh.*fail|scheduled.*refresh.*error",
               "Yenileme job'ı hata verdi — kaynak servis veya iç scheduler kontrol."),
          ]

          def static_explain(line: str):
              for pat, desc in PATTERNS:
                  if re.search(pat, line, re.IGNORECASE):
                      return desc
              return None

          # ─────────────────────────────────────────────────────────────
          # 4) AI analiz (Gemini → Groq) — sorun + anlam + çözüm
          # ─────────────────────────────────────────────────────────────
          def _parse_arr(text: str):
              t = text.strip()
              if t.startswith("```"):
                  t = re.sub(r"^```(?:json)?\s*", "", t)
                  t = re.sub(r"\s*```$", "", t)
              m = re.search(r"\[.*\]", t, re.DOTALL)
              if not m:
                  return None
              try:
                  arr = json.loads(m.group(0))
                  return arr if isinstance(arr, list) else None
              except json.JSONDecodeError:
                  return None

          AI_SYSTEM = (
              "Sen Railway'de çalışan bir FastAPI + PostgreSQL + APScheduler tabanlı SEO/analitik "
              "panelinin senior DevOps mühendisisin. Proje: cemevecen/seo_agent. Servisler arası: "
              "Search Console, GA4, PageSpeed, CrUX, Gmail Inbox, OAuth, SMTP (Gmail Workspace). "
              "Hata loglarına bakıp pratik çözüm verirsin; genel-geçer 'kontrol et' demezsin, "
              "spesifik dosya/env/komut adı verirsin."
          )

          AI_PROMPT_TEMPLATE = (
              "Aşağıdaki Railway hata loglarını analiz et. Her satır için TÜRKÇE bir JSON object dön:\n"
              "{\n"
              '  "sorun": "tek cümle: log satırında somut olarak ne oldu",\n'
              '  "anlam": "tek cümle: uygulamaya/kullanıcıya etkisi",\n'
              '  "cozum": ["somut adım 1", "somut adım 2", ...]  (1-3 madde, her madde tek cümle)\n'
              "}\n\n"
              "Kurallar:\n"
              "- Tahmin yapma, log'ta gözüken bilgiyi kullan.\n"
              "- 'Logları kontrol et' / 'incele' gibi boş tavsiye verme.\n"
              "- Mümkünse env değişkeni adı, dosya yolu (services/x.py), komut, yada Railway/Google dashboard adımı söyle.\n"
              "- Hata geçici görünüyorsa (timeout, 5xx) bunu söyle ve 'genelde retry ile düzelir' de.\n\n"
              "Sıralı loglar:\n__LOGS__\n\n"
              'Yalnızca JSON array dön (markdown bloksuz veya bloklu farketmez): [{"sorun":...,"anlam":...,"cozum":[...]}]'
          )

          def _build_prompt(lines: list[str]) -> str:
              numbered = "\n".join(f"{i+1}. {ln}" for i, ln in enumerate(lines))
              return AI_PROMPT_TEMPLATE.replace("__LOGS__", numbered)

          def _normalize_entry(e) -> dict:
              if not isinstance(e, dict):
                  return {"sorun": str(e), "anlam": "", "cozum": []}
              sorun = str(e.get("sorun") or "").strip()
              anlam = str(e.get("anlam") or "").strip()
              cozum = e.get("cozum") or []
              if isinstance(cozum, str):
                  cozum = [cozum]
              cozum = [str(c).strip() for c in cozum if str(c).strip()]
              return {"sorun": sorun, "anlam": anlam, "cozum": cozum[:4]}

          def ai_explain_batch(lines: list[str]) -> dict[str, dict]:
              if not lines:
                  return {}
              prompt = _build_prompt(lines)

              g = (os.environ.get("GEMINI_API_KEY") or "").strip()
              if g:
                  try:
                      url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={g}"
                      payload = {
                          "systemInstruction": {"parts": [{"text": AI_SYSTEM}]},
                          "contents": [{"parts": [{"text": prompt}]}],
                          "generationConfig": {"temperature": 0.3, "maxOutputTokens": 2000},
                      }
                      data = json.dumps(payload).encode()
                      req = urllib.request.Request(url, data=data, headers={"Content-Type": "application/json", "User-Agent": UA})
                      with urllib.request.urlopen(req, timeout=45) as r:
                          resp = json.load(r)
                      text = resp["candidates"][0]["content"]["parts"][0]["text"]
                      arr = _parse_arr(text)
                      if arr and len(arr) == len(lines):
                          print(f"[AI] Gemini OK ({len(arr)} açıklama)")
                          return {ln: _normalize_entry(e) for ln, e in zip(lines, arr)}
                      else:
                          print(f"[AI] Gemini len mismatch: got {len(arr) if arr else 0}, need {len(lines)}")
                  except Exception as e:
                      print(f"[AI] Gemini fail: {e}")

              q = (os.environ.get("GROQ_API_KEY") or "").strip()
              if q:
                  try:
                      url = "https://api.groq.com/openai/v1/chat/completions"
                      payload = {
                          "model": "llama-3.3-70b-versatile",
                          "messages": [
                              {"role": "system", "content": AI_SYSTEM},
                              {"role": "user", "content": prompt},
                          ],
                          "max_tokens": 2000, "temperature": 0.3,
                      }
                      data = json.dumps(payload).encode()
                      req = urllib.request.Request(url, data=data, headers={
                          "Authorization": f"Bearer {q}", "Content-Type": "application/json", "User-Agent": UA,
                      })
                      with urllib.request.urlopen(req, timeout=45) as r:
                          resp = json.load(r)
                      text = resp["choices"][0]["message"]["content"]
                      arr = _parse_arr(text)
                      if arr and len(arr) == len(lines):
                          print(f"[AI] Groq OK ({len(arr)} açıklama)")
                          return {ln: _normalize_entry(e) for ln, e in zip(lines, arr)}
                  except Exception as e:
                      print(f"[AI] Groq fail: {e}")
              return {}

          def explain_all(lines: list[str]) -> dict[str, dict]:
              """Her hata için: AI'dan sorun/anlam/cozum al; AI başarısızsa statik pattern + çözümsüz."""
              ai_res = ai_explain_batch(lines)
              out: dict[str, dict] = {}
              for ln in lines:
                  if ln in ai_res and ai_res[ln].get("sorun"):
                      out[ln] = ai_res[ln]
                      continue
                  sp = static_explain(ln)
                  out[ln] = {
                      "sorun": sp or "Bilinmeyen hata pattern'ı (AI yanıtı alınamadı).",
                      "anlam": "",
                      "cozum": ["Railway dashboard → Deployments → Logs üzerinden tam stack trace'i incele."],
                  }
              return out

          # ─────────────────────────────────────────────────────────────
          # 5) Mail gönderim
          # ─────────────────────────────────────────────────────────────
          def send_mail(subject: str, body: str) -> None:
              msg = EmailMessage()
              msg["Subject"] = subject
              msg["From"] = os.environ.get("MAIL_FROM") or os.environ["SMTP_USER"]
              msg["To"] = os.environ.get("MAIL_TO") or os.environ["SMTP_USER"]
              msg.set_content(body)
              ctx = ssl.create_default_context()
              with smtplib.SMTP(os.environ["SMTP_HOST"], int(os.environ["SMTP_PORT"]), timeout=20) as s:
                  s.starttls(context=ctx)
                  s.login(os.environ["SMTP_USER"], os.environ["SMTP_PASSWORD"])
                  s.send_message(msg)
              print(f"[Mail] Gönderildi → {msg['To']}")

          # ─────────────────────────────────────────────────────────────
          # 6) Ana akış
          # ─────────────────────────────────────────────────────────────
          force = os.environ.get("FORCE_ALERT","false").lower() == "true"
          dep = fetch_latest_deployment()
          status = dep["status"]
          tr_status = TR_STATUS.get(status, status)
          dep_id = dep["id"]
          created = dep["createdAt"]
          dep_url = dep.get("staticUrl") or ""
          meta = dep.get("meta") or {}
          commit_full = (meta.get("commitHash") or "unknown")
          commit = commit_full[:8]
          commit_msg = (meta.get("commitMessage") or "").splitlines()[0] if meta.get("commitMessage") else ""

          print(f"[Deploy] status={status} ({tr_status})  commit={commit}  createdAt={created}")

          # Karar: alert mı, sessiz mi
          alert_type = ""
          alert_lines: list[str] = []  # gösterilecek log satırları

          if status in BAD_DEPLOY:
              alert_type = "deploy_failed"
              raw = fetch_error_logs(dep_id, limit=150)
              alert_lines = [f"{r['timestamp']} [{r['severity']}] {r['message']}" for r in raw if r.get("message","").strip()]
              print(f"[Trigger] Deploy hatalı; {len(alert_lines)} error log çekildi.")
          elif status == "SUCCESS":
              raw = fetch_error_logs(dep_id, limit=200)
              # Son 60dk içindeki error'ları say
              cutoff = datetime.now(timezone.utc) - timedelta(minutes=60)
              recent = []
              for r in raw:
                  ts = r.get("timestamp","")
                  msg = r.get("message","").strip()
                  if not msg:
                      continue
                  try:
                      # Railway timestamps look like 2026-06-20T17:21:37.123456789Z
                      ts_norm = re.sub(r"\.\d+Z$", "Z", ts).replace("Z","+00:00")
                      dt = datetime.fromisoformat(ts_norm)
                  except Exception:
                      continue
                  if dt >= cutoff:
                      recent.append(f"{ts} [{r.get('severity','')}] {msg}")
              if recent:
                  alert_type = "runtime_errors"
                  alert_lines = recent
                  print(f"[Trigger] Çalışma hataları: son 60dk içinde {len(recent)} satır.")
              else:
                  print("[Healthy] Deploy SUCCESS ve son 60dk içinde error log yok.")
          else:
              print(f"[Skip] Status={status}, geçici durum; alert yok.")

          # Force alert (manuel test) — gerçek hata yoksa sahte log kullan
          if force and not alert_type:
              alert_type = "deploy_failed"
              alert_lines = [
                  "2026-06-20T00:00:00Z [error] [TEST] HTTPSConnectionPool host=example.com timeout",
                  "2026-06-20T00:00:01Z [error] [TEST] Database connection lost: psycopg2.OperationalError",
              ]
              print("[Force] Test alert tetiklendi (gerçek hata yok).")

          if not alert_type:
              print("::notice title=Sağlıklı::Hiçbir alert gönderilmedi.")
              raise SystemExit(0)

          # ─────────────────────────────────────────────────────────────
          # 7) Mail derle (Türkçe başlık + body)
          # ─────────────────────────────────────────────────────────────
          alert_lines = alert_lines[-80:]  # max 80 satır
          expls = explain_all(alert_lines)

          def annotated(lines: list[str]) -> str:
              out = []
              for ln in lines:
                  e = expls.get(ln) or {}
                  out.append(ln)
                  sorun = (e.get("sorun") or "").strip()
                  anlam = (e.get("anlam") or "").strip()
                  cozum = e.get("cozum") or []
                  if sorun:
                      out.append(f"   ↳ Sorun:  {sorun}")
                  if anlam:
                      out.append(f"     Anlam:  {anlam}")
                  if cozum:
                      out.append(f"     Çözüm:")
                      for c in cozum:
                          out.append(f"       • {c}")
                  out.append("")
              return "\n".join(out).rstrip()

          last_three = annotated(alert_lines[-3:])
          full_block = annotated(alert_lines)
          n_lines = len(alert_lines)

          # Subject (her zaman Türkçe)
          prefix = "[TEST] " if force else ""
          if alert_type == "deploy_failed":
              subject = f"{prefix}[Deploy: {tr_status}] seo-agent — {n_lines} hata"
              top = (
                  f"DURUM:  Deploy {tr_status.lower()}\n"
                  f"COMMIT: {commit}\n"
                  f"ZAMAN:  {created}"
              )
          else:  # runtime_errors
              subject = f"{prefix}[Çalışma hatası] seo-agent — son 60dk içinde {n_lines} hata"
              top = (
                  f"DURUM:  Deploy başarılı ama uygulamada {n_lines} hata son 60dk\n"
                  f"COMMIT: {commit}\n"
                  f"ZAMAN:  {created}"
              )
          if force:
              top = "[!] Bu bir TEST mailidir — gerçek hata yok, manuel workflow_dispatch ile tetiklendi.\n\n" + top

          body_parts = [
              top,
              "",
              "── Son hatalar (Türkçe açıklama ile) ──",
              last_three,
              "",
              "── Detaylar ──",
              f"URL:        {dep_url}",
              f"Deployment: {dep_id}",
              f"Workflow:   {os.environ['RUN_URL']}",
              "",
              f"── Tam hata günlüğü ({n_lines} satır, açıklamalı) ──",
              full_block,
          ]
          if commit_msg:
              body_parts += ["", "── Commit (orijinal dil) ──", commit_msg]

          send_mail(subject, "\n".join(body_parts))
          PY
