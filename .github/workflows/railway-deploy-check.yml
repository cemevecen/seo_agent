name: Railway Deploy Health Check

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  PROJECT_ID: eb62c02c-f447-4279-b87e-e09114ba4d26
  SERVICE_ID: b3660507-c346-48ec-8062-e464d1df9ce9
  ENVIRONMENT_ID: c16602df-5fc0-4f3d-9a82-d277979d3e71
  SMTP_HOST: smtp.gmail.com
  SMTP_PORT: '587'
  MAIL_FROM: cemevecen@nokta.com
  MAIL_TO: cemevecen@nokta.com

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest deployment
        id: dep
        run: |
          set -euo pipefail
          QUERY='{"query":"{ deployments(first: 1, input: { projectId: \"'"$PROJECT_ID"'\", serviceId: \"'"$SERVICE_ID"'\", environmentId: \"'"$ENVIRONMENT_ID"'\" }) { edges { node { id status createdAt staticUrl meta } } } }"}'
          RESP=$(curl -sS -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$QUERY")

          NODE=$(echo "$RESP" | jq -c '.data.deployments.edges[0].node')
          if [ "$NODE" = "null" ] || [ -z "$NODE" ]; then
            echo "Railway API returned no deployment. Response:"
            echo "$RESP"
            exit 1
          fi

          DEP_ID=$(echo "$NODE" | jq -r '.id')
          STATUS=$(echo "$NODE" | jq -r '.status')
          CREATED=$(echo "$NODE" | jq -r '.createdAt')
          COMMIT=$(echo "$NODE" | jq -r '.meta.commitHash // "unknown"' | cut -c1-8)
          MSG=$(echo "$NODE" | jq -r '.meta.commitMessage // ""' | head -n 1)
          URL=$(echo "$NODE" | jq -r '.staticUrl // ""')

          echo "id=$DEP_ID" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "created=$CREATED" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "title=$MSG" >> "$GITHUB_OUTPUT"

          echo "::notice title=Deployment::status=$STATUS commit=$COMMIT createdAt=$CREATED"

      - name: Fetch error logs (only on failure)
        id: logs
        if: contains(fromJSON('["FAILED","CRASHED","BUILD_FAILED","DEPLOY_FAILED"]'), steps.dep.outputs.status)
        run: |
          set -euo pipefail
          QUERY='{"query":"{ deploymentLogs(deploymentId: \"'"${{ steps.dep.outputs.id }}"'\", limit: 80, filter: \"@level:error\") { timestamp message severity } }"}'
          RESP=$(curl -sS -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$QUERY")
          echo "$RESP" | jq -r '.data.deploymentLogs[] | "\(.timestamp) [\(.severity)] \(.message)"' 2>/dev/null > /tmp/errlogs.txt || echo "(log çekilemedi)" > /tmp/errlogs.txt
          tail -n 50 /tmp/errlogs.txt > /tmp/errlogs_tail.txt
          echo "wrote=$(wc -l < /tmp/errlogs_tail.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Send SMTP alert mail
        if: contains(fromJSON('["FAILED","CRASHED","BUILD_FAILED","DEPLOY_FAILED"]'), steps.dep.outputs.status)
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          DEP_STATUS: ${{ steps.dep.outputs.status }}
          DEP_ID: ${{ steps.dep.outputs.id }}
          DEP_COMMIT: ${{ steps.dep.outputs.commit }}
          DEP_CREATED: ${{ steps.dep.outputs.created }}
          DEP_TITLE: ${{ steps.dep.outputs.title }}
          DEP_URL: ${{ steps.dep.outputs.url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import os, smtplib, ssl
          from email.message import EmailMessage

          status   = os.environ["DEP_STATUS"]
          dep_id   = os.environ["DEP_ID"]
          commit   = os.environ["DEP_COMMIT"]
          created  = os.environ["DEP_CREATED"]
          title    = os.environ.get("DEP_TITLE", "")
          dep_url  = os.environ.get("DEP_URL", "")
          run_url  = os.environ["RUN_URL"]

          try:
              with open("/tmp/errlogs_tail.txt", "r", encoding="utf-8", errors="replace") as f:
                  logs = f.read().strip() or "(error log yok)"
          except FileNotFoundError:
              logs = "(log dosyası okunamadı)"

          body = f"""Railway deploy sorunu

          Durum:      {status}
          Deployment: {dep_id}
          Commit:     {commit} — {title}
          Zaman:      {created}
          URL:        {dep_url}

          --- Son error log satırları ---
          {logs}

          --- ---
          Workflow run: {run_url}

          Bu mail GitHub Actions üzerinden otomatik olarak gönderildi
          (railway-deploy-check.yml, her 10 dakikada bir).
          """

          msg = EmailMessage()
          msg["Subject"] = f"[Railway] {status} — seo-agent ({commit})"
          msg["From"] = os.environ.get("MAIL_FROM", os.environ["SMTP_USER"])
          msg["To"] = os.environ.get("MAIL_TO", os.environ["SMTP_USER"])
          msg.set_content(body)

          ctx = ssl.create_default_context()
          with smtplib.SMTP(os.environ["SMTP_HOST"], int(os.environ["SMTP_PORT"]), timeout=20) as s:
              s.starttls(context=ctx)
              s.login(os.environ["SMTP_USER"], os.environ["SMTP_PASSWORD"])
              s.send_message(msg)
          print(f"OK: alert mail sent → {msg['To']}")
          PY

      - name: Healthy ping
        if: ${{ !contains(fromJSON('["FAILED","CRASHED","BUILD_FAILED","DEPLOY_FAILED"]'), steps.dep.outputs.status) }}
        run: |
          echo "::notice title=Healthy::Deploy status=${{ steps.dep.outputs.status }} commit=${{ steps.dep.outputs.commit }}"
