name: Railway Deploy Health Check

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  PROJECT_ID: eb62c02c-f447-4279-b87e-e09114ba4d26
  SERVICE_ID: b3660507-c346-48ec-8062-e464d1df9ce9
  ENVIRONMENT_ID: c16602df-5fc0-4f3d-9a82-d277979d3e71
  SMTP_HOST: smtp.gmail.com
  SMTP_PORT: '587'
  MAIL_FROM: cemevecen@nokta.com
  MAIL_TO: cemevecen@nokta.com

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest deployment
        id: dep
        run: |
          set -euo pipefail
          QUERY='{"query":"{ deployments(first: 1, input: { projectId: \"'"$PROJECT_ID"'\", serviceId: \"'"$SERVICE_ID"'\", environmentId: \"'"$ENVIRONMENT_ID"'\" }) { edges { node { id status createdAt staticUrl meta } } } }"}'
          RESP=$(curl -sS -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$QUERY")

          NODE=$(echo "$RESP" | jq -c '.data.deployments.edges[0].node')
          if [ "$NODE" = "null" ] || [ -z "$NODE" ]; then
            echo "Railway API returned no deployment. Response:"
            echo "$RESP"
            exit 1
          fi

          DEP_ID=$(echo "$NODE" | jq -r '.id')
          STATUS=$(echo "$NODE" | jq -r '.status')
          CREATED=$(echo "$NODE" | jq -r '.createdAt')
          COMMIT=$(echo "$NODE" | jq -r '.meta.commitHash // "unknown"' | cut -c1-8)
          MSG=$(echo "$NODE" | jq -r '.meta.commitMessage // ""' | head -n 1)
          URL=$(echo "$NODE" | jq -r '.staticUrl // ""')

          echo "id=$DEP_ID" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "created=$CREATED" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "title=$MSG" >> "$GITHUB_OUTPUT"

          echo "::notice title=Deployment::status=$STATUS commit=$COMMIT createdAt=$CREATED"

      - name: Fetch error logs (only on failure)
        id: logs
        if: contains(fromJSON('["FAILED","CRASHED","BUILD_FAILED","DEPLOY_FAILED"]'), steps.dep.outputs.status)
        run: |
          set -euo pipefail
          QUERY='{"query":"{ deploymentLogs(deploymentId: \"'"${{ steps.dep.outputs.id }}"'\", limit: 80, filter: \"@level:error\") { timestamp message severity } }"}'
          RESP=$(curl -sS -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$QUERY")
          echo "$RESP" | jq -r '.data.deploymentLogs[] | "\(.timestamp) [\(.severity)] \(.message)"' 2>/dev/null > /tmp/errlogs.txt || echo "(log çekilemedi)" > /tmp/errlogs.txt
          tail -n 50 /tmp/errlogs.txt > /tmp/errlogs_tail.txt
          echo "wrote=$(wc -l < /tmp/errlogs_tail.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Send SMTP alert mail
        if: contains(fromJSON('["FAILED","CRASHED","BUILD_FAILED","DEPLOY_FAILED"]'), steps.dep.outputs.status)
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEP_STATUS: ${{ steps.dep.outputs.status }}
          DEP_ID: ${{ steps.dep.outputs.id }}
          DEP_COMMIT: ${{ steps.dep.outputs.commit }}
          DEP_CREATED: ${{ steps.dep.outputs.created }}
          DEP_TITLE: ${{ steps.dep.outputs.title }}
          DEP_URL: ${{ steps.dep.outputs.url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import os, smtplib, ssl, json, urllib.request, urllib.error
          from email.message import EmailMessage

          status   = os.environ["DEP_STATUS"]
          dep_id   = os.environ["DEP_ID"]
          commit   = os.environ["DEP_COMMIT"]
          created  = os.environ["DEP_CREATED"]
          title    = os.environ.get("DEP_TITLE", "")
          dep_url  = os.environ.get("DEP_URL", "")
          run_url  = os.environ["RUN_URL"]

          import re

          try:
              with open("/tmp/errlogs_tail.txt", "r", encoding="utf-8", errors="replace") as f:
                  raw_logs = f.read().strip() or "(error log yok)"
          except FileNotFoundError:
              raw_logs = "(log dosyası okunamadı)"

          log_lines = [l for l in raw_logs.splitlines() if l.strip()]
          full_logs = "\n".join(log_lines[-50:]) if log_lines else raw_logs

          # Pattern → Türkçe açıklama tablosu (sırayla denenir, ilk eşleşme kazanır)
          PATTERNS = [
              (r"(read )?time(d)? ?out|TimeoutError|ETIMEDOUT",
               "Dış servise istek zaman aşımına uğradı — üçüncü taraf yavaş ya da cevap vermiyor."),
              (r"psycopg2|OperationalError|connection (lost|refused|reset).*postgres|could not connect to server",
               "PostgreSQL bağlantı sorunu — DB restart, max connection limiti veya network kesintisi olabilir."),
              (r"psycopg2.errors\.|IntegrityError|UniqueViolation|ForeignKeyViolation",
               "PostgreSQL veri bütünlüğü hatası — migration/constraint eksik olabilir."),
              (r"redis|connection refused.*6379",
               "Redis bağlantısı kurulamadı — service down ya da REDIS_URL yanlış."),
              (r"exited with code 1|Worker process exited|SIGKILL|SIGTERM",
               "Process beklenmedik şekilde sonlandı — yakalanmamış exception veya OOM olabilir."),
              (r"out of memory|MemoryError|OOMKilled|Cannot allocate memory",
               "Bellek tükendi — Railway planını ya da kodda memory leak'i kontrol et."),
              (r"ModuleNotFoundError|ImportError|No module named",
               "Python paket eksik — requirements.txt veya import path'i kontrol et."),
              (r"address already in use|port \d+ is already",
               "Port çakışması — eski instance hala bağlı olabilir, redeploy gerekebilir."),
              (r"healthcheck|/health.*(failed|timeout)|Healthcheck failed",
               "Sağlık kontrolü başarısız — /health endpoint cevap vermiyor ya da app boot olmadı."),
              (r"401|Unauthorized|forbidden|permission denied|403",
               "Yetkilendirme hatası — token/API key/izinler kontrol edilmeli."),
              (r"5\d\d|bad gateway|service unavailable",
               "Upstream/dış servis 5xx döndü — geçici hata, retry gerekebilir."),
              (r"SSLError|certificate|SSL handshake",
               "SSL/TLS hatası — sertifika geçersiz ya da eksik."),
              (r"BOT haftalık|boxofficeturkiye|fetch hatası",
               "Bot dış siteye erişemedi — kaynak site down ya da network engeli."),
              (r"GA4|Google Analytics|search.*console|googleapis",
               "Google API hatası — quota dolmuş ya da credentials geçersiz olabilir."),
              (r"rate limit|429|too many requests",
               "Rate limit aşıldı — quota cooldown'a girmiş olabilir."),
              (r"Migration|alembic|relation.*does not exist",
               "DB şeması güncel değil — alembic migration eksik olabilir."),
              (r"DNS|NXDOMAIN|getaddrinfo",
               "DNS çözümlenemedi — host yanlış veya internet kesintisi."),
              (r"build (failed|error)|nixpacks|docker build",
               "Build aşamasında hata — Dockerfile/dependencies kontrol edilmeli."),
          ]

          def static_explain(line: str):
              for pat, desc in PATTERNS:
                  if re.search(pat, line, re.IGNORECASE):
                      return desc
              return None

          def ai_explain_batch(lines):
              """Statik eşleşmeyenleri AI'a sor (önce Gemini, fail olursa Groq).
              Dönüş: line → açıklama dict. Hata olursa boş dict."""
              if not lines:
                  return {}
              numbered = "\n".join(f"{i+1}. {ln}" for i, ln in enumerate(lines))
              prompt = (
                  "Aşağıda Railway deployment'tan gelen hata logları var. "
                  "Her satır için TEK CÜMLE Türkçe açıklama yaz; çözüm önerme, sadece tanımla. "
                  "Yalnızca JSON array dön, başka şey yazma.\n\n"
                  f"{numbered}\n\n"
                  f"Format: {json.dumps(['açıklama 1','açıklama 2'])}"
              )

              # 1) Gemini
              g_key = os.environ.get("GEMINI_API_KEY", "").strip()
              if g_key:
                  try:
                      url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={g_key}"
                      data = json.dumps({"contents":[{"parts":[{"text":prompt}]}]}).encode()
                      req = urllib.request.Request(url, data=data, headers={"Content-Type":"application/json"})
                      with urllib.request.urlopen(req, timeout=25) as r:
                          resp = json.load(r)
                      text = resp["candidates"][0]["content"]["parts"][0]["text"]
                      arr = _parse_json_array(text)
                      if arr and len(arr) == len(lines):
                          return dict(zip(lines, arr))
                  except Exception as e:
                      print(f"Gemini fail: {e}")

              # 2) Groq fallback
              q_key = os.environ.get("GROQ_API_KEY", "").strip()
              if q_key:
                  try:
                      url = "https://api.groq.com/openai/v1/chat/completions"
                      data = json.dumps({
                          "model": "llama-3.3-70b-versatile",
                          "messages": [{"role":"user","content":prompt}],
                          "max_tokens": 600,
                          "temperature": 0.3,
                      }).encode()
                      req = urllib.request.Request(url, data=data, headers={
                          "Authorization": f"Bearer {q_key}",
                          "Content-Type": "application/json",
                      })
                      with urllib.request.urlopen(req, timeout=25) as r:
                          resp = json.load(r)
                      text = resp["choices"][0]["message"]["content"]
                      arr = _parse_json_array(text)
                      if arr and len(arr) == len(lines):
                          return dict(zip(lines, arr))
                  except Exception as e:
                      print(f"Groq fail: {e}")
              return {}

          def _parse_json_array(text: str):
              """JSON array'i string'den çekip parse et (markdown wrapping vs.)."""
              t = text.strip()
              if t.startswith("```"):
                  t = re.sub(r"^```(?:json)?\s*", "", t)
                  t = re.sub(r"\s*```$", "", t)
              m = re.search(r"\[.*\]", t, re.DOTALL)
              if not m:
                  return None
              try:
                  arr = json.loads(m.group(0))
                  return arr if isinstance(arr, list) else None
              except json.JSONDecodeError:
                  return None

          def explain_all(lines):
              """Önce statik, eşleşmeyenleri AI'a topla."""
              results = {}
              unmatched = []
              for ln in lines:
                  s = static_explain(ln)
                  if s:
                      results[ln] = s
                  else:
                      unmatched.append(ln)
              if unmatched:
                  ai_results = ai_explain_batch(unmatched)
                  for ln in unmatched:
                      results[ln] = ai_results.get(ln, "Bilinmeyen hata pattern'ı — manuel kontrol gerekli.")
              return results

          # En son 50 satırın açıklamalarını tek seferde çek
          explanations = explain_all(log_lines[-50:]) if log_lines else {}
          def explain(line: str) -> str:
              return explanations.get(line, "Bilinmeyen hata pattern'ı — manuel kontrol gerekli.")

          def annotated(lines):
              out = []
              for ln in lines:
                  out.append(ln)
                  out.append(f"   ↳ {explain(ln)}")
                  out.append("")
              return "\n".join(out).rstrip()

          last_three_annotated = annotated(log_lines[-3:]) if log_lines else "(error log yok)"
          full_logs_annotated = annotated(log_lines[-50:]) if log_lines else raw_logs

          # Commit mesajını ilk 80 karaktere kısalt
          short_title = (title[:80] + "…") if len(title) > 80 else title

          body = f"""{status} — seo-agent production
          Commit {commit}: {short_title}
          Zaman: {created}

          ── Son hatalar (Türkçe açıklama ile) ──
          {last_three_annotated}

          ── Detaylar ──
          URL: {dep_url}
          Deployment: {dep_id}
          Workflow: {run_url}

          ── Tam error log ({len(log_lines)} satır, açıklamalı) ──
          {full_logs_annotated}
          """

          msg = EmailMessage()
          msg["Subject"] = f"[Railway {status}] seo-agent — {short_title}"
          msg["From"] = os.environ.get("MAIL_FROM", os.environ["SMTP_USER"])
          msg["To"] = os.environ.get("MAIL_TO", os.environ["SMTP_USER"])
          msg.set_content(body)

          ctx = ssl.create_default_context()
          with smtplib.SMTP(os.environ["SMTP_HOST"], int(os.environ["SMTP_PORT"]), timeout=20) as s:
              s.starttls(context=ctx)
              s.login(os.environ["SMTP_USER"], os.environ["SMTP_PASSWORD"])
              s.send_message(msg)
          print(f"OK: alert mail sent → {msg['To']}")
          PY

      - name: Healthy ping
        if: ${{ !contains(fromJSON('["FAILED","CRASHED","BUILD_FAILED","DEPLOY_FAILED"]'), steps.dep.outputs.status) }}
        run: |
          echo "::notice title=Healthy::Deploy status=${{ steps.dep.outputs.status }} commit=${{ steps.dep.outputs.commit }}"
