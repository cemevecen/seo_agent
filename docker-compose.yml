version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: seo_agent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seo_agent_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Şablon/backend değişince tarayıcıda eski GA4 arayüzü kalıyorsa: imaj build zamanına kilitlidir.
  # Host'ta git pull yetmez — yeniden build şart:  docker compose build app && docker compose up -d app
  # Geliştirme: kaynak kodu canlı mount etmek istersen app altına şunu ekleyebilirsin:  - .:/app
  app:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-}
    container_name: seo_agent_app
    restart: unless-stopped
    ports:
      - "8012:8012"
    env_file:
      - .env
    volumes:
      - ./keys:/app/keys:ro
      # GSC CWV manuel screenshot'ları host diskinde kalır (konteyner/OS yeniden başlasa da)
      - ./static/gsc:/app/static/gsc
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
