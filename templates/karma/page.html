{% extends "base.html" %}
{% block content %}
<div class="karma-root mx-auto w-full min-w-0 max-w-[1800px]" data-header-title="Karma · {{ karma_item.title }}">
  {% include "karma/_subnav.html" %}

  <div class="mb-4 flex flex-wrap items-end justify-between gap-3">
    <div>
      <p class="text-[10px] font-bold uppercase tracking-widest text-indigo-600 dark:text-indigo-400">{{ karma_item.group }}</p>
      <h1 class="text-xl font-black text-slate-900 dark:text-zinc-100 sm:text-2xl">{{ karma_item.title }}</h1>
      <p class="mt-1 max-w-2xl text-sm text-slate-500 dark:text-zinc-400">{{ karma_item.description }}</p>
    </div>
    <div class="flex flex-wrap items-center gap-2">
      <label class="text-[10px] font-bold uppercase tracking-wide text-slate-400">Site</label>
      <select id="karma-site-select" class="rounded-lg border border-slate-200 bg-white px-2 py-1.5 text-xs font-semibold dark:border-zinc-700 dark:bg-zinc-900 dark:text-zinc-100">
        {% for s in sites %}
        <option value="{{ s.id }}" {% if s.id == site_id %}selected{% endif %}>{{ s.display_name or s.domain }}</option>
        {% endfor %}
      </select>
      <button type="button" id="karma-refresh" class="rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-bold text-slate-700 hover:bg-slate-50 dark:border-zinc-700 dark:bg-zinc-900 dark:text-zinc-200 dark:hover:bg-zinc-800">Yenile</button>
    </div>
  </div>

  <div id="karma-loading" class="hidden py-12 text-center text-sm text-slate-400">Yükleniyor…</div>
  <div id="karma-error" class="hidden rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800 dark:border-red-900/50 dark:bg-red-950/40 dark:text-red-200"></div>

  <div id="karma-summary" class="mb-4 hidden rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-700 dark:border-zinc-700 dark:bg-zinc-900/60 dark:text-zinc-300"></div>

  <div id="karma-metrics" class="mb-5 hidden grid grid-cols-2 gap-2 sm:grid-cols-4"></div>

  <div id="karma-sections" class="space-y-5"></div>

  <div id="karma-actions" class="mt-6 hidden flex flex-wrap gap-2"></div>
</div>

<style>
  .karma-subnav-wrap {
    margin-bottom: 1rem;
    border-bottom: 1px solid rgb(226 232 240);
    padding-bottom: 0.5rem;
  }
  html.dark .karma-subnav-wrap { border-color: rgba(63,63,70,.55); }
  .karma-subnav-groups { display: flex; flex-direction: column; gap: 0.5rem; }
  .karma-subnav-group-label {
    font-size: 9px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
    color: rgb(100 116 139); padding: 0 0.25rem;
  }
  html.dark .karma-subnav-group-label { color: rgb(161 161 170); }
  .karma-subnav-track {
    display: flex; flex-wrap: nowrap; gap: 0.35rem; overflow-x: auto;
    -webkit-overflow-scrolling: touch; padding-bottom: 0.15rem;
  }
  .karma-subnav-link {
    flex-shrink: 0; border-radius: 999px; padding: 0.3rem 0.65rem;
    font-size: 10px; font-weight: 700; white-space: nowrap;
    border: 1px solid rgb(226 232 240); color: rgb(71 85 105);
    background: rgb(255 255 255); text-decoration: none;
  }
  html.dark .karma-subnav-link {
    border-color: rgb(63 63 70); color: rgb(212 212 216); background: rgb(24 24 27);
  }
  .karma-subnav-link.is-active {
    background: rgb(79 70 229); border-color: rgb(79 70 229); color: #fff;
  }
  html.dark .karma-subnav-link.is-active { background: rgb(99 102 241); border-color: rgb(99 102 241); }
  .karma-metric {
    border-radius: 0.75rem; border: 1px solid rgb(226 232 240);
    background: rgb(255 255 255); padding: 0.65rem 0.75rem;
  }
  html.dark .karma-metric { border-color: rgb(63 63 70); background: rgb(24 24 27); }
  .karma-metric-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: rgb(100 116 139); }
  html.dark .karma-metric-label { color: rgb(161 161 170); }
  .karma-metric-val { font-size: 1.15rem; font-weight: 900; font-variant-numeric: tabular-nums; color: rgb(15 23 42); }
  html.dark .karma-metric-val { color: rgb(250 250 250); }
  .karma-section-title { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: rgb(51 65 85); margin-bottom: 0.5rem; }
  html.dark .karma-section-title { color: rgb(212 212 216); }
  .karma-card {
    border-radius: 0.75rem; border: 1px solid rgb(241 245 249);
    background: rgb(255 255 255); padding: 0.65rem 0.75rem;
  }
  html.dark .karma-card { border-color: rgb(39 39 42); background: rgb(18 18 20); }
  .karma-card + .karma-card { margin-top: 0.35rem; }
  .karma-badge {
    display: inline-block; border-radius: 999px; padding: 0.1rem 0.45rem;
    font-size: 9px; font-weight: 700; background: rgb(241 245 249); color: rgb(71 85 105);
  }
  html.dark .karma-badge { background: rgb(39 39 42); color: rgb(161 161 170); }
</style>

<script>
(function () {
  var slug = {{ karma_slug | tojson }};
  var siteSelect = document.getElementById('karma-site-select');
  var loading = document.getElementById('karma-loading');
  var errEl = document.getElementById('karma-error');
  var summaryEl = document.getElementById('karma-summary');
  var metricsEl = document.getElementById('karma-metrics');
  var sectionsEl = document.getElementById('karma-sections');
  var actionsEl = document.getElementById('karma-actions');

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }

  function render(data) {
    summaryEl.textContent = data.summary || '';
    summaryEl.classList.toggle('hidden', !data.summary);

    if (data.metrics && data.metrics.length) {
      metricsEl.innerHTML = data.metrics.map(function (m) {
        return '<div class="karma-metric"><div class="karma-metric-label">' + esc(m.label) + '</div><div class="karma-metric-val">' + esc(m.value) + '</div></div>';
      }).join('');
      metricsEl.classList.remove('hidden');
    } else {
      metricsEl.classList.add('hidden');
    }

    sectionsEl.innerHTML = (data.sections || []).map(function (sec) {
      var items = (sec.items || []).map(function (it) {
        var inner = '<div class="flex flex-wrap items-start justify-between gap-2"><div class="min-w-0 flex-1">';
        if (it.href) inner += '<a href="' + esc(it.href) + '" target="_blank" rel="noopener" class="font-semibold text-sm text-indigo-700 hover:underline dark:text-indigo-300">' + esc(it.title) + '</a>';
        else inner += '<div class="font-semibold text-sm text-slate-800 dark:text-zinc-100">' + esc(it.title) + '</div>';
        if (it.subtitle) inner += '<div class="mt-0.5 text-xs text-slate-500 dark:text-zinc-400">' + esc(it.subtitle) + '</div>';
        inner += '</div>';
        if (it.badge) inner += '<span class="karma-badge">' + esc(it.badge) + '</span>';
        inner += '</div>';
        return '<div class="karma-card">' + inner + '</div>';
      }).join('');
      return '<div><h2 class="karma-section-title">' + esc(sec.title) + '</h2>' + (items || '<p class="text-xs text-slate-400">Veri yok</p>') + '</div>';
    }).join('');

    if (data.actions && data.actions.length) {
      actionsEl.innerHTML = data.actions.map(function (a) {
        return '<a href="' + esc(a.href) + '" class="rounded-lg border border-indigo-200 bg-indigo-50 px-3 py-1.5 text-xs font-bold text-indigo-800 hover:bg-indigo-100 dark:border-indigo-800 dark:bg-indigo-950/40 dark:text-indigo-200">' + esc(a.label) + '</a>';
      }).join('');
      actionsEl.classList.remove('hidden');
    } else {
      actionsEl.classList.add('hidden');
    }
  }

  function load() {
    var sid = siteSelect ? siteSelect.value : '1';
    loading.classList.remove('hidden');
    errEl.classList.add('hidden');
    fetch('/api/karma/' + encodeURIComponent(slug) + '?site_id=' + encodeURIComponent(sid), { credentials: 'same-origin' })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        loading.classList.add('hidden');
        if (!res.ok) throw new Error(res.j.error || 'Yüklenemedi');
        render(res.j);
      })
      .catch(function (e) {
        loading.classList.add('hidden');
        errEl.textContent = e.message || 'Hata';
        errEl.classList.remove('hidden');
      });
  }

  if (siteSelect) siteSelect.addEventListener('change', load);
  document.getElementById('karma-refresh').addEventListener('click', load);
  load();
})();
</script>
{% endblock %}
