{% extends "base.html" %}
{% block content %}
<div class="mx-auto w-full min-w-0 max-w-[1600px] space-y-5" x-data="gitlabBoards()" x-init="initBoards()">
  <div class="flex flex-col gap-2 rounded-2xl bg-white px-5 py-4 shadow-sm ring-1 ring-slate-200 dark:bg-slate-900 dark:ring-slate-700 sm:flex-row sm:items-center sm:justify-between">
    <div class="flex items-center gap-4">
      <h3 class="text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100 sm:text-2xl">git.nokta.com</h3>
      <button 
        @click="refreshActiveProject()" 
        :disabled="!activeProject || (projectData[activeProject] && projectData[activeProject].loading)" 
        class="flex items-center gap-1.5 rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 shadow-sm transition hover:bg-slate-50 hover:text-slate-900 disabled:opacity-50 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700 dark:hover:text-white"
        title="Aktif Projeyi Yenile"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" :class="(projectData[activeProject] && projectData[activeProject].loading) ? 'animate-spin' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        Yenile
      </button>
    </div>
  </div>

  <div class="flex items-center gap-2 overflow-x-auto pb-2">
    <template x-for="project in configProjects" :key="project.path">
      <button 
        @click="activeProject = project.path"
        :class="activeProject === project.path ? 'bg-slate-900 text-white dark:bg-slate-200 dark:text-slate-900 shadow-md' : 'bg-white text-slate-700 dark:bg-slate-800 dark:text-slate-200'"
        class="relative rounded-full border border-slate-200 px-4 py-2 text-sm font-medium hover:bg-slate-50 focus:outline-none dark:border-slate-700 dark:hover:bg-slate-700 transition-colors"
      >
        <span x-text="project.name"></span>
        <span x-show="projectData[project.path] && projectData[project.path].loading" class="ml-2 inline-block h-3 w-3 animate-spin rounded-full border-2 border-solid border-current border-r-transparent align-middle opacity-50"></span>
      </button>
    </template>
  </div>

  <div id="board-container" class="min-h-[600px] rounded-2xl border border-dashed border-slate-300 p-4 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-900/50">
    
    <template x-if="activeProject && projectData[activeProject]">
      <div class="h-full">
        <div x-show="projectData[activeProject].error" class="rounded-xl border border-rose-200 bg-rose-50 p-4 text-rose-700 dark:border-rose-900/50 dark:bg-rose-900/20 dark:text-rose-400 mb-4">
          <p class="font-medium" x-text="projectData[activeProject].error"></p>
        </div>

        <div x-show="projectData[activeProject].loading && !projectData[activeProject].loaded && !projectData[activeProject].error" class="mt-20 text-center">
          <div class="inline-block h-8 w-8 animate-spin rounded-full border-4 border-solid border-slate-900 border-r-transparent align-[-0.125em] dark:border-white dark:border-r-transparent"></div>
          <p class="mt-4 text-slate-500 dark:text-slate-400">GitLab'den veriler çekiliyor...</p>
        </div>

        <div x-show="projectData[activeProject].loaded && !projectData[activeProject].error" class="flex h-full items-start gap-4 overflow-x-auto pb-4" id="lists-wrapper">
          <template x-for="(lst, index) in projectData[activeProject].lists" :key="lst.id">
            <div x-data="{ collapsed: getIssuesForList(activeProject, lst).length === 0 }"
                 x-init="$watch('getIssuesForList(activeProject, lst).length', val => { collapsed = (val === 0); })"
                 class="flex shrink-0 flex-col rounded-xl bg-white shadow-sm ring-1 ring-slate-200 dark:bg-slate-800 dark:ring-slate-700 border-t-4 transition-all duration-300 relative overflow-hidden group" 
                 :class="[getListColor(index, lst.isClosed), lst.isClosed ? 'opacity-75' : '', collapsed ? 'w-12 min-w-[48px] max-w-[48px] cursor-pointer' : 'p-3 w-[400px] min-w-[400px] max-w-[400px]']"
                 @click="if(collapsed) collapsed = false"
                 :style="collapsed ? 'width: 48px; min-width: 48px; max-width: 48px;' : 'width: 400px; min-width: 400px; max-width: 400px;'">
              
              <!-- Collapsed Vertical Header -->
              <div x-show="collapsed" class="flex flex-col items-center pt-4 pb-2 w-full select-none text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200 absolute inset-0 z-10 pointer-events-none">
                <span class="mb-4 rounded-full bg-slate-100 px-2 py-0.5 text-xs font-bold text-slate-600 dark:bg-slate-700 dark:text-slate-300 ring-1 ring-slate-200 dark:ring-slate-600" x-text="getIssuesForList(activeProject, lst).length"></span>
                <div style="writing-mode: vertical-rl; transform: rotate(180deg);" class="text-sm font-bold uppercase tracking-widest whitespace-nowrap mt-2" x-text="lst.label.name"></div>
              </div>

              <!-- Expanded Header -->
              <h4 x-show="!collapsed" class="mb-3 flex items-center justify-between text-sm font-bold uppercase tracking-wider text-slate-800 dark:text-slate-100">
                <div class="flex items-center gap-1 overflow-hidden">
                  <button @click.stop="collapsed = true" class="shrink-0 p-1 rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" title="Sütunu Daralt">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" /></svg>
                  </button>
                  <span x-text="lst.label.name" class="truncate pr-1"></span>
                  <button x-show="!lst.isClosed" @click.stop="lst.showNewIssueForm = true" class="ml-1 shrink-0 p-1 rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" title="Yeni Madde Ekle">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                  </button>
                </div>
                <span class="rounded-full bg-slate-100 px-2.5 py-0.5 text-xs font-semibold text-slate-600 ring-1 ring-inset ring-slate-200 dark:bg-slate-700 dark:text-slate-300 dark:ring-slate-600 shrink-0" x-text="getIssuesForList(activeProject, lst).length"></span>
              </h4>
              
              <!-- Yeni Ekleme Formu -->
              <div x-show="!collapsed && lst.showNewIssueForm" x-transition class="mb-3 rounded-lg border border-slate-200 bg-white p-2 shadow-sm dark:border-slate-700 dark:bg-slate-900">
                <input type="text" x-model="lst.newIssueTitle" @keydown.enter="createIssue(activeProject, lst)" :disabled="lst.isCreating" placeholder="Ne yapılması gerekiyor?" class="w-full bg-transparent text-sm font-medium text-slate-900 outline-none placeholder:text-slate-400 dark:text-slate-100 dark:placeholder:text-slate-500">
                <div class="mt-2 flex justify-end gap-2">
                  <button @click="lst.showNewIssueForm = false; lst.newIssueTitle = ''" class="text-xs font-medium text-slate-500 hover:text-slate-700">İptal</button>
                  <button @click="createIssue(activeProject, lst)" :disabled="!lst.newIssueTitle || !lst.newIssueTitle.trim() || lst.isCreating" class="rounded bg-blue-600 px-3 py-1 text-xs font-semibold text-white hover:bg-blue-500 disabled:opacity-50 transition">
                    <span x-show="!lst.isCreating">Ekle</span>
                    <span x-show="lst.isCreating" class="inline-block h-3 w-3 animate-spin rounded-full border-2 border-solid border-white border-r-transparent"></span>
                  </button>
                </div>
              </div>

              <div 
                class="sortable-list flex flex-col gap-2 rounded-lg border-2 border-transparent transition-colors flex-1 w-full" 
                style="min-height: 300px;"
                :data-label="lst.label.name"
                :data-virtual="lst.isVirtual"
                :data-closed="lst.isClosed"
                :data-project="activeProject"
                x-effect="initSortable($el)"
              >
                <template x-for="issue in getIssuesForList(activeProject, lst)" :key="issue.id">
                  <div 
                    class="group cursor-grab rounded-lg border border-slate-200 bg-white p-3 shadow-sm transition hover:border-blue-300 hover:shadow-md dark:border-slate-700 dark:bg-slate-900 dark:hover:border-blue-500 w-full min-w-0"
                    :class="collapsed ? 'hidden' : 'block'"
                    :data-id="issue.iid"
                  >
                    <div class="flex items-start justify-between gap-2 min-w-0 w-full">
                      <a :href="issue.web_url" target="_blank" class="text-sm font-medium leading-relaxed text-slate-900 hover:text-blue-600 dark:text-slate-100 dark:hover:text-blue-400 break-words whitespace-normal inline-block w-full" :class="issue.state === 'closed' ? 'line-through text-slate-500 dark:text-slate-500' : ''" x-text="issue.title"></a>
                    </div>
                    <div class="mt-3 flex items-center justify-between text-xs text-slate-500 dark:text-slate-400 font-medium w-full">
                      <span x-text="'#' + issue.iid"></span>
                      <template x-if="issue.assignee">
                        <div class="relative flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-blue-100 ring-2 ring-white dark:bg-blue-900/50 dark:ring-slate-900 shadow-sm overflow-hidden" :title="issue.assignee.name">
                          <span class="text-[10px] font-bold text-blue-700 dark:text-blue-300" x-text="(issue.assignee.name || '?').charAt(0).toUpperCase()"></span>
                          <img x-show="issue.assignee.avatar_url" :src="getAvatarUrl(issue.assignee.avatar_url)" @error="$el.style.display='none'" :alt="issue.assignee.name" class="absolute inset-0 h-full w-full bg-white object-cover dark:bg-slate-800">
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

  </div>
</div>

<style>
  .sortable-ghost { opacity: 0.3; transform: scale(0.98); }
  .sortable-drag { cursor: grabbing !important; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
  .sortable-list.is-dragging-over { border-color: #94a3b8; background-color: rgba(241, 245, 249, 0.8); border-style: dashed; }
  .dark .sortable-list.is-dragging-over { border-color: #475569; background-color: rgba(30, 41, 59, 0.8); }
</style>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script>
  function gitlabBoards() {
    return {
      token: '{{ token }}',
      baseUrl: 'https://git.nokta.com/api/v4',
      configProjects: {{ projects | tojson | safe }},
      activeProject: null,
      projectData: {},

      initBoards() {
        this.configProjects.forEach(p => {
          this.projectData[p.path] = { loading: false, loaded: false, error: null, board: null, lists: [], issues: [] };
        });
        if (this.configProjects.length > 0) this.activeProject = this.configProjects[0].path;
        this.configProjects.forEach(p => this.fetchProjectData(p.path));
      },

      refreshActiveProject() {
        if (!this.activeProject) return;
        this.projectData[this.activeProject].loaded = false;
        this.fetchProjectData(this.activeProject);
      },

      getListColor(index, isClosed) {
        if (isClosed) return 'border-t-emerald-500';
        const colors = ['border-t-slate-400', 'border-t-sky-500', 'border-t-indigo-500', 'border-t-amber-500', 'border-t-fuchsia-500', 'border-t-rose-500'];
        return colors[index % colors.length];
      },

      getAvatarUrl(url) {
        if (!url) return '';
        if (url.startsWith('http') || url.startsWith('//')) return url;
        return 'https://git.nokta.com' + (url.startsWith('/') ? '' : '/') + url;
      },

      async fetchAllIssues(encodedPath) {
        let allIssues = [];
        let page = 1;
        const oneYearAgo = new Date();
        oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
        const updatedAfter = oneYearAgo.toISOString();

        while (true) {
          const res = await fetch(`${this.baseUrl}/projects/${encodedPath}/issues?updated_after=${updatedAfter}&order_by=relative_position&sort=asc&per_page=100&page=${page}`, {
            headers: { 'PRIVATE-TOKEN': this.token }
          });
          if (!res.ok) throw new Error("Issues fetch failed");
          const data = await res.json();
          allIssues = allIssues.concat(data);
          if (data.length < 100) break;
          page++;
        }
        return allIssues;
      },

      async fetchProjectData(path) {
        const pd = this.projectData[path];
        if (pd.loading || pd.loaded) return; // Zaten çekiliyor veya çekildi
        
        pd.loading = true;
        pd.error = null;
        
        const encodedPath = encodeURIComponent(path);
        const headers = { 'PRIVATE-TOKEN': this.token };

        try {
          const [boardsRes, allIssues] = await Promise.all([
            fetch(`${this.baseUrl}/projects/${encodedPath}/boards`, { headers }),
            this.fetchAllIssues(encodedPath)
          ]);

          if (!boardsRes.ok) throw new Error(`GitLab API Hatası: ${boardsRes.statusText}`);
          const boardsData = await boardsRes.json();
          if (!boardsData || boardsData.length === 0) throw new Error("Projede aktif board bulunamadı.");
          
          pd.board = boardsData[0];
          
          let actualLists = pd.board.lists.map(l => ({
            ...l, 
            isVirtual: false, 
            isClosed: false,
            showNewIssueForm: false,
            newIssueTitle: '',
            isCreating: false
          }));
          
          actualLists.unshift({ 
            id: 'virtual-open', 
            label: { name: 'Open (Backlog)' }, 
            isVirtual: true, 
            isClosed: false,
            showNewIssueForm: false,
            newIssueTitle: '',
            isCreating: false
          });
          
          actualLists.push({ 
            id: 'virtual-closed', 
            label: { name: 'Closed' }, 
            isVirtual: true, 
            isClosed: true,
            showNewIssueForm: false,
            newIssueTitle: '',
            isCreating: false
          });
          
          pd.lists = actualLists;
          pd.issues = allIssues;
          pd.loaded = true;

        } catch (err) {
          console.error(err);
          pd.error = err.message || "Bağlantı hatası.";
        } finally {
          pd.loading = false;
        }
      },

      async createIssue(path, lst) {
        if (!lst.newIssueTitle || !lst.newIssueTitle.trim()) return;
        lst.isCreating = true;
        const encodedPath = encodeURIComponent(path);
        
        let payload = {
          title: lst.newIssueTitle.trim()
        };
        
        if (!lst.isVirtual) {
          payload.labels = lst.label.name;
        }
        
        try {
          const res = await fetch(`${this.baseUrl}/projects/${encodedPath}/issues`, {
            method: 'POST',
            headers: {
              'PRIVATE-TOKEN': this.token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });
          
          if (!res.ok) throw new Error("Oluşturulamadı");
          
          const newIssue = await res.json();
          this.projectData[path].issues.push(newIssue);
          
          lst.newIssueTitle = '';
          lst.showNewIssueForm = false;
        } catch (err) {
          alert("Hata: " + err.message);
        } finally {
          lst.isCreating = false;
        }
      },

      getIssuesForList(path, lst) {
        const pd = this.projectData[path];
        if (!pd || !pd.loaded) return [];

        if (lst.isClosed) {
          return pd.issues.filter(issue => issue.state === 'closed');
        }

        const openedIssues = pd.issues.filter(issue => issue.state === 'opened');

        if (lst.isVirtual) {
          const boardLabels = pd.board.lists.map(l => l.label.name);
          return openedIssues.filter(issue => !issue.labels.some(label => boardLabels.includes(label)));
        }

        return openedIssues.filter(issue => issue.labels && issue.labels.includes(lst.label.name));
      },

      initSortable(el) {
        if(el._sortable) return;
        el._sortable = new Sortable(el, {
          group: 'shared',
          animation: 150,
          ghostClass: 'sortable-ghost',
          dragClass: 'sortable-drag',
          onStart: function() {
            document.querySelectorAll('.sortable-list').forEach(l => l.classList.add('is-dragging-over'));
          },
          onEnd: async (evt) => {
            document.querySelectorAll('.sortable-list').forEach(l => l.classList.remove('is-dragging-over'));
            
            const itemEl = evt.item;
            const fromList = evt.from;
            const toList = evt.to;
            if (fromList === toList) return; 
            
            const issueIid = itemEl.dataset.id;
            const fromLabel = fromList.dataset.label;
            const toLabel = toList.dataset.label;
            const projectPath = toList.dataset.project; // aktif proje path'i
            const pd = this.projectData[projectPath];
            
            const isToVirtual = toList.dataset.virtual === "true";
            const isFromVirtual = fromList.dataset.virtual === "true";
            const isToClosed = toList.dataset.closed === "true";
            const isFromClosed = fromList.dataset.closed === "true";
            
            const encodedPath = encodeURIComponent(projectPath);
            let payload = {};
            
            if (isToClosed && !isFromClosed) {
              payload.state_event = 'close';
            } else if (!isToClosed && isFromClosed) {
              payload.state_event = 'reopen';
            }
            
            const addLabels = !isToVirtual && !isToClosed ? toLabel : "";
            const removeLabels = !isFromVirtual && !isFromClosed ? fromLabel : "";
            
            if (addLabels) payload.add_labels = addLabels;
            if (removeLabels) payload.remove_labels = removeLabels;
            
            try {
              const res = await fetch(`${this.baseUrl}/projects/${encodedPath}/issues/${issueIid}`, {
                method: 'PUT',
                headers: { 'PRIVATE-TOKEN': this.token, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              
              if(!res.ok) throw new Error("Update failed");
              
              const issueIndex = pd.issues.findIndex(i => i.iid == issueIid);
              if(issueIndex > -1) {
                if (payload.state_event === 'close') pd.issues[issueIndex].state = 'closed';
                if (payload.state_event === 'reopen') pd.issues[issueIndex].state = 'opened';
                
                let labels = pd.issues[issueIndex].labels;
                if(removeLabels) labels = labels.filter(l => l !== removeLabels);
                if(addLabels && !labels.includes(addLabels)) labels.push(addLabels);
                pd.issues[issueIndex].labels = labels;
              }
            } catch(e) {
              alert("Taşıma işlemi kaydedilemedi: " + e.message);
              this.fetchProjectData(projectPath); // refresh data
            }
          }
        });
      }
    }
  }
</script>
{% endblock %}
