{% extends "base.html" %}
{% block content %}
<div class="mx-auto w-full min-w-0 max-w-[1600px] space-y-5" x-data="gitlabBoards()" x-init="initBoards()">
  <div class="flex flex-col gap-2 rounded-2xl bg-white px-5 py-4 shadow-sm ring-1 ring-slate-200 dark:bg-slate-900 dark:ring-slate-700 sm:flex-row sm:items-center sm:justify-between">
    <div class="flex items-center gap-4">
      <h3 class="text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100 sm:text-2xl">git.nokta.com</h3>
      <button 
        @click="refreshActiveProject()" 
        :disabled="!activeProject || (projectData[activeProject] && projectData[activeProject].loading)" 
        class="flex items-center gap-1.5 rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 shadow-sm transition hover:bg-slate-50 hover:text-slate-900 disabled:opacity-50 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700 dark:hover:text-white"
        title="Aktif Projeyi Yenile"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" :class="(projectData[activeProject] && projectData[activeProject].loading) ? 'animate-spin' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        Yenile
      </button>
      <div x-show="activeProject" class="flex flex-wrap items-center gap-2 sm:ml-2">
        <select
          id="board-sort-mode"
          aria-label="Madde sırası"
          class="max-w-[14rem] rounded-lg border border-slate-200 bg-white px-2.5 py-1.5 text-sm font-medium text-slate-700 shadow-sm outline-none focus:border-blue-400 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200"
          :value="getSortMode(activeProject)"
          @change="onSortModeChange(activeProject, $event.target.value)"
          :disabled="!activeProject || (projectData[activeProject] && projectData[activeProject].loading)"
        >
          <template x-for="opt in sortModeOptions" :key="opt.id">
            <option :value="opt.id" x-text="opt.label" :selected="getSortMode(activeProject) === opt.id"></option>
          </template>
        </select>
        <div
          x-show="syncingSort[activeProject]"
          x-cloak
          id="board-sort-lottie-host"
          class="board-sort-lottie-host h-9 w-9 shrink-0"
          aria-hidden="true"
        ></div>
      </div>
    </div>
    <span class="inline-flex items-center gap-2 text-[12px] font-semibold">
      <template x-if="vpnStatus === 'checking'">
        <span class="inline-flex items-center gap-1.5 text-slate-400 dark:text-slate-500">
          <span class="inline-block h-2.5 w-2.5 rounded-full bg-slate-300 dark:bg-slate-600 animate-pulse"></span>
          GitLab bağlantısı kontrol ediliyor…
        </span>
      </template>
      <template x-if="vpnStatus === 'on'">
        <span class="inline-flex items-center gap-1.5 text-emerald-600 dark:text-emerald-400">
          <span class="relative inline-flex h-2.5 w-2.5">
            <span class="absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-60 animate-ping"></span>
            <span class="relative inline-flex h-2.5 w-2.5 rounded-full bg-emerald-500"></span>
          </span>
          GitLab erişilebilir
        </span>
      </template>
      <template x-if="vpnStatus === 'off'">
        <span class="inline-flex items-center gap-1.5 text-rose-600 dark:text-rose-400">
          <span class="inline-block h-2.5 w-2.5 rounded-full bg-rose-500"></span>
          <span x-text="dataMode === 'browser' && browserPat ? 'Tarayıcı → GitLab' : 'GitLab erişilemiyor'"></span>
        </span>
      </template>
    </span>
  </div>

  <div class="flex items-center gap-2 overflow-x-auto pb-2">
    <template x-for="project in configProjects" :key="project.path">
      <button
        @click="activeProject = project.path; fetchProjectData(project.path)"
        :class="tabButtonClass(project)"
        class="gl-project-tab relative inline-flex shrink-0 items-center gap-2.5 rounded-xl border px-3 py-2 text-sm font-semibold transition-all focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-slate-900 sm:px-4 sm:py-2.5"
        :title="tabSubtitle(project)"
      >
        <span class="gl-tab-icon flex h-8 w-8 shrink-0 items-center justify-center rounded-lg" :class="tabIconClass(project)">
          <template x-if="project.platform === 'web' && project.product === 'doviz'">
            <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" aria-hidden="true" role="img">
              <defs>
                <clipPath id="gl-globe-doviz"><circle cx="12" cy="12" r="10"/></clipPath>
              </defs>
              <circle cx="12" cy="12" r="10" fill="#0ea5e9"/>
              <g clip-path="url(#gl-globe-doviz)">
                <path fill="#22c55e" d="M4.5 10.2c1.8-2.4 4.6-3.6 7.2-2.8 1.4.4 2.4 1.6 2.6 3 .2 1.3-.6 2.5-1.8 3-2 1-4.4.2-5.8-1.5-.5-.6-.9-1.2-1.2-1.7z"/>
                <path fill="#4ade80" d="M13.2 6.8c2.1-.3 4.2 1 5.1 2.9.6 1.3.2 2.8-.9 3.7-1.4 1.1-3.5 1-4.8-.2-1-1-1.2-2.6-.4-3.9.5-.8 1.1-1.5 1-2.5z"/>
                <path fill="#15803d" d="M6.2 15.8c1.4-1.1 3.4-1 4.7.2 1.2 1.1 1.4 2.9.5 4.2-.7 1-2 1.4-3.2 1-1.6-.5-2.7-2.2-2.8-3.9-.1-.6.2-1.1.8-1.5z"/>
                <path fill="#fde68a" d="M15.8 13.6c1.5.2 2.8 1.2 3.2 2.6.4 1.2-.2 2.5-1.3 3.1-1.5.8-3.4.1-4-1.4-.4-1-.1-2.2.7-3.1.4-.4.9-.9 1.4-1.2z"/>
                <ellipse cx="12" cy="12" rx="10" ry="3.2" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="0.6"/>
                <path d="M2 12h20" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
              </g>
              <circle cx="12" cy="12" r="10" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.75"/>
            </svg>
          </template>
          <template x-if="project.platform === 'ios'">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16.4 3.1c-.2 1.4-.8 2.7-1.8 3.6-1 .8-2.3 1.3-3.7 1.1-.1-1.3.6-2.6 1.5-3.4.9-.7 2.2-1.2 3.5-1.3h.5zm1.1 3.1c-1.9-.1-3.5 1.1-4.4 1.1-.9 0-2.4-1-4-1-2 0-3.9 1.2-4.9 3.1-2.1 3.7-.6 9.2 1.5 12.2 1 1.5 2.2 3.2 3.8 3.1 1.5-.1 2.1-.9 4-1 1.8 0 2.3.9 3.9.9 1.6 0 2.7-1.5 3.7-3 1.1-1.7 1.6-3.3 1.6-3.4-.1 0-3.2-1.2-3.2-4.7 0-3 2.5-4.4 2.6-4.5-1.4-2.1-3.7-2.3-4.5-2.4z"/></svg>
          </template>
          <template x-if="project.platform === 'android'">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8.2 7.1 6.8 4.8a.6.6 0 1 1 1-.6l1.5 2.4a7.8 7.8 0 0 1 6.8 0l1.5-2.4a.6.6 0 1 1 1 .6l-1.4 2.3h.4c1.8 0 3.2 1.5 3.2 3.3v6.4c0 1.8-1.4 3.3-3.2 3.3H7.8c-1.8 0-3.2-1.5-3.2-3.3v-6.4c0-1.8 1.4-3.3 3.2-3.3h.4zM9.2 12.2a.9.9 0 1 0 0 1.8.9.9 0 0 0 0-1.8zm5.6 0a.9.9 0 1 0 0 1.8.9.9 0 0 0 0-1.8zM6.2 4.3V2.6m11.6 1.7V2.6"/></svg>
          </template>
          <template x-if="project.platform === 'web' && project.product === 'sinemalar'">
            <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" aria-hidden="true" role="img">
              <defs>
                <clipPath id="gl-globe-sinemalar"><circle cx="12" cy="12" r="10"/></clipPath>
              </defs>
              <circle cx="12" cy="12" r="10" fill="#7c3aed"/>
              <g clip-path="url(#gl-globe-sinemalar)">
                <path fill="#c4b5fd" d="M5 9.8c1.6-2 4-3 6.4-2.2 1.2.4 2.1 1.4 2.3 2.7.2 1.2-.5 2.3-1.6 2.8-1.8.9-4 .1-5.2-1.6-.4-.5-.7-1-.9-1.7z"/>
                <path fill="#ddd6fe" d="M14 7.2c1.9-.2 3.7 1 4.5 2.6.5 1 .2 2.2-.8 2.9-1.2.9-3 .8-4-.3-.8-.9-1-2.3-.3-3.4.4-.6.9-1.2 1.6-1.8z"/>
                <path fill="#a78bfa" d="M6.5 16c1.2-.9 2.9-.8 4 .3 1 .9 1.2 2.5.4 3.6-.6.8-1.7 1.1-2.7.7-1.4-.4-2.4-1.9-2.5-3.4 0-.4.3-.9.8-1.2z"/>
                <path fill="#f5d0fe" d="M16 14.2c1.3.2 2.4 1 2.8 2.2.3 1-.2 2.1-1.1 2.6-1.3.7-2.9 0-3.5-1.2-.3-.9 0-1.9.6-2.7.3-.3.7-.6 1.2-.9z"/>
                <ellipse cx="12" cy="12" rx="10" ry="3.2" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.6"/>
                <path d="M2 12h20" stroke="rgba(255,255,255,0.16)" stroke-width="0.5"/>
              </g>
              <circle cx="12" cy="12" r="10" fill="none" stroke="rgba(255,255,255,0.32)" stroke-width="0.75"/>
            </svg>
          </template>
        </span>
        <span class="min-w-0 text-left leading-tight">
          <span class="block truncate" x-text="project.name"></span>
          <span class="mt-0.5 block text-[10px] font-bold uppercase tracking-wider opacity-70" x-text="tabSubtitle(project)"></span>
        </span>
        <span
          x-show="projectData[project.path] && projectData[project.path].loading"
          class="ml-0.5 inline-block h-3.5 w-3.5 shrink-0 animate-spin rounded-full border-2 border-solid border-current border-r-transparent opacity-60"
        ></span>
      </button>
    </template>
  </div>

  <div id="board-container" class="min-h-[600px] rounded-2xl border border-dashed border-slate-300 p-4 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-900/50">
    
    <template x-if="activeProject && projectData[activeProject]">
      <div class="h-full">
        <div x-show="projectData[activeProject].error" class="rounded-xl border border-rose-200 bg-rose-50 p-4 text-rose-700 dark:border-rose-900/50 dark:bg-rose-900/20 dark:text-rose-400 mb-4">
          <p class="font-medium" x-text="projectData[activeProject].error"></p>
          <div class="mt-3 rounded-lg border border-rose-300/60 bg-white/50 p-3 text-xs leading-relaxed text-rose-900 dark:border-rose-800 dark:bg-black/20 dark:text-rose-100">
            <p class="font-semibold">Tüm tarayıcılar için kalıcı kurulum</p>
            <ol class="mt-2 list-decimal space-y-1 pl-4">
              <li>VPN/ofis ağında <code class="rounded bg-rose-100/80 px-1 dark:bg-rose-950/50">deploy/gitlab-relay</code> (Docker) çalıştırın.</li>
              <li>Relay’i HTTPS ile dışarı açın (Cloudflare Tunnel, nginx, vb.).</li>
              <li>Railway’de: <code class="rounded bg-rose-100/80 px-1 dark:bg-rose-950/50">GITLAB_API_BASE_URL</code> = relay URL (<code class="text-[10px]">…/api/v4</code>), <code class="rounded bg-rose-100/80 px-1 dark:bg-rose-950/50">GITLAB_RELAY_SECRET</code> + <code class="rounded bg-rose-100/80 px-1 dark:bg-rose-950/50">GITLAB_PRIVATE_TOKEN</code>.</li>
            </ol>
            <p class="mt-2 opacity-90">Bundan sonra kimse tarayıcıda token girmez; boards her oturumda sunucu üzerinden yüklenir.</p>
          </div>
        </div>

        <div x-show="projectData[activeProject].issuesTruncated" class="rounded-xl border border-amber-200 bg-amber-50 p-3 text-xs text-amber-900 dark:border-amber-800 dark:bg-amber-950/40 dark:text-amber-200 mb-4">
          Son 1 yıldaki issue listesi sayfa sınırına ulaştı; en eski kayıtlar gösterilmiyor olabilir. Yenile veya GitLab'de filtreleyin.
        </div>

        <div x-show="showBrowserSetup && browserFallbackEnabled" class="rounded-xl border border-sky-200 bg-sky-50 p-4 text-sm text-sky-950 dark:border-sky-800 dark:bg-sky-950/40 dark:text-sky-100 mb-4">
          <p class="font-semibold">Geçici: tarayıcı modu (yalnızca bu bilgisayar)</p>
          <p class="mt-1 text-xs leading-relaxed opacity-90">
            Railway sunucusu şirket içi GitLab'e TCP ile ulaşamıyor (<code class="rounded bg-white/60 px-1 dark:bg-black/40">ConnectTimeout</code>).
            Kişisel erişim token'ınızı yalnızca bu tarayıcıda saklayarak VPN üzerinden doğrudan GitLab API'sine bağlanabilirsiniz.
          </p>
          <div class="mt-3 flex flex-col gap-2 sm:flex-row sm:items-center">
            <input
              type="password"
              x-model="browserPatDraft"
              autocomplete="off"
              placeholder="GitLab Personal Access Token (read_api + api)"
              class="min-w-0 flex-1 rounded-lg border border-sky-200 bg-white px-3 py-2 text-sm dark:border-sky-700 dark:bg-slate-900"
            />
            <button
              type="button"
              @click="saveBrowserPatAndLoad()"
              class="shrink-0 rounded-lg bg-sky-700 px-4 py-2 text-sm font-semibold text-white hover:bg-sky-600"
            >
              Bağlan
            </button>
          </div>
          <p class="mt-2 text-[11px] opacity-75">Geliştirici geçici çözümü; production’da <code class="rounded bg-white/60 px-1 dark:bg-black/40">GITLAB_BOARDS_BROWSER_FALLBACK=0</code> önerilir.</p>
        </div>

        <div x-show="projectData[activeProject].loading && !projectData[activeProject].loaded && !projectData[activeProject].error" class="mt-20 text-center">
          <div class="inline-block h-8 w-8 animate-spin rounded-full border-4 border-solid border-slate-900 border-r-transparent align-[-0.125em] dark:border-white dark:border-r-transparent"></div>
          <p class="mt-4 text-slate-500 dark:text-slate-400">GitLab'den veriler çekiliyor...</p>
        </div>

        <div x-show="projectData[activeProject].loaded && !projectData[activeProject].error" class="flex h-full items-start gap-4 overflow-x-auto pb-4" id="lists-wrapper">
          <template x-for="(lst, index) in projectData[activeProject].lists" :key="lst.id">
            <div x-data="{ collapsed: getIssuesForList(activeProject, lst).length === 0 }"
                 x-init="$watch('getIssuesForList(activeProject, lst).length', val => { collapsed = (val === 0); })"
                 class="flex shrink-0 flex-col rounded-xl bg-white shadow-sm ring-1 ring-slate-200 dark:bg-slate-800 dark:ring-slate-700 border-t-4 transition-all duration-300 relative overflow-hidden group" 
                 :class="[getListColor(index, lst.isClosed), lst.isClosed ? 'opacity-75' : '', collapsed ? 'w-12 min-w-[48px] max-w-[48px] cursor-pointer' : 'gl-board-col-expanded p-3']"
                 @click="if(collapsed) collapsed = false">
              
              <!-- Collapsed Vertical Header -->
              <div x-show="collapsed" class="flex flex-col items-center pt-4 pb-2 w-full select-none text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200 absolute inset-0 z-10 pointer-events-none">
                <span class="mb-4 rounded-full bg-slate-100 px-2 py-0.5 text-xs font-bold text-slate-600 dark:bg-slate-700 dark:text-slate-300 ring-1 ring-slate-200 dark:ring-slate-600" x-text="getIssuesForList(activeProject, lst).length"></span>
                <div style="writing-mode: vertical-rl; transform: rotate(180deg);" class="text-sm font-bold uppercase tracking-widest whitespace-nowrap mt-2" x-text="lst.label.name"></div>
              </div>

              <!-- Expanded Header -->
              <h4 x-show="!collapsed" class="mb-3 flex items-center justify-between text-sm font-bold uppercase tracking-wider text-slate-800 dark:text-slate-100">
                <div class="flex items-center gap-1 overflow-hidden">
                  <button @click.stop="collapsed = true" class="shrink-0 rounded-md p-2 min-h-[44px] min-w-[44px] flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" title="Sütunu Daralt">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" /></svg>
                  </button>
                  <span x-text="lst.label.name" class="truncate pr-1"></span>
                  <button x-show="!lst.isClosed" @click.stop="lst.showNewIssueForm = true" class="ml-1 shrink-0 rounded-md p-2 min-h-[44px] min-w-[44px] flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" title="Yeni Madde Ekle">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                  </button>
                </div>
                <span class="rounded-full bg-slate-100 px-2.5 py-0.5 text-xs font-semibold text-slate-600 ring-1 ring-inset ring-slate-200 dark:bg-slate-700 dark:text-slate-300 dark:ring-slate-600 shrink-0" x-text="getIssuesForList(activeProject, lst).length"></span>
              </h4>
              
              <!-- Yeni Ekleme Formu -->
              <div x-show="!collapsed && lst.showNewIssueForm" x-transition class="mb-3 rounded-lg border border-slate-200 bg-white p-2 shadow-sm dark:border-slate-700 dark:bg-slate-900">
                <input type="text" x-model="lst.newIssueTitle" @keydown.enter="createIssue(activeProject, lst)" :disabled="lst.isCreating" placeholder="Ne yapılması gerekiyor?" class="w-full bg-transparent text-sm font-medium text-slate-900 outline-none placeholder:text-slate-400 dark:text-slate-100 dark:placeholder:text-slate-500">
                <div class="mt-2 flex justify-end gap-2">
                  <button @click="lst.showNewIssueForm = false; lst.newIssueTitle = ''" class="text-xs font-medium text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200">İptal</button>
                  <button @click="createIssue(activeProject, lst)" :disabled="!lst.newIssueTitle || !lst.newIssueTitle.trim() || lst.isCreating" class="rounded bg-blue-600 px-3 py-1 text-xs font-semibold text-white hover:bg-blue-500 disabled:opacity-50 transition">
                    <span x-show="!lst.isCreating">Ekle</span>
                    <span x-show="lst.isCreating" class="inline-block h-3 w-3 animate-spin rounded-full border-2 border-solid border-white border-r-transparent"></span>
                  </button>
                </div>
              </div>

              <div 
                class="sortable-list flex flex-col gap-2 rounded-lg border-2 border-transparent transition-colors flex-1 w-full" 
                style="min-height: 300px;"
                :data-label="lst.label.name"
                :data-virtual="lst.isVirtual"
                :data-closed="lst.isClosed"
                :data-list-key="listKey(lst)"
                :data-project="activeProject"
                x-init="initSortable($el)"
              >
                <template x-for="issue in getIssuesForList(activeProject, lst)" :key="issue.id">
                  <div 
                    class="group cursor-grab rounded-lg border border-slate-200 bg-white p-3 shadow-sm transition hover:border-blue-300 hover:shadow-md dark:border-slate-700 dark:bg-slate-900 dark:hover:border-blue-500 w-full min-w-0"
                    :class="collapsed ? 'hidden' : 'block'"
                    :data-id="issue.iid"
                  >
                    <div class="flex items-start justify-between gap-2 min-w-0 w-full">
                      <a :href="issue.web_url" target="_blank" class="text-sm font-medium leading-relaxed text-slate-900 hover:text-blue-600 dark:text-slate-100 dark:hover:text-blue-400 break-words whitespace-normal inline-block w-full" :class="issue.state === 'closed' ? 'line-through text-slate-500 dark:text-slate-500' : ''" x-text="issue.title"></a>
                    </div>
                    <div class="mt-3 flex items-center justify-between text-xs text-slate-500 dark:text-slate-400 font-medium w-full">
                      <span x-text="'#' + issue.iid"></span>
                      <template x-if="issue.assignee">
                        <div class="relative flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-blue-100 ring-2 ring-white dark:bg-blue-900/50 dark:ring-slate-900 shadow-sm overflow-hidden" :title="issue.assignee.name">
                          <span class="text-[10px] font-bold text-blue-700 dark:text-blue-300" x-text="(issue.assignee.name || '?').charAt(0).toUpperCase()"></span>
                          <img x-show="issue.assignee.avatar_url" :src="getAvatarUrl(issue.assignee.avatar_url)" @error="$el.style.display='none'" :alt="issue.assignee.name" class="absolute inset-0 h-full w-full bg-white object-cover dark:bg-slate-800">
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

  </div>
</div>

<style>
  .sortable-ghost { opacity: 0.3; transform: scale(0.98); }
  .sortable-drag { cursor: grabbing !important; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
  .sortable-list.is-dragging-over { border-color: #94a3b8; background-color: rgba(241, 245, 249, 0.8); border-style: dashed; }
  .dark .sortable-list.is-dragging-over { border-color: #475569; background-color: rgba(30, 41, 59, 0.8); }
  .gl-project-tab:not([class*='shadow']) { box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04); }
  .dark .gl-project-tab:not([class*='shadow']) { box-shadow: none; }
  .gl-board-col-expanded {
    width: min(calc(100vw - 2.5rem), 400px);
    min-width: min(calc(100vw - 2.5rem), 280px);
    max-width: 400px;
  }
  .board-sort-lottie-host {
    display: flex;
    align-items: center;
    justify-content: center;

  @media (min-width: 640px) {

<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script>
  var BOARD_SORT_LOTTIE_SRC = 'https://assets1.lottiefiles.com/packages/lf20_poqmycwy.json';
  var BOARD_SORT_SYNC_DELAY_MS = 7500;
  var _boardSortLottieAnim = null;

  function mountBoardSortLottie() {
    var host = document.getElementById('board-sort-lottie-host');
    if (!host || typeof lottie === 'undefined') return;
    unmountBoardSortLottie();
    host.textContent = '';
    _boardSortLottieAnim = lottie.loadAnimation({
      container: host,
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: BOARD_SORT_LOTTIE_SRC,
    });
  }

  function unmountBoardSortLottie() {
    if (_boardSortLottieAnim && typeof _boardSortLottieAnim.destroy === 'function') {
      try { _boardSortLottieAnim.destroy(); } catch (_) {}
    }
    _boardSortLottieAnim = null;
    var host = document.getElementById('board-sort-lottie-host');
    if (host) host.textContent = '';
  }
</script>
<script>
  function gitlabBoards() {
    return {
      gitlabApiBase: {{ gitlab_api_base | tojson }},
      gitlabWebOrigin: {{ gitlab_web_origin | tojson }},
      browserFallbackEnabled: {{ gitlab_boards_browser_fallback | tojson }},
      dataMode: 'server',
      browserPat: '',
      browserPatDraft: '',
      showBrowserSetup: false,
      configProjects: {{ projects | tojson | safe }},
      defaultProjectPath: {{ default_board_project | tojson }},
      activeProject: null,
      projectData: {},
      boardOrders: {},
      boardSortSettings: {},
      syncingSort: {},
      sortSyncTimers: {},
      sortSyncPendingMode: {},
      sortModeOptions: [
        { id: 'manual', label: 'Manuel (sürükle-bırak)' },
        { id: 'relative_position', label: 'GitLab board sırası' },
        { id: 'updated_at_desc', label: 'Son güncelleme (yeni üstte)' },
        { id: 'updated_at_asc', label: 'Son güncelleme (eski üstte)' },
        { id: 'created_at_desc', label: 'Oluşturulma (yeni üstte)' },
        { id: 'created_at_asc', label: 'Oluşturulma (eski üstte)' },
        { id: 'weight_desc', label: 'Ağırlık / öncelik (yüksek üstte)' },
      ],
      vpnStatus: 'checking',

      tabTheme(project) {
        const key = (project && project.path) || '';
        const themes = {
          'nokta/doviz': {
            active: 'bg-sky-600 text-white border-sky-600 shadow-md focus-visible:ring-sky-400',
            idle: 'bg-white text-sky-950 border-sky-200 hover:border-sky-300 hover:bg-sky-50 dark:bg-slate-800 dark:text-sky-100 dark:border-sky-900/60 dark:hover:bg-slate-700/80',
            iconActive: 'bg-white/20 text-white',
            iconIdle: 'bg-sky-100 text-sky-700 dark:bg-sky-950/70 dark:text-sky-300',
            subtitle: 'Web · Döviz',
          },
          'ios/doviz': {
            active: 'bg-orange-600 text-white border-orange-600 shadow-md focus-visible:ring-orange-400',
            idle: 'bg-white text-orange-950 border-orange-200 hover:border-orange-300 hover:bg-orange-50 dark:bg-slate-800 dark:text-orange-100 dark:border-orange-900/60 dark:hover:bg-slate-700/80',
            iconActive: 'bg-white/20 text-white',
            iconIdle: 'bg-orange-100 text-orange-700 dark:bg-orange-950/70 dark:text-orange-300',
            subtitle: 'iOS · Döviz',
          },
          'android/doviz': {
            active: 'bg-emerald-600 text-white border-emerald-600 shadow-md focus-visible:ring-emerald-400',
            idle: 'bg-white text-emerald-950 border-emerald-200 hover:border-emerald-300 hover:bg-emerald-50 dark:bg-slate-800 dark:text-emerald-100 dark:border-emerald-900/60 dark:hover:bg-slate-700/80',
            iconActive: 'bg-white/20 text-white',
            iconIdle: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-950/70 dark:text-emerald-300',
            subtitle: 'Android · Döviz',
          },
          'nokta/sinemalar': {
            active: 'bg-violet-600 text-white border-violet-600 shadow-md focus-visible:ring-violet-400',
            idle: 'bg-white text-violet-950 border-violet-200 hover:border-violet-300 hover:bg-violet-50 dark:bg-slate-800 dark:text-violet-100 dark:border-violet-900/60 dark:hover:bg-slate-700/80',
            iconActive: 'bg-white/20 text-white',
            iconIdle: 'bg-violet-100 text-violet-700 dark:bg-violet-950/70 dark:text-violet-300',
            subtitle: 'Web · Sinemalar',
          },
        };
        return themes[key] || {
          active: 'bg-blue-600 text-white border-blue-600 shadow-md focus-visible:ring-blue-400',
          idle: 'bg-white text-slate-700 border-slate-200 hover:bg-slate-50 dark:bg-slate-800 dark:text-slate-200 dark:border-slate-700 dark:hover:bg-slate-700',
          iconActive: 'bg-white/20 text-white',
          iconIdle: 'bg-slate-100 text-slate-600 dark:bg-slate-700 dark:text-slate-200',
          subtitle: project && project.name ? project.name : 'Proje',
        };
      },

      tabButtonClass(project) {
        const t = this.tabTheme(project);
        return this.activeProject === project.path ? t.active : t.idle;
      },

      tabIconClass(project) {
        const t = this.tabTheme(project);
        return this.activeProject === project.path ? t.iconActive : t.iconIdle;
      },

      tabSubtitle(project) {
        return this.tabTheme(project).subtitle;
      },

      encodeGitlabPath(path) {
        return String(path || '').replace(/\//g, '%2F');
      },

      gitlabHeaders() {
        const h = { Accept: 'application/json' };
        if (this.dataMode === 'browser' && this.browserPat) {
          h['PRIVATE-TOKEN'] = this.browserPat;
        }
        return h;
      },

      loadBrowserPatFromSession() {
        try {
          const pat = sessionStorage.getItem('seo_gitlab_pat') || '';
          if (pat) {
            this.browserPat = pat;
            this.dataMode = 'browser';
          }
        } catch (_) {}
      },

      async checkBrowserGitLab() {
        const ctrl = new AbortController();
        const timer = setTimeout(function () { ctrl.abort(); }, 12000);
        try {
          const res = await fetch(this.gitlabApiBase + '/version', {
            headers: this.gitlabHeaders(),
            signal: ctrl.signal,
          });
          clearTimeout(timer);
          return res.ok || res.status === 401;
        } catch (_) {
          clearTimeout(timer);
          return false;
        }
      },

      async saveBrowserPatAndLoad() {
        const pat = (this.browserPatDraft || '').trim();
        if (!pat) return;
        try {
          sessionStorage.setItem('seo_gitlab_pat', pat);
        } catch (_) {}
        this.browserPat = pat;
        this.browserPatDraft = '';
        this.dataMode = 'browser';
        this.showBrowserSetup = false;
        const ok = await this.checkBrowserGitLab();
        if (!ok) {
          alert('Tarayıcıdan GitLab\'e ulaşılamadı. VPN açık mı? GitLab tarafında CORS engeli de olabilir.');
          this.showBrowserSetup = true;
          return;
        }
        if (this.activeProject) {
          this.projectData[this.activeProject].loaded = false;
          this.projectData[this.activeProject].error = null;
          await this.fetchProjectData(this.activeProject, true);
        }
      },

      applyBoardData(pd, data) {
        if (!data.board) throw new Error('Projede aktif board bulunamadı.');
        pd.board = data.board;
        const openedIssues = data.opened_issues || [];
        const closedIssues = data.closed_issues || [];
        pd.issuesTruncated = !!data.issues_truncated;
        let actualLists = pd.board.lists.map(function (l) {
          return {
            ...l,
            isVirtual: false,
            isClosed: false,
            showNewIssueForm: false,
            newIssueTitle: '',
            isCreating: false,
          };
        });
        actualLists.unshift({
          id: 'virtual-open',
          label: { name: 'Open (Backlog)' },
          isVirtual: true,
          isClosed: false,
          showNewIssueForm: false,
          newIssueTitle: '',
          isCreating: false,
        });
        actualLists.push({
          id: 'virtual-closed',
          label: { name: 'Closed' },
          isVirtual: true,
          isClosed: true,
          showNewIssueForm: false,
          newIssueTitle: '',
          isCreating: false,
        });
        pd.lists = actualLists;
        pd.issues = openedIssues.concat(closedIssues);
        pd.loaded = true;
      },

      async fetchBrowserBundle(path) {
        const enc = this.encodeGitlabPath(path);
        const ctrl = new AbortController();
        const timer = setTimeout(function () { ctrl.abort(); }, 70000);
        let boardsRes;
        try {
          boardsRes = await fetch(this.gitlabApiBase + '/projects/' + enc + '/boards', {
            headers: this.gitlabHeaders(),
            signal: ctrl.signal,
          });
        } finally {
          clearTimeout(timer);
        }
        if (!boardsRes.ok) {
          throw new Error('Board alınamadı (HTTP ' + boardsRes.status + ')');
        }
        const boards = await boardsRes.json();
        if (!boards || !boards.length) {
          throw new Error('Projede aktif board bulunamadı.');
        }
        const opened = await this.fetchAllIssues(enc, 'opened', path, 25);
        const closed = await this.fetchAllIssues(enc, 'closed', path, 8);
        return {
          board: boards[0],
          opened_issues: opened.issues,
          closed_issues: closed.issues,
          issues_truncated: opened.truncated || closed.truncated,
        };
      },

      async checkVpn() {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 8000);
        try {
          const res = await fetch('/api/boards/gitlab-ping', {
            credentials: 'same-origin',
            signal: ctrl.signal,
          });
          clearTimeout(timer);
          const data = await res.json().catch(function () { return {}; });
          this.vpnStatus = res.ok && data.ok ? 'on' : 'off';
        } catch {
          clearTimeout(timer);
          this.vpnStatus = 'off';
        }
      },

      async initBoards() {
        this.loadBrowserPatFromSession();
        this.configProjects.forEach(p => {
          this.projectData[p.path] = {
            loading: false,
            loaded: false,
            error: null,
            board: null,
            lists: [],
            issues: [],
            issuesTruncated: false,
          };
        });
        if (this.configProjects.length > 0) {
          const preferred = this.configProjects.find((p) => p.path === this.defaultProjectPath);
          this.activeProject = (preferred || this.configProjects[0]).path;
        }
        await this.checkVpn();
        if (this.vpnStatus === 'off') {
          if (this.dataMode === 'browser' && this.browserPat) {
            const ok = await this.checkBrowserGitLab();
            if (!ok && this.browserFallbackEnabled) this.showBrowserSetup = true;
          } else if (this.browserFallbackEnabled) {
            this.showBrowserSetup = true;
          }
        }
        if (this.activeProject) {
          await this.fetchProjectData(this.activeProject);
        }
      },

      boardsFetch(url, timeoutMs) {
        const ms = timeoutMs == null ? 70000 : timeoutMs;
        const ctrl = new AbortController();
        const timer = setTimeout(function () { ctrl.abort(); }, ms);
        return fetch(url, {
          credentials: 'same-origin',
          cache: 'no-store',
          signal: ctrl.signal,
        }).finally(function () { clearTimeout(timer); });
      },

      refreshActiveProject() {
        if (!this.activeProject) return;
        this.projectData[this.activeProject].loaded = false;
        this.fetchProjectData(this.activeProject);
      },

      getListColor(index, isClosed) {
        if (isClosed) return 'border-t-emerald-500';
        const colors = ['border-t-slate-400', 'border-t-sky-500', 'border-t-indigo-500', 'border-t-amber-500', 'border-t-fuchsia-500', 'border-t-rose-500'];
        return colors[index % colors.length];
      },

      getAvatarUrl(url) {
        if (!url) return '';
        if (url.startsWith('http') || url.startsWith('//')) return url;
        return this.gitlabWebOrigin + (url.startsWith('/') ? '' : '/') + url;
      },

      async fetchAllIssues(encodedPath, state, projectPath, maxPages) {
        let allIssues = [];
        let page = 1;
        let truncated = false;
        const oneYearAgo = new Date();
        oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
        const updatedAfter = oneYearAgo.toISOString();
        let orderBy = 'updated_at';
        let sort = 'desc';
        if (state === 'opened') {
          const fetchParams = this.gitlabFetchOrderForProject(projectPath);
          orderBy = fetchParams.order_by;
          sort = fetchParams.sort;
        }
        const pageCap = maxPages == null ? 25 : maxPages;

        while (true) {
          const res = await fetch(
            this.gitlabApiBase + '/projects/' + encodedPath + '/issues?state=' + state +
            '&updated_after=' + encodeURIComponent(updatedAfter) +
            '&order_by=' + orderBy + '&sort=' + sort + '&per_page=100&page=' + page,
            { headers: this.gitlabHeaders() }
          );
          if (!res.ok) throw new Error('Issues fetch failed (' + state + ') HTTP ' + res.status);
          const data = await res.json();
          allIssues = allIssues.concat(data);
          if (data.length < 100) break;
          if (page >= pageCap) {
            truncated = true;
            break;
          }
          page++;
        }
        return { issues: allIssues, truncated: truncated };
      },

      gitlabFetchOrderForProject(path) {
        const mode = this.getSortMode(path);
        const map = {
          manual: { order_by: 'relative_position', sort: 'asc' },
          relative_position: { order_by: 'relative_position', sort: 'asc' },
          updated_at_desc: { order_by: 'updated_at', sort: 'desc' },
          updated_at_asc: { order_by: 'updated_at', sort: 'asc' },
          created_at_desc: { order_by: 'created_at', sort: 'desc' },
          created_at_asc: { order_by: 'created_at', sort: 'asc' },
          weight_desc: { order_by: 'weight', sort: 'desc' },
        };
        return map[mode] || map.manual;
      },

      getSortMode(path) {
        return (this.boardSortSettings[path] || {}).sort_mode || 'manual';
      },

      setSortMode(path, mode) {
        if (!this.boardSortSettings[path]) this.boardSortSettings[path] = {};
        this.boardSortSettings[path].sort_mode = mode || 'manual';
      },

      async loadBoardSortSettings(path) {
        try {
          const res = await fetch('/api/boards/sort-settings?project_path=' + encodeURIComponent(path), {
            credentials: 'same-origin',
            cache: 'no-store',
          });
          if (!res.ok) return;
          const data = await res.json();
          this.setSortMode(path, data.sort_mode || 'manual');
          if (data.sort_modes && data.sort_modes.length) {
            this.sortModeOptions = data.sort_modes;
          }
        } catch (e) {
          console.warn('Board sort settings load failed', e);
        }
      },

      async saveBoardSortSettings(path, mode) {
        const res = await fetch('/api/boards/sort-settings', {
          method: 'PUT',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ project_path: path, sort_mode: mode }),
        });
        if (!res.ok) throw new Error('Sıralama ayarı kaydedilemedi');
        const data = await res.json();
        this.setSortMode(path, data.sort_mode || mode);
      },

      parseIssueDate(value) {
        if (!value) return 0;
        const t = Date.parse(value);
        return isNaN(t) ? 0 : t;
      },

      sortIssuesByMode(issues, mode) {
        const copy = issues.slice();
        if (mode === 'manual') {
          return copy;
        }
        if (mode === 'relative_position') {
          return this.sortIssuesByPosition(copy);
        }
        if (mode === 'updated_at_desc') {
          return copy.sort((a, b) => this.parseIssueDate(b.updated_at) - this.parseIssueDate(a.updated_at));
        }
        if (mode === 'updated_at_asc') {
          return copy.sort((a, b) => this.parseIssueDate(a.updated_at) - this.parseIssueDate(b.updated_at));
        }
        if (mode === 'created_at_desc') {
          return copy.sort((a, b) => this.parseIssueDate(b.created_at) - this.parseIssueDate(a.created_at));
        }
        if (mode === 'created_at_asc') {
          return copy.sort((a, b) => this.parseIssueDate(a.created_at) - this.parseIssueDate(b.created_at));
        }
        if (mode === 'weight_desc') {
          return copy.sort((a, b) => {
            const wa = a.weight != null ? Number(a.weight) : -1;
            const wb = b.weight != null ? Number(b.weight) : -1;
            if (wb !== wa) return wb - wa;
            return this.parseIssueDate(b.updated_at) - this.parseIssueDate(a.updated_at);
          });
        }
        return this.sortIssuesByPosition(copy);
      },

      sortIssuesForDisplay(path, listKey, issues) {
        if (listKey === '__closed__') {
          return this.sortIssuesByMode(issues, 'updated_at_desc');
        }
        const mode = this.getSortMode(path);
        if (mode === 'manual') {
          return this.sortIssuesWithSavedOrder(path, listKey, issues);
        }
        return this.sortIssuesByMode(issues, mode);
      },

      getRawIssuesForList(path, lst) {
        const pd = this.projectData[path];
        if (!pd || !pd.loaded) return [];

        if (lst.isClosed) {
          return pd.issues.filter((issue) => issue.state === 'closed');
        }
        const openedIssues = pd.issues.filter((issue) => issue.state === 'opened');
        if (lst.isVirtual) {
          const boardLabels = pd.board.lists.map((l) => l.label.name);
          return openedIssues.filter(
            (issue) => !issue.labels.some((label) => boardLabels.includes(label))
          );
        }
        return openedIssues.filter(
          (issue) => issue.labels && issue.labels.includes(lst.label.name)
        );
      },

      async persistColumnOrdersFromDisplay(path) {
        const pd = this.projectData[path];
        if (!pd || !pd.loaded) return;
        for (const lst of pd.lists) {
          const lk = this.listKey(lst);
          const sorted = this.sortIssuesForDisplay(path, lk, this.getRawIssuesForList(path, lst));
          await this.saveColumnOrder(path, lk, sorted.map((i) => i.iid));
        }
      },

      async applySortToGitLab(path) {
        const pd = this.projectData[path];
        if (!pd || !pd.loaded) return;
        const mode = this.getSortMode(path);
        if (mode === 'manual') return;

        if (!this.syncingSort) this.syncingSort = {};
        this.syncingSort[path] = true;
        mountBoardSortLottie();

        try {
          await this.persistColumnOrdersFromDisplay(path);
          const columns = [];
          for (const lst of pd.lists) {
            const lk = this.listKey(lst);
            const raw = this.getRawIssuesForList(path, lst);
            const sorted = this.sortIssuesForDisplay(path, lk, raw);
            if (sorted.length <= 1) continue;
            columns.push({
              list_key: lk,
              ordered: sorted.map((i) => ({ iid: i.iid, id: i.id })),
              current: this.sortIssuesByPosition(raw).map((i) => ({ iid: i.iid, id: i.id })),
            });
          }
          if (!columns.length) return;

          const res = await fetch('/api/boards/sync-sort', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ project_path: path, columns }),
          });
          if (!res.ok) {
            console.warn('GitLab sort sync HTTP', res.status);
            return;
          }
          const data = await res.json();
          if (data && data.failed > 0) {
            console.warn('GitLab sort sync partial failure', data);
          }
        } catch (e) {
          console.warn('GitLab sort sync failed', e);
        } finally {
          this.syncingSort[path] = false;
          unmountBoardSortLottie();
        }
      },

      scheduleGitLabSortSync(path, mode) {
        if (!this.sortSyncTimers) this.sortSyncTimers = {};
        if (this.sortSyncTimers[path]) {
          clearTimeout(this.sortSyncTimers[path]);
          delete this.sortSyncTimers[path];
        }
        if (!mode || mode === 'manual') return;
        if (!this.sortSyncPendingMode) this.sortSyncPendingMode = {};
        this.sortSyncPendingMode[path] = mode;
        this.sortSyncTimers[path] = setTimeout(() => {
          delete this.sortSyncTimers[path];
          if (this.getSortMode(path) !== mode) return;
          if (this.sortSyncPendingMode[path] !== mode) return;
          this.applySortToGitLab(path);
        }, BOARD_SORT_SYNC_DELAY_MS);
      },

      async onSortModeChange(path, mode) {
        if (!path || !mode) return;
        const prev = this.getSortMode(path);
        if (mode === prev) return;

        if (this.sortSyncTimers && this.sortSyncTimers[path]) {
          clearTimeout(this.sortSyncTimers[path]);
          delete this.sortSyncTimers[path];
        }

        this.setSortMode(path, mode);
        try {
          await this.saveBoardSortSettings(path, mode);
          await this.persistColumnOrdersFromDisplay(path);
        } catch (e) {
          console.warn('Sort settings save failed', e);
          await this.loadBoardSortSettings(path);
          return;
        }

        this.scheduleGitLabSortSync(path, mode);
      },

      listKey(lst) {
        if (!lst) return '';
        if (lst.isClosed) return '__closed__';
        if (lst.isVirtual) return '__open__';
        return (lst.label && lst.label.name) ? lst.label.name : String(lst.id || '');
      },

      async loadBoardOrders(path) {
        try {
          const res = await fetch('/api/boards/order?project_path=' + encodeURIComponent(path), {
            credentials: 'same-origin',
            cache: 'no-store',
          });
          if (!res.ok) return;
          const data = await res.json();
          this.boardOrders[path] = data.orders || {};
        } catch (e) {
          console.warn('Board order load failed', e);
        }
      },

      async saveColumnOrder(path, listKey, issueIids) {
        if (!path || !listKey) return;
        const iids = (issueIids || []).map((x) => parseInt(x, 10)).filter((n) => !isNaN(n));
        if (!this.boardOrders[path]) this.boardOrders[path] = {};
        this.boardOrders[path][listKey] = iids;

        const res = await fetch('/api/boards/order', {
          method: 'PUT',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            project_path: path,
            list_key: listKey,
            issue_iids: iids,
          }),
        });
        if (!res.ok) throw new Error('Sütun sırası kaydedilemedi');
      },

      sortIssuesWithSavedOrder(path, listKey, issues) {
        const saved = (this.boardOrders[path] || {})[listKey];
        if (!saved || !saved.length) {
          return this.sortIssuesByPosition(issues);
        }
        const rank = {};
        saved.forEach((iid, i) => {
          rank[String(iid)] = i;
        });
        return issues.slice().sort((a, b) => {
          const ra = rank[String(a.iid)];
          const rb = rank[String(b.iid)];
          if (ra != null && rb != null) return ra - rb;
          if (ra != null) return -1;
          if (rb != null) return 1;
          const pa = a.relative_position ?? Number.MAX_SAFE_INTEGER;
          const pb = b.relative_position ?? Number.MAX_SAFE_INTEGER;
          if (pa !== pb) return pa - pb;
          return (a.id || 0) - (b.id || 0);
        });
      },

      friendlyFetchError(err) {
        const msg = (err && err.message) ? String(err.message) : '';
        if (err && err.name === 'AbortError') {
          return 'GitLab yanıtı zaman aşımına uğradı (70 sn). Tekrar deneyin; issue sayısı çok yüksekse Railway GITLAB erişimini kontrol edin.';
        }
        if (/failed to fetch|networkerror|load failed|aborted/i.test(msg)) {
          return 'GitLab verisi alınamadı (ağ veya sunucu). Sayfayı yenileyin; sorun sürerse GITLAB_PRIVATE_TOKEN ve sunucunun git.nokta.com erişimini kontrol edin.';
        }
        return msg || 'Bağlantı hatası.';
      },

      async fetchProjectData(path, force) {
        const pd = this.projectData[path];
        if (!pd) return;
        if (pd.loading) return;
        if (pd.loaded && !force) return;

        pd.loading = true;
        pd.error = null;

        try {
          await Promise.all([
            this.loadBoardOrders(path),
            this.loadBoardSortSettings(path),
          ]);

          if (this.dataMode === 'browser' && this.browserPat) {
            const data = await this.fetchBrowserBundle(path);
            this.applyBoardData(pd, data);
            return;
          }

          if (this.vpnStatus === 'off') {
            pd.error =
              'Panel sunucusu GitLab\'e bağlanamıyor. Kalıcı çözüm: deploy/gitlab-relay + Railway GITLAB_API_BASE_URL (tüm tarayıcılar).';
            if (this.browserFallbackEnabled) this.showBrowserSetup = true;
            return;
          }

          const fetchParams = this.gitlabFetchOrderForProject(path);
          const qs = new URLSearchParams({
            project_path: path,
            opened_order_by: fetchParams.order_by,
            opened_sort: fetchParams.sort,
          });
          const bundleRes = await this.boardsFetch('/api/boards/project-bundle?' + qs.toString(), 70000);

          const data = await bundleRes.json().catch(function () { return {}; });
          if (!bundleRes.ok || data.error) {
            const detail = data.detail ? String(data.detail) : '';
            throw new Error(data.error + (detail ? ' — ' + detail : '') || 'GitLab verisi yüklenemedi');
          }
          this.vpnStatus = 'on';
          this.applyBoardData(pd, data);

        } catch (err) {
          console.error(err);
          pd.error = this.friendlyFetchError(err);
          if (this.vpnStatus === 'checking') this.vpnStatus = 'off';
          if (this.browserFallbackEnabled) this.showBrowserSetup = true;
        } finally {
          pd.loading = false;
        }
      },

      async reorderIssueViaBackend(projectPath, issueIid, { move_after_id, move_before_id } = {}) {
        if (this.dataMode === 'browser' && this.browserPat) {
          const enc = this.encodeGitlabPath(projectPath);
          const params = new URLSearchParams();
          if (move_after_id != null) params.set('move_after_id', String(move_after_id));
          if (move_before_id != null) params.set('move_before_id', String(move_before_id));
          const url = this.gitlabApiBase + '/projects/' + enc + '/issues/' + issueIid + '/reorder' +
            (params.toString() ? '?' + params.toString() : '');
          const res = await fetch(url, { method: 'PUT', headers: this.gitlabHeaders() });
          if (!res.ok) return null;
          if (res.status === 204) {
            const ref = await fetch(
              this.gitlabApiBase + '/projects/' + enc + '/issues/' + issueIid,
              { headers: this.gitlabHeaders() }
            );
            return ref.ok ? ref.json() : null;
          }
          const text = await res.text();
          if (text && text.trim()) {
            try { return JSON.parse(text); } catch (_) {}
          }
          return null;
        }

        const body = {
          project_path: projectPath,
          issue_iid: parseInt(issueIid, 10),
        };
        if (move_after_id != null) body.move_after_id = move_after_id;
        if (move_before_id != null) body.move_before_id = move_before_id;

        const res = await fetch('/api/boards/reorder', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) return null;
        const data = await res.json();
        return data.issue || null;
      },

      getReorderParamsFromList(listEl, issueIid, projectPath) {
        const items = [...listEl.querySelectorAll('[data-id]')];
        const idx = items.findIndex(el => String(el.dataset.id) === String(issueIid));
        if (idx === -1) return null;

        const pd = this.projectData[projectPath];
        const globalId = (el) => {
          const iss = pd.issues.find(i => String(i.iid) === String(el.dataset.id));
          return iss ? iss.id : null;
        };

        const params = {};
        if (idx === 0) {
          if (items.length > 1) {
            const nextId = globalId(items[1]);
            if (nextId != null) params.move_before_id = nextId;
          }
        } else {
          const afterId = globalId(items[idx - 1]);
          if (afterId != null) params.move_after_id = afterId;
        }
        return params;
      },

      sortIssuesByPosition(issues) {
        return issues.slice().sort((a, b) => {
          const pa = a.relative_position ?? Number.MAX_SAFE_INTEGER;
          const pb = b.relative_position ?? Number.MAX_SAFE_INTEGER;
          if (pa !== pb) return pa - pb;
          return (a.id || 0) - (b.id || 0);
        });
      },

      applyIssueUpdate(pd, updated) {
        if (!updated || updated.iid == null) return;
        const idx = pd.issues.findIndex(i => i.iid == updated.iid);
        if (idx >= 0) pd.issues[idx] = { ...pd.issues[idx], ...updated };
        pd.issues = this.sortIssuesByPosition(pd.issues);
      },

      /** Sortable DOM sırasını iid listesine çevir. */
      iidsFromListEl(listEl) {
        return [...listEl.querySelectorAll('[data-id]')].map((el) => parseInt(el.dataset.id, 10)).filter((n) => !isNaN(n));
      },

      async syncIssuePosition(projectPath, listEl, issueIid) {
        const params = this.getReorderParamsFromList(listEl, issueIid, projectPath);
        if (!params || (!params.move_after_id && !params.move_before_id)) return null;
        const updated = await this.reorderIssueViaBackend(projectPath, issueIid, params);
        if (updated) this.applyIssueUpdate(this.projectData[projectPath], updated);
        return updated;
      },

      async createIssue(path, lst) {
        if (!lst.newIssueTitle || !lst.newIssueTitle.trim()) return;
        lst.isCreating = true;

        let payload = {
          project_path: path,
          title: lst.newIssueTitle.trim(),
        };

        if (!lst.isVirtual) {
          payload.labels = lst.label.name;
        }

        try {
          let newIssue;
          if (this.dataMode === 'browser' && this.browserPat) {
            const enc = this.encodeGitlabPath(path);
            const glBody = { title: lst.newIssueTitle.trim() };
            if (!lst.isVirtual && lst.label && lst.label.name) {
              glBody.labels = lst.label.name;
            }
            const res = await fetch(this.gitlabApiBase + '/projects/' + enc + '/issues', {
              method: 'POST',
              headers: { ...this.gitlabHeaders(), 'Content-Type': 'application/json' },
              body: JSON.stringify(glBody),
            });
            const raw = await res.json().catch(function () { return {}; });
            if (!res.ok || !raw.iid) {
              throw new Error(raw.message || raw.error || 'Oluşturulamadı');
            }
            newIssue = raw;
          } else {
            const res = await fetch('/api/boards/issues', {
              method: 'POST',
              credentials: 'same-origin',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });

            const data = await res.json().catch(function () { return {}; });
            if (!res.ok || !data.issue) {
              throw new Error(data.error || 'Oluşturulamadı');
            }
            newIssue = data.issue;
          }

          const pd = this.projectData[path];
          pd.issues.push(newIssue);

          const lk = this.listKey(lst);
          const existingIids = this.getIssuesForList(path, lst)
            .filter((i) => i.iid !== newIssue.iid)
            .map((i) => i.iid);
          const newOrder = [newIssue.iid, ...existingIids];
          await this.saveColumnOrder(path, lk, newOrder);

          if (existingIids.length > 0) {
            const first = pd.issues.find((i) => i.iid === existingIids[0]);
            if (first && first.id) {
              const updated = await this.reorderIssueViaBackend(path, newIssue.iid, {
                move_after_id: first.id,
              });
              if (updated) this.applyIssueUpdate(pd, updated);
            }
          }
          
          lst.newIssueTitle = '';
          lst.showNewIssueForm = false;
        } catch (err) {
          alert('Hata: ' + this.friendlyFetchError(err));
        } finally {
          lst.isCreating = false;
        }
      },

      getIssuesForList(path, lst) {
        return this.sortIssuesForDisplay(path, this.listKey(lst), this.getRawIssuesForList(path, lst));
      },

      initSortable(el) {
        if(el._sortable) return;
        el._sortable = new Sortable(el, {
          group: 'shared',
          animation: 150,
          ghostClass: 'sortable-ghost',
          dragClass: 'sortable-drag',
          onStart: function() {
            document.querySelectorAll('.sortable-list').forEach(l => l.classList.add('is-dragging-over'));
          },
          onEnd: async (evt) => {
            document.querySelectorAll('.sortable-list').forEach(l => l.classList.remove('is-dragging-over'));

            const itemEl = evt.item;
            const fromList = evt.from;
            const toList = evt.to;
            const issueIid = itemEl.dataset.id;
            const projectPath = toList.dataset.project;
            const pd = this.projectData[projectPath];
            const crossColumn = fromList !== toList;

            const isToVirtual = toList.dataset.virtual === "true";
            const isFromVirtual = fromList.dataset.virtual === "true";
            const isToClosed = toList.dataset.closed === "true";
            const isFromClosed = fromList.dataset.closed === "true";
            const fromLabel = fromList.dataset.label;
            const toLabel = toList.dataset.label;
            const toListKey = toList.dataset.listKey || '';
            const fromListKey = fromList.dataset.listKey || '';
            const oldIndex = evt.oldIndex;
            const newIndex = evt.newIndex;
            const reorderedInColumn = !crossColumn && oldIndex !== newIndex;

            const toIids = this.iidsFromListEl(toList);
            const fromIids = crossColumn ? this.iidsFromListEl(fromList) : null;
            const reorderParams = (reorderedInColumn || crossColumn)
              ? this.getReorderParamsFromList(toList, issueIid, projectPath)
              : null;

            try {
              if (crossColumn) {
                const boardLabels = (pd.board.lists || [])
                  .map((l) => l.label && l.label.name)
                  .filter(Boolean);
                const issue = pd.issues.find((i) => String(i.iid) === String(issueIid));
                let labelsToRemove = [];
                if (issue && issue.labels) {
                  labelsToRemove = issue.labels.filter((l) => boardLabels.includes(l));
                } else if (fromLabel && !isFromVirtual && !isFromClosed) {
                  labelsToRemove = [fromLabel];
                }
                const addLabel = isToVirtual || isToClosed ? '' : toLabel;
                if (addLabel) {
                  labelsToRemove = labelsToRemove.filter((l) => l !== addLabel);
                }

                const payload = {
                  project_path: projectPath,
                  issue_iid: parseInt(issueIid, 10),
                  from_label: isFromVirtual || isFromClosed ? '' : fromLabel,
                  to_label: addLabel,
                  remove_labels: labelsToRemove,
                };
                if (isToClosed && !isFromClosed) payload.state_event = 'close';
                else if (!isToClosed && isFromClosed) payload.state_event = 'reopen';

                let updated = null;
                if (this.dataMode === 'browser' && this.browserPat) {
                  const enc = this.encodeGitlabPath(projectPath);
                  const form = new URLSearchParams();
                  const addLbl = isToVirtual || isToClosed ? '' : toLabel;
                  if (addLbl) form.set('add_labels', addLbl);
                  if (labelsToRemove && labelsToRemove.length) {
                    form.set('remove_labels', labelsToRemove.join(','));
                  }
                  if (payload.state_event) form.set('state_event', payload.state_event);
                  const mv = await fetch(
                    this.gitlabApiBase + '/projects/' + enc + '/issues/' + issueIid,
                    { method: 'PUT', headers: this.gitlabHeaders(), body: form }
                  );
                  if (!mv.ok) {
                    let msg = 'Durum/etiket güncellenemedi (HTTP ' + mv.status + ')';
                    try {
                      const errBody = await mv.json();
                      if (errBody && errBody.message) msg = String(errBody.message);
                    } catch (_) {}
                    throw new Error(msg);
                  }
                  updated = await mv.json();
                } else {
                const res = await fetch('/api/boards/move', {
                  method: 'POST',
                  credentials: 'same-origin',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload),
                });
                if (!res.ok) {
                  let msg = 'Durum/etiket güncellenemedi';
                  try {
                    const errBody = await res.json();
                    if (errBody && errBody.detail) msg = errBody.detail;
                    else if (errBody && errBody.error) msg = errBody.error;
                  } catch (_) {}
                  if (res.status === 401) msg = 'Oturum süresi doldu — sayfayı yenileyin';
                  throw new Error(msg);
                }

                const moveData = await res.json();
                updated = moveData.issue;
                }

                if (updated) {
                  const issueIndex = pd.issues.findIndex(i => String(i.iid) === String(issueIid));
                  if (issueIndex > -1) {
                    pd.issues[issueIndex] = { ...pd.issues[issueIndex], ...updated };
                  }
                } else {
                  const issueIndex = pd.issues.findIndex(i => String(i.iid) === String(issueIid));
                  if (issueIndex > -1) {
                    if (payload.state_event === 'close') pd.issues[issueIndex].state = 'closed';
                    if (payload.state_event === 'reopen') pd.issues[issueIndex].state = 'opened';
                    let labels = pd.issues[issueIndex].labels || [];
                    labels = labels.filter((l) => !boardLabels.includes(l));
                    if (addLabel && !labels.includes(addLabel)) labels.push(addLabel);
                    pd.issues[issueIndex].labels = labels;
                  }
                }
              }

              if (reorderParams && (reorderParams.move_after_id || reorderParams.move_before_id)) {
                await this.reorderIssueViaBackend(projectPath, issueIid, reorderParams);
              }

              await this.saveColumnOrder(projectPath, toListKey, toIids);
              if (crossColumn && fromListKey && fromIids) {
                await this.saveColumnOrder(projectPath, fromListKey, fromIids);
              }
              if (this.getSortMode(projectPath) === 'manual' && (reorderedInColumn || crossColumn)) {
                /* Manuel modda sürükleme zaten GitLab reorder ile senkron */
              } else if (this.getSortMode(projectPath) !== 'manual') {
                await this.saveBoardSortSettings(projectPath, 'manual');
              }
            } catch (e) {
              alert("Taşıma işlemi kaydedilemedi: " + e.message);
              pd.loaded = false;
              await this.fetchProjectData(projectPath, true);
            }
          }
        });
      }
    }
  }
</script>
