{% if lazy_site_ids %}
  <div class="grid grid-cols-1 gap-4 sm:gap-5 xl:grid-cols-2 xl:items-start" data-sc-extras-root>
    {% for site_id, display_name in lazy_site_ids %}
      {% set delay_ms = loop.index0 * 250 %}
      <div
        id="sc-extra-card-{{ site_id }}"
        hx-get="/search-console/extras/{{ sc_view }}/site/{{ site_id }}"
        hx-trigger="revealed once{% if delay_ms %} delay:{{ delay_ms }}ms{% endif %}"
        hx-swap="outerHTML"
      >
        {% include "partials/sc_extras_loading_card.html" %}
      </div>
    {% endfor %}
  </div>
{% else %}
  <div class="rounded-2xl border border-dashed border-slate-300 dark:border-slate-600 p-6 text-center text-sm text-slate-500 dark:text-slate-400">
    Search Console için kayıtlı site bulunmuyor.
  </div>
{% endif %}
