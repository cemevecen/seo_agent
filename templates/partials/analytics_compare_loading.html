{# Yeşil Lottie — tarih karşılaştırması kart yenilemesi (GA4 / SC) #}
<div
  id="{{ compare_loading_id }}"
  class="seo-analytics-compare-loading mb-4 hidden rounded-2xl border border-emerald-200/90 bg-emerald-50/95 px-4 py-4 dark:border-emerald-900/50 dark:bg-emerald-950/40"
  aria-hidden="true"
  role="status"
>
  <div class="flex flex-col items-center gap-2 sm:flex-row sm:items-center sm:gap-4">
    <lottie-player
      class="seo-analytics-compare-lottie h-14 w-14 shrink-0"
      src="https://assets1.lottiefiles.com/packages/lf20_poqmycwy.json"
      background="transparent"
      speed="1"
      loop
      autoplay
    ></lottie-player>
    <div class="text-center sm:text-left">
      <p class="text-sm font-semibold text-emerald-900 dark:text-emerald-100">Karşılaştırma verisi yükleniyor</p>
      <p class="mt-0.5 text-xs text-emerald-800/80 dark:text-emerald-200/80">Geçen yıl veya özel aralık için günlük seri tamamlanıyor; kartlar paralel güncelleniyor.</p>
    </div>
  </div>
</div>
