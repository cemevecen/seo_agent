<div
  class="rounded-lg border border-slate-200 bg-slate-50/90 p-2.5 dark:border-slate-700 dark:bg-slate-900/60{% if analytics_compare_inline|default(false) %} seo-analytics-compare-inline max-w-[min(100%,11.5rem)] shrink-0 border-slate-200/80 p-1.5 dark:border-slate-700/80{% endif %}"
  data-analytics-date-compare
>
  <label class="flex cursor-pointer items-center gap-2 text-xs font-semibold text-slate-700 dark:text-slate-200">
    <input type="checkbox" data-compare-enabled class="rounded border-slate-300 dark:border-slate-600" />
    Tarih karşılaştırması
  </label>
  <select
    data-compare-mode
    class="mt-2 w-full max-w-[14rem] cursor-pointer rounded-lg border border-slate-300 bg-white px-2 py-1.5 text-[11px] font-semibold text-slate-800 dark:border-zinc-600 dark:bg-zinc-900 dark:text-zinc-100"
    disabled
    aria-label="Karşılaştırma modu"
  >
    <option value="previous_period">Önceki dönem (aynı uzunluk)</option>
    <option value="previous_year">Geçen yıl (aynı tarihler)</option>
    <option value="custom">Özel karşılaştırma aralığı</option>
  </select>
  <div data-compare-custom class="mt-2 hidden grid max-w-[14rem] grid-cols-2 gap-2">
    <input
      type="date"
      data-compare-start
      class="rounded-lg border border-slate-300 px-2 py-1 text-[11px] dark:border-slate-600 dark:bg-slate-950"
      disabled
    />
    <input
      type="date"
      data-compare-end
      class="rounded-lg border border-slate-300 px-2 py-1 text-[11px] dark:border-slate-600 dark:bg-slate-950"
      disabled
    />
  </div>
  <div
    data-compare-loading
    class="seo-analytics-compare-loading mt-2 hidden max-w-[14rem] rounded-lg border border-emerald-200/90 bg-emerald-50/95 px-2 py-1.5 dark:border-emerald-900/50 dark:bg-emerald-950/50"
    aria-hidden="true"
    role="status"
  >
    <div class="flex items-center gap-2">
      <lottie-player
        class="seo-analytics-compare-lottie shrink-0"
        src="https://assets1.lottiefiles.com/packages/lf20_poqmycwy.json"
        background="transparent"
        speed="1"
        loop
        autoplay
        style="width: 2.25rem; height: 2.25rem; display: block"
      ></lottie-player>
      <p class="min-w-0 text-[11px] font-medium leading-snug text-emerald-900 dark:text-emerald-100">
        Karşılaştırma verisi yükleniyor…
      </p>
    </div>
  </div>
</div>
