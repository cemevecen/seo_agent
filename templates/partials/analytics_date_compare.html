<div
  class="rounded-lg border border-slate-200 bg-slate-50/90 p-2.5 dark:border-slate-700 dark:bg-slate-900/60"
  data-analytics-date-compare
>
  <label class="flex cursor-pointer items-center gap-2 text-xs font-semibold text-slate-700 dark:text-slate-200">
    <input type="checkbox" data-compare-enabled class="rounded border-slate-300 dark:border-slate-600" />
    Tarih karşılaştırması
  </label>
  <select
    data-compare-mode
    class="mt-2 w-full max-w-[14rem] cursor-pointer rounded-lg border border-slate-300 bg-white px-2 py-1.5 text-[11px] font-semibold text-slate-800 dark:border-zinc-600 dark:bg-zinc-950 dark:text-zinc-100"
    disabled
    aria-label="Karşılaştırma modu"
  >
    <option value="previous_period">Önceki dönem (aynı uzunluk)</option>
    <option value="previous_year">Geçen yıl (aynı tarihler)</option>
    <option value="custom">Özel karşılaştırma aralığı</option>
  </select>
  <div data-compare-custom class="mt-2 hidden grid max-w-[14rem] grid-cols-2 gap-2">
    <input
      type="date"
      data-compare-start
      class="rounded-lg border border-slate-300 px-2 py-1 text-[11px] dark:border-slate-600 dark:bg-slate-950"
      disabled
    />
    <input
      type="date"
      data-compare-end
      class="rounded-lg border border-slate-300 px-2 py-1 text-[11px] dark:border-slate-600 dark:bg-slate-950"
      disabled
    />
  </div>
</div>
