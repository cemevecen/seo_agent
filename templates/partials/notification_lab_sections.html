<section id="nt-lab-root" class="mt-10 space-y-5 border-t-4 border-indigo-300 pt-8 dark:border-indigo-800">
  <div class="rounded-xl border border-indigo-200 bg-indigo-50/80 p-4 dark:border-indigo-800 dark:bg-indigo-950/30">
    <h2 class="text-lg font-extrabold text-slate-900 dark:text-zinc-100">Analytics Lab</h2>
  </div>

  <div class="nt-lab-section rounded-2xl border border-slate-200 bg-white p-4 dark:border-zinc-700 dark:bg-zinc-900" data-lab-name="Pareto Görünümü">
    <h3 class="text-sm font-bold text-slate-800 dark:text-zinc-100">Pareto Görünümü</h3>
    <div class="mt-2 flex flex-wrap items-center gap-2 text-xs">
      <label class="font-semibold text-slate-600 dark:text-zinc-300">Top N</label>
      <input id="nt-lab-pareto-n" type="number" min="5" max="200" value="30" class="w-20 rounded border border-slate-300 px-2 py-1 dark:border-zinc-600 dark:bg-zinc-900" />
    </div>
    <div id="nt-lab-pareto" class="mt-3 h-[300px]"></div>
    <p id="nt-lab-pareto-summary" class="mt-2 text-xs text-slate-600 dark:text-zinc-400"></p>
  </div>

  <div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
    <div class="nt-lab-section rounded-2xl border border-slate-200 bg-white p-4 dark:border-zinc-700 dark:bg-zinc-900" data-lab-name="Kalite Listesi">
      <h3 class="text-sm font-bold text-amber-700 dark:text-amber-400">[Kalite Listesi] Yüksek impression, düşük CTR</h3>
      <div id="nt-lab-quality" class="mt-3 space-y-2 text-xs"></div>
    </div>
    <div class="nt-lab-section rounded-2xl border border-slate-200 bg-white p-4 dark:border-zinc-700 dark:bg-zinc-900" data-lab-name="Fırsat Listesi">
      <h3 class="text-sm font-bold text-sky-700 dark:text-sky-400">[Fırsat Listesi] Düşük impression, yüksek CTR</h3>
      <div id="nt-lab-opportunity" class="mt-3 space-y-2 text-xs"></div>
    </div>
  </div>

  <div class="nt-lab-section rounded-2xl border border-slate-200 bg-white p-4 dark:border-zinc-700 dark:bg-zinc-900" data-lab-name="Pivot Builder">
    <h3 class="text-sm font-bold text-slate-800 dark:text-zinc-100">Mini pivot</h3>
    <div class="mt-3 flex flex-wrap gap-2 text-xs">
      <select id="nt-lab-pivot-row" class="rounded border border-slate-300 px-2 py-1 dark:border-zinc-600 dark:bg-zinc-900">
        <option value="day">Satır: Gün</option>
        <option value="headline">Satır: Başlık</option>
        <option value="platform">Satır: Platform</option>
      </select>
      <select id="nt-lab-pivot-col" class="rounded border border-slate-300 px-2 py-1 dark:border-zinc-600 dark:bg-zinc-900">
        <option value="platform">Kolon: Platform</option>
        <option value="day">Kolon: Gün</option>
        <option value="headline">Kolon: Başlık</option>
      </select>
      <select id="nt-lab-pivot-metric" class="rounded border border-slate-300 px-2 py-1 dark:border-zinc-600 dark:bg-zinc-900">
        <option value="click">Metrik: Click</option>
        <option value="impression">Metrik: Impression</option>
        <option value="ctr">Metrik: CTR %</option>
      </select>
      <button type="button" id="nt-lab-pivot-run" class="rounded-lg bg-slate-900 px-3 py-1.5 font-bold text-white dark:bg-zinc-200 dark:text-zinc-900">Pivot üret</button>
    </div>
    <div id="nt-lab-pivot-out" class="mt-3 overflow-x-auto text-xs"></div>
  </div>

  <div class="nt-lab-section rounded-2xl border border-slate-200 bg-white p-4 dark:border-zinc-700 dark:bg-zinc-900" data-lab-name="Kısa İçgörü Kartları">
    <h3 class="text-sm font-bold text-slate-800 dark:text-zinc-100">Otomatik özet</h3>
    <style>
      .nt-insight-panels {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      @media (min-width: 768px) {
        .nt-insight-panels { grid-template-columns: repeat(2, 1fr); }
      }
      .nt-insight-panel {
        position: relative;
        overflow: hidden;
        border-radius: 1rem;
        border: 1px solid rgb(226 232 240);
        padding: 0.85rem 0.9rem 0.9rem;
        background: linear-gradient(135deg, rgb(248 250 252) 0%, rgb(255 255 255) 60%);
        box-shadow: 0 8px 24px -18px rgba(15, 23, 42, 0.4);
      }
      html.dark .nt-insight-panel {
        border-color: rgb(63 63 70);
        background: linear-gradient(135deg, rgb(24 24 27) 0%, rgb(39 39 42) 65%);
      }
      .nt-insight-panel-head {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        margin-bottom: 0.65rem;
      }
      .nt-insight-panel--trend .nt-insight-panel-head { border-bottom: 1px solid rgb(199 210 254); padding-bottom: 0.5rem; }
      .nt-insight-panel--alert .nt-insight-panel-head { border-bottom: 1px solid rgb(254 202 202); padding-bottom: 0.5rem; }
      html.dark .nt-insight-panel--trend .nt-insight-panel-head { border-bottom-color: rgb(67 56 202); }
      html.dark .nt-insight-panel--alert .nt-insight-panel-head { border-bottom-color: rgb(127 29 29); }
      .nt-insight-panel-title {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: rgb(30 41 59);
      }
      html.dark .nt-insight-panel-title { color: rgb(244 244 245); }
      .nt-insight-panel--trend .nt-insight-panel-title { color: rgb(67 56 202); }
      html.dark .nt-insight-panel--trend .nt-insight-panel-title { color: rgb(165 180 252); }
      .nt-insight-panel--alert .nt-insight-panel-title { color: rgb(185 28 28); }
      html.dark .nt-insight-panel--alert .nt-insight-panel-title { color: rgb(252 165 165); }
      .nt-insight-panel-media {
        position: relative;
        flex: 0 0 auto;
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 0.65rem;
        overflow: hidden;
        background: rgb(255 255 255 / 0.7);
      }
      html.dark .nt-insight-panel-media { background: rgb(24 24 27 / 0.8); }
      .nt-insight-panel-media .nt-insight-lottie {
        position: absolute;
        inset: 0;
        width: 100% !important;
        height: 100% !important;
      }
      .nt-insight-panel-list {
        margin: 0;
        padding-left: 1.1rem;
        list-style: disc;
      }
      .nt-insight-panel-list li {
        margin: 0.35rem 0;
        font-size: 11px;
        line-height: 1.45;
        color: rgb(71 85 105);
      }
      html.dark .nt-insight-panel-list li { color: rgb(161 161 170); }
      .nt-insight-card {
        position: relative;
        display: flex;
        align-items: flex-start;
        gap: clamp(0.5rem, 2.5vw, 0.75rem);
        overflow: hidden;
        border-radius: 1rem;
        border: 1px solid rgb(226 232 240);
        padding: clamp(0.65rem, 2vw, 0.9rem);
        min-height: 5.25rem;
        background: linear-gradient(135deg, rgb(248 250 252) 0%, rgb(255 255 255) 55%);
        box-shadow: 0 8px 24px -18px rgba(15, 23, 42, 0.45);
      }
      .nt-insight-media {
        position: relative;
        flex: 0 0 auto;
        width: clamp(2.75rem, 14vw, 3.75rem);
        height: clamp(2.75rem, 14vw, 3.75rem);
        min-width: 2.75rem;
        min-height: 2.75rem;
        border-radius: 0.75rem;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgb(255 255 255 / 0.55);
      }
      html.dark .nt-insight-media {
        background: rgb(24 24 27 / 0.65);
      }
      .nt-insight-content {
        flex: 1 1 auto;
        min-width: 0;
      }
      html.dark .nt-insight-card {
        border-color: rgb(63 63 70);
        background: linear-gradient(135deg, rgb(24 24 27) 0%, rgb(39 39 42) 60%);
        box-shadow: 0 10px 28px -20px rgba(0, 0, 0, 0.65);
      }
      .nt-insight-card::before {
        content: "";
        position: absolute;
        inset: -40% auto auto -30%;
        width: 120px;
        height: 120px;
        border-radius: 9999px;
        opacity: 0.35;
        filter: blur(8px);
        pointer-events: none;
      }
      .nt-insight-card--up::before { background: rgb(34 197 94); }
      .nt-insight-card--down::before { background: rgb(244 63 94); }
      .nt-insight-card--warn::before { background: rgb(245 158 11); }
      .nt-insight-card--info::before { background: rgb(99 102 241); }
      .nt-insight-card--alert::before { background: rgb(239 68 68); }
      .nt-insight-lottie {
        position: absolute;
        inset: 0;
        width: 100% !important;
        height: 100% !important;
        max-width: 100%;
        max-height: 100%;
        margin: 0;
        display: block;
      }
      .nt-insight-lottie-fallback {
        position: absolute;
        inset: 12%;
        width: auto;
        height: auto;
        margin: 0;
        border-radius: 9999px;
        border: 2px solid currentColor;
        opacity: 0.35;
        animation: nt-insight-pulse 1.4s ease-in-out infinite;
        pointer-events: none;
      }
      .nt-insight-card--up .nt-insight-lottie-fallback { color: rgb(34 197 94); }
      .nt-insight-card--down .nt-insight-lottie-fallback { color: rgb(244 63 94); }
      .nt-insight-card--warn .nt-insight-lottie-fallback { color: rgb(245 158 11); }
      .nt-insight-card--info .nt-insight-lottie-fallback { color: rgb(99 102 241); }
      .nt-insight-card--alert .nt-insight-lottie-fallback { color: rgb(239 68 68); }
      @keyframes nt-insight-pulse {
        0%, 100% { transform: scale(0.92); opacity: 0.25; }
        50% { transform: scale(1.08); opacity: 0.55; }
      }
      .nt-insight-badge {
        display: inline-flex;
        align-items: center;
        border-radius: 9999px;
        padding: 0.1rem 0.45rem;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin-bottom: 0.25rem;
      }
      .nt-insight-card--up .nt-insight-badge { background: rgb(220 252 231); color: rgb(21 128 61); }
      .nt-insight-card--down .nt-insight-badge { background: rgb(255 228 230); color: rgb(190 18 60); }
      .nt-insight-card--warn .nt-insight-badge { background: rgb(254 243 199); color: rgb(180 83 9); }
      .nt-insight-card--info .nt-insight-badge { background: rgb(224 231 255); color: rgb(67 56 202); }
      .nt-insight-card--alert .nt-insight-badge { background: rgb(254 226 226); color: rgb(185 28 28); }
      html.dark .nt-insight-card--up .nt-insight-badge { background: rgb(20 83 45 / 0.5); color: rgb(134 239 172); }
      html.dark .nt-insight-card--down .nt-insight-badge { background: rgb(136 19 55 / 0.45); color: rgb(251 113 133); }
      html.dark .nt-insight-card--warn .nt-insight-badge { background: rgb(120 53 15 / 0.45); color: rgb(252 211 77); }
      html.dark .nt-insight-card--info .nt-insight-badge { background: rgb(49 46 129 / 0.45); color: rgb(165 180 252); }
      html.dark .nt-insight-card--alert .nt-insight-badge { background: rgb(127 29 29 / 0.45); color: rgb(252 165 165); }
      .nt-insight-title { font-size: 11px; font-weight: 800; color: rgb(30 41 59); }
      html.dark .nt-insight-title { color: rgb(244 244 245); }
      .nt-insight-body { margin-top: 0.2rem; font-size: 11px; line-height: 1.45; color: rgb(71 85 105); }
      html.dark .nt-insight-body { color: rgb(161 161 170); }
    </style>
    <div id="nt-lab-insights" class="nt-insight-panels mt-3"></div>
  </div>
</section>
<script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.12/dist/lottie-player.js" async></script>
