<section id="nt-lab-root" class="mt-10 space-y-5 border-t-4 border-indigo-300 pt-8 dark:border-indigo-800">
  <div class="rounded-xl border border-indigo-200 bg-indigo-50/80 p-4 dark:border-indigo-800 dark:bg-indigo-950/30">
    <h2 class="text-lg font-extrabold text-slate-900 dark:text-zinc-100">Analytics Lab</h2>
    <p class="mt-1 text-xs text-slate-600 dark:text-zinc-400">Üstteki filtre ve metrik seçimleri bu alanlara da uygulanır.</p>
  </div>

  <div class="nt-lab-section rounded-2xl border border-slate-200 bg-white p-4 dark:border-zinc-700 dark:bg-zinc-900" data-lab-name="Pareto Görünümü">
    <h3 class="text-sm font-bold text-slate-800 dark:text-zinc-100">[Pareto Görünümü] Top başlık trafik payı</h3>
    <div class="mt-2 flex flex-wrap items-center gap-2 text-xs">
      <label class="font-semibold text-slate-600 dark:text-zinc-300">Top N</label>
      <input id="nt-lab-pareto-n" type="number" min="5" max="200" value="30" class="w-20 rounded border border-slate-300 px-2 py-1 dark:border-zinc-600 dark:bg-zinc-900" />
    </div>
    <div id="nt-lab-pareto" class="mt-3 h-[300px]"></div>
    <p id="nt-lab-pareto-summary" class="mt-2 text-xs text-slate-600 dark:text-zinc-400"></p>
  </div>

  <div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
    <div class="nt-lab-section rounded-2xl border border-slate-200 bg-white p-4 dark:border-zinc-700 dark:bg-zinc-900" data-lab-name="Kalite Listesi">
      <h3 class="text-sm font-bold text-amber-700 dark:text-amber-400">[Kalite Listesi] Yüksek impression, düşük CTR</h3>
      <div id="nt-lab-quality" class="mt-3 space-y-2 text-xs"></div>
    </div>
    <div class="nt-lab-section rounded-2xl border border-slate-200 bg-white p-4 dark:border-zinc-700 dark:bg-zinc-900" data-lab-name="Fırsat Listesi">
      <h3 class="text-sm font-bold text-sky-700 dark:text-sky-400">[Fırsat Listesi] Düşük impression, yüksek CTR</h3>
      <div id="nt-lab-opportunity" class="mt-3 space-y-2 text-xs"></div>
    </div>
  </div>

  <div class="nt-lab-section rounded-2xl border border-slate-200 bg-white p-4 dark:border-zinc-700 dark:bg-zinc-900" data-lab-name="Pivot Builder">
    <h3 class="text-sm font-bold text-slate-800 dark:text-zinc-100">[Pivot Builder] Mini pivot</h3>
    <div class="mt-3 flex flex-wrap gap-2 text-xs">
      <select id="nt-lab-pivot-row" class="rounded border border-slate-300 px-2 py-1 dark:border-zinc-600 dark:bg-zinc-900">
        <option value="day">Satır: Gün</option>
        <option value="headline">Satır: Başlık</option>
        <option value="platform">Satır: Platform</option>
      </select>
      <select id="nt-lab-pivot-col" class="rounded border border-slate-300 px-2 py-1 dark:border-zinc-600 dark:bg-zinc-900">
        <option value="platform">Kolon: Platform</option>
        <option value="day">Kolon: Gün</option>
        <option value="headline">Kolon: Başlık</option>
      </select>
      <select id="nt-lab-pivot-metric" class="rounded border border-slate-300 px-2 py-1 dark:border-zinc-600 dark:bg-zinc-900">
        <option value="click">Metrik: Click</option>
        <option value="impression">Metrik: Impression</option>
        <option value="ctr">Metrik: CTR %</option>
      </select>
      <button type="button" id="nt-lab-pivot-run" class="rounded-lg bg-slate-900 px-3 py-1.5 font-bold text-white dark:bg-zinc-200 dark:text-zinc-900">Pivot üret</button>
    </div>
    <div id="nt-lab-pivot-out" class="mt-3 overflow-x-auto text-xs"></div>
  </div>

  <div class="nt-lab-section rounded-2xl border border-slate-200 bg-white p-4 dark:border-zinc-700 dark:bg-zinc-900" data-lab-name="Kısa İçgörü Kartları">
    <h3 class="text-sm font-bold text-slate-800 dark:text-zinc-100">[Kısa İçgörü Kartları] Otomatik özet</h3>
    <div id="nt-lab-insights" class="mt-3 grid grid-cols-1 gap-2 sm:grid-cols-2"></div>
  </div>
</section>
