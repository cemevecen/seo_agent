<section id="nt-lab-root" class="mt-10 space-y-5 border-t-4 border-indigo-300 pt-8 dark:border-indigo-800">
  <div class="rounded-xl border border-indigo-200 bg-indigo-50/80 p-4 dark:border-indigo-800 dark:bg-indigo-950/30">
    <h2 class="text-lg font-extrabold text-slate-900 dark:text-slate-300">Analytics Lab</h2>
    <p class="mt-1 text-xs text-slate-600 dark:text-slate-400">Seçili tarih aralığı ve filtreler ana sayfa ile aynıdır.</p>
  </div>

  <div class="nt-lab-section rounded-2xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900" data-lab-name="Gönderim parmak izi">
    <h3 class="text-sm font-bold text-slate-800 dark:text-slate-300">Gönderim parmak izi — kronoloji</h3>
    <p class="mt-0.5 text-[11px] text-slate-500 dark:text-slate-400">
      Tüm gönderimler · en yeni üstte, aşağı indikçe eskiye · Android · iOS · Web · MWeb payı.
    </p>
    <div class="mt-2 flex flex-wrap gap-3 text-[10px] text-slate-500 dark:text-slate-400">
      <span class="inline-flex items-center gap-1"><span class="nt-lab-legend-swatch nt-lab-dna-seg-android"></span> Android</span>
      <span class="inline-flex items-center gap-1"><span class="nt-lab-legend-swatch nt-lab-dna-seg-ios"></span> iOS</span>
      <span class="inline-flex items-center gap-1"><span class="nt-lab-legend-swatch nt-lab-dna-seg-desktop"></span> Web</span>
      <span class="inline-flex items-center gap-1"><span class="nt-lab-legend-swatch nt-lab-dna-seg-mweb"></span> MWeb</span>
    </div>
    <div id="nt-lab-dna-chrono" class="nt-lab-dna-chrono-scroll mt-4 text-xs"></div>
    <p id="nt-lab-dna-hint" class="mt-2 text-[10px] text-slate-500 dark:text-slate-500"></p>
  </div>

  <div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
    <div class="nt-lab-section rounded-2xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900" data-lab-name="Kalite Listesi">
      <h3 class="text-sm font-bold text-amber-700 dark:text-amber-400">Yüksek impression, düşük CTR</h3>
      <div id="nt-lab-quality" class="mt-3 space-y-2 text-xs"></div>
    </div>
    <div class="nt-lab-section rounded-2xl border border-slate-200 bg-white p-4 dark:border-slate-700 dark:bg-slate-900" data-lab-name="Fırsat Listesi">
      <h3 class="text-sm font-bold text-sky-700 dark:text-sky-400">Düşük impression, yüksek CTR</h3>
      <div id="nt-lab-opportunity" class="mt-3 space-y-2 text-xs"></div>
    </div>
  </div>

  <style>
    .notification-page .nt-lab-dna-chrono-scroll {
      scroll-behavior: smooth;
    }
    .notification-page .nt-lab-dna-bar {
      display: flex;
      height: 0.75rem;
      width: 100%;
      overflow: hidden;
      border-radius: 4px;
      background: rgb(241 245 249);
    }
    html.dark .notification-page .nt-lab-dna-bar {
      background: rgb(39 39 42);
    }
    .notification-page .nt-lab-dna-bar-lg {
      height: 1rem;
    }
    .notification-page .nt-lab-legend-swatch {
      display: inline-block;
      width: 0.65rem;
      height: 0.65rem;
      border-radius: 2px;
    }
    .notification-page .nt-lab-dna-seg-android { background: #15803d; }
    html.dark .notification-page .nt-lab-dna-seg-android { background: #4a8f73; }
    .notification-page .nt-lab-dna-seg-ios { background: #b91c3c; }
    html.dark .notification-page .nt-lab-dna-seg-ios { background: #a85a66; }
    .notification-page .nt-lab-dna-seg-desktop { background: #5b5f9e; }
    html.dark .notification-page .nt-lab-dna-seg-desktop { background: #7a7da8; }
    .notification-page .nt-lab-dna-seg-mweb { background: #b8732e; }
    html.dark .notification-page .nt-lab-dna-seg-mweb { background: #a67c3d; }
    .notification-page .nt-lab-chrono-item {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    .notification-page .nt-lab-chrono-item.is-revealed {
      opacity: 1;
      transform: translateY(0);
    }
    .notification-page .nt-lab-chrono-rail {
      width: 10px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 0.35rem;
    }
    .notification-page .nt-lab-chrono-dot {
      width: 8px;
      height: 8px;
      border-radius: 9999px;
      background: #5b5f9e;
      flex-shrink: 0;
    }
    html.dark .notification-page .nt-lab-chrono-dot {
      background: #7a7da8;
    }
    .notification-page .nt-lab-chrono-line {
      flex: 1;
      width: 2px;
      min-height: 1.25rem;
      margin-top: 2px;
      background: rgb(203 213 225);
    }
    html.dark .notification-page .nt-lab-chrono-line {
      background: rgb(63 63 70);

      flex: 1;
      min-width: 0;
      padding-bottom: 1rem;
    }
    .notification-page .nt-lab-chrono-day-gap {
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      margin: 0;
      padding: 0;
      border: none;
      transition: opacity 0.35s ease, max-height 0.35s ease, margin 0.35s ease, padding 0.35s ease;
    }
    .notification-page .nt-lab-chrono-day-gap.is-revealed {
      opacity: 1;
      max-height: 4rem;
      margin-top: 0.75rem;
      padding-top: 0.5rem;
      border-top: 1px dashed rgb(226 232 240);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgb(100 116 139);
    }
    html.dark .notification-page .nt-lab-chrono-day-gap.is-revealed {
      border-top-color: rgb(63 63 70);
      color: rgb(161 161 170);
    }
  </style>
</section>
