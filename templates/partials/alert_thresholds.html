<div class="-mx-1 min-w-0 overflow-x-auto rounded-lg border border-slate-200 bg-slate-50/30 [scrollbar-width:thin] dark:border-slate-700 dark:bg-slate-950/20 sm:mx-0">
  <table class="w-full min-w-[480px] text-left text-xs sm:text-sm">
    <thead class="sticky top-0 z-[1] bg-slate-50 text-slate-600 shadow-sm dark:bg-slate-900 dark:text-slate-300">
      <tr>
        <th class="min-w-[6rem] px-2 py-2 font-medium sm:px-3">Site</th>
        <th class="min-w-[8rem] px-2 py-2 font-medium sm:px-3">Alert Türü</th>
        <th class="px-2 py-2 font-medium sm:px-3">Eşik</th>
        <th class="px-2 py-2 font-medium sm:px-3">Aktif</th>
        <th class="px-2 py-2 font-medium sm:px-3">İşlem</th>
      </tr>
    </thead>
    <tbody>
      {% for item in alert_rules %}
        <tr class="border-b border-slate-100 dark:border-slate-800">
          <td class="max-w-[12rem] break-words px-2 py-2 font-medium text-slate-900 dark:text-slate-100 sm:px-3">{{ item.domain }}</td>
          <td class="break-words px-2 py-2 text-slate-700 dark:text-slate-200 sm:px-3">{{ item.alert_type }}</td>
          <td class="px-2 py-2 sm:px-3">
            <input id="threshold-{{ item.id }}" type="number" step="0.1" value="{{ item.threshold }}" class="w-full max-w-[7rem] rounded-md border border-slate-300 dark:border-slate-600 px-2 py-1" />
          </td>
          <td class="px-2 py-2 sm:px-3">
            <input id="active-{{ item.id }}" type="checkbox" {% if item.is_active %}checked{% endif %} class="rounded border-slate-300 dark:border-slate-600" />
          </td>
          <td class="px-2 py-2 sm:px-3">
            <button
              type="button"
              class="whitespace-nowrap rounded-md border border-slate-300 px-3 py-1 text-xs font-medium text-slate-700 hover:bg-slate-100 dark:border-slate-600 dark:text-slate-200 dark:hover:bg-slate-800/70"
              onclick="updateAlertRule({{ item.id }})"
            >
              Kaydet
            </button>
          </td>
        </tr>
      {% else %}
        <tr>
          <td colspan="5" class="px-3 py-6 text-center text-slate-500 dark:text-slate-400">Henüz alert kuralı yok.</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
