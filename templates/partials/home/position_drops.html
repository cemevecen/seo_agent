<div class="flex items-center justify-between gap-2">
  <h4 class="text-sm font-semibold uppercase tracking-wider text-slate-700 dark:text-slate-200">En Kritik Pozisyon Düşüşleri · 7g</h4>
  <a href="/search-console" hx-get="/search-console" hx-target="#content" hx-swap="innerHTML" hx-push-url="true"
     class="text-xs font-semibold text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-slate-100">Detay →</a>
</div>
<div class="mt-3 grid grid-cols-1 gap-3 lg:grid-cols-2">
  {% for site in sites %}
    <div class="rounded-xl border bg-white p-3 dark:bg-slate-900 {% if 'doviz' in site.domain %}border-blue-200 dark:border-blue-900/60{% elif 'sinemalar' in site.domain %}border-rose-200 dark:border-rose-900/60{% else %}border-slate-200 dark:border-slate-700{% endif %}">
      <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">{{ site.display_name }}</p>
      {% if site.drops %}
        <ul class="mt-2 space-y-1.5">
          {% for d in site.drops %}
            <li class="flex items-start justify-between gap-2 rounded-lg bg-slate-50 px-2.5 py-1.5 dark:bg-slate-800/60">
              <span class="min-w-0 flex-1 truncate text-xs font-medium text-slate-800 dark:text-slate-100" title="{{ d.query }}">{{ d.query }}</span>
              <span class="shrink-0 text-[11px] font-semibold text-rose-600 dark:text-rose-400 tabular-nums">{{ d.pos_prev }} → {{ d.pos_cur }} <span class="text-rose-500">(+{{ d.diff_fmt }})</span></span>
            </li>
          {% endfor %}
        </ul>
      {% else %}
        <p class="mt-3 text-center text-xs text-slate-400 dark:text-slate-500">Kritik düşüş yok</p>
      {% endif %}
    </div>
  {% endfor %}
</div>
