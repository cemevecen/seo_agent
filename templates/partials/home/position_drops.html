<div class="flex items-center justify-between gap-3">
  <h3 class="text-sm font-semibold text-slate-900 dark:text-slate-100">En Kritik Pozisyon Düşüşleri · 7g</h3>
  <a href="/search-console" hx-get="/search-console" hx-target="#content" hx-swap="innerHTML" hx-push-url="true"
     class="text-xs font-medium text-slate-500 transition hover:text-slate-900 dark:text-slate-400 dark:hover:text-slate-100">Detay →</a>
</div>
{% if sites and sites[0] and sites[0].drops %}
  <ul class="mt-4 divide-y divide-slate-100 dark:divide-slate-800">
    {% for d in sites[0].drops %}
      <li class="flex items-start justify-between gap-3 py-2 first:pt-0 last:pb-0">
        <span class="min-w-0 flex-1 truncate text-xs text-slate-700 dark:text-slate-300" title="{{ d.query }}">{{ d.query }}</span>
        <span class="shrink-0 text-xs font-medium tabular-nums text-slate-500 dark:text-slate-400">
          <span>{{ d.pos_prev }} → {{ d.pos_cur }}</span>
          <span class="ml-1 text-rose-600 dark:text-rose-400">+{{ d.diff_fmt }}</span>
        </span>
      </li>
    {% endfor %}
  </ul>
{% else %}
  <p class="mt-4 text-center text-xs text-slate-400 dark:text-slate-500">Kritik düşüş yok</p>
{% endif %}
