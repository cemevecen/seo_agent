<div class="flex items-center justify-between gap-2">
  <h4 class="text-sm font-semibold uppercase tracking-wider text-slate-700 dark:text-slate-200">GA4 · 7 Gün Session Değişimi</h4>
  <a href="/ga4" hx-get="/ga4" hx-target="#content" hx-swap="innerHTML" hx-push-url="true"
     class="text-xs font-semibold text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-slate-100">Detay →</a>
</div>
<div class="mt-3 space-y-3">
  {% for site in sites %}
    <div class="rounded-xl border bg-white px-3 py-2.5 dark:bg-slate-900 {% if 'doviz' in site.domain %}border-blue-200 dark:border-blue-900/60{% elif 'sinemalar' in site.domain %}border-rose-200 dark:border-rose-900/60{% else %}border-slate-200 dark:border-slate-700{% endif %}">
      <div class="flex items-center justify-between">
        <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">{{ site.display_name }}</p>
        <p class="text-[11px] text-slate-400">son 7g vs önceki 7g</p>
      </div>
      <div class="mt-2 grid grid-cols-2 gap-2 sm:grid-cols-4">
        {% for prof in site.profiles %}
          <div class="rounded-lg bg-slate-50 px-2 py-2 text-center dark:bg-slate-800/60">
            <p class="text-[10px] font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">{{ prof.label }}</p>
            <p class="mt-0.5 text-lg font-bold tabular-nums {% if prof.tone == 'up' %}text-emerald-600 dark:text-emerald-400{% elif prof.tone == 'down' %}text-rose-600 dark:text-rose-400{% else %}text-slate-500 dark:text-slate-400{% endif %}">{{ prof.delta_fmt }}</p>
            <p class="text-[10px] text-slate-400 tabular-nums">{{ prof.last_fmt }} ← {{ prof.prev_fmt }}</p>
          </div>
        {% endfor %}
      </div>
    </div>
  {% endfor %}
</div>
