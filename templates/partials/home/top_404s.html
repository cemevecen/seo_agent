<div class="flex items-center justify-between gap-3">
  <h3 class="text-sm font-semibold text-slate-900 dark:text-slate-100">Dün · Kritik 404 URL'leri</h3>
  <a href="/errors" hx-get="/errors" hx-target="#content" hx-swap="innerHTML" hx-push-url="true"
     class="text-xs font-medium text-slate-500 transition hover:text-slate-900 dark:text-slate-400 dark:hover:text-slate-100">Tümü →</a>
</div>
<div class="mt-4 space-y-3">
  {% for site in sites %}
    <div class="rounded-xl border border-slate-200 p-4 dark:border-slate-800">
      <div class="flex items-center gap-2">
        <span class="h-1.5 w-1.5 shrink-0 rounded-full {% if 'doviz' in site.domain %}bg-blue-500{% elif 'sinemalar' in site.domain %}bg-rose-500{% else %}bg-slate-400{% endif %}"></span>
        <p class="truncate text-sm font-medium text-slate-900 dark:text-slate-100">{{ site.display_name }}</p>
      </div>
      {% if site.rows %}
        <ul class="mt-3 divide-y divide-slate-100 dark:divide-slate-800">
          {% for it in site.rows %}
            <li class="flex items-start justify-between gap-3 py-2 first:pt-0 last:pb-0">
              <a href="{{ it.url }}" target="_blank" rel="noopener" class="min-w-0 flex-1 truncate text-xs text-slate-700 transition hover:text-slate-900 dark:text-slate-300 dark:hover:text-slate-100" title="{{ it.url }}">{{ it.url_short }}</a>
              <span class="shrink-0 text-xs font-medium tabular-nums text-rose-600 dark:text-rose-400">{{ it.hit_label }}</span>
            </li>
          {% endfor %}
        </ul>
      {% else %}
        <p class="mt-4 text-center text-xs text-slate-400 dark:text-slate-500">Dün 404 kaydı yok</p>
      {% endif %}
    </div>
  {% endfor %}
</div>
