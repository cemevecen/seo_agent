<div class="flex items-center justify-between gap-2">
  <h4 class="text-sm font-semibold uppercase tracking-wider text-slate-700 dark:text-slate-200">Dün · Kritik 404 URL'leri</h4>
  <a href="/errors" hx-get="/errors" hx-target="#content" hx-swap="innerHTML" hx-push-url="true"
     class="text-xs font-semibold text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-slate-100">Tümü →</a>
</div>
<div class="mt-3 grid grid-cols-1 gap-3">
  {% for site in sites %}
    <div class="rounded-xl border bg-white p-3 dark:bg-slate-900 {% if 'doviz' in site.domain %}border-blue-200 dark:border-blue-900/60{% elif 'sinemalar' in site.domain %}border-rose-200 dark:border-rose-900/60{% else %}border-slate-200 dark:border-slate-700{% endif %}">
      <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">{{ site.display_name }}</p>
      {% if site.rows %}
        <ul class="mt-2 space-y-1.5">
          {% for it in site.rows %}
            <li class="flex items-start justify-between gap-2 rounded-lg bg-slate-50 px-2.5 py-1.5 dark:bg-slate-800/60">
              <a href="{{ it.url }}" target="_blank" rel="noopener" class="min-w-0 flex-1 truncate text-xs font-medium text-slate-800 hover:text-rose-600 dark:text-slate-100 dark:hover:text-rose-400" title="{{ it.url }}">{{ it.url_short }}</a>
              <span class="shrink-0 rounded-full bg-rose-100 px-2 py-0.5 text-[10px] font-semibold text-rose-700 dark:bg-rose-900/30 dark:text-rose-400 tabular-nums">{{ it.hit_label }}</span>
            </li>
          {% endfor %}
        </ul>
      {% else %}
        <p class="mt-3 text-center text-xs text-slate-400 dark:text-slate-500">Dün 404 kaydı yok</p>
      {% endif %}
    </div>
  {% endfor %}
</div>
