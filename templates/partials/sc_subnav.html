<div class="trend-subnav-wrap sc-page-subnav" id="sc-page-subnav">
  <div class="trend-subnav-groups">
    {% for group in sc_groups %}
    <div>
      <div class="trend-subnav-group-label">{{ group }}</div>
      <div class="trend-subnav-track">
        {% for item in sc_views if item.group == group %}
        {% set anchor = '#sc-' ~ item.slug %}
        <a href="{{ anchor }}" class="trend-subnav-link sc-page-subnav-link" data-sc-nav="{{ item.slug }}">{{ item.order }}. {{ item.title }}</a>
        {% endfor %}
      </div>
    </div>
    {% endfor %}
  </div>
</div>
