{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
  <div class="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
    <div class="mb-4 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div class="space-y-2">
        <button
          id="refresh-search-console-sites-button"
          type="button"
          class="w-full rounded-full border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:border-slate-900 hover:text-slate-900 sm:w-auto"
          onclick="refreshSearchConsoleSites(this)"
        >
          Tum Siteleri Yenile
        </button>
        <p class="text-sm text-slate-500">
          Bu islem bagli siteler icin Search Console API'den yeni veri ceker, snapshot yazar ve kartlari yeniden olusturur.
        </p>
      </div>
    </div>

    <div id="search-console-progress-panel" class="mb-4 hidden rounded-2xl border border-sky-200 bg-sky-50/80 p-4">
      <div class="flex items-start justify-between gap-4">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.18em] text-sky-700">Yaklasik Ilerleme</p>
          <p id="search-console-progress-title" class="mt-2 text-base font-semibold text-slate-900">Hazirlaniyor</p>
          <p id="search-console-progress-detail" class="mt-1 text-sm text-slate-600">Dis kaynaktan veri cekme akisi baslatiliyor.</p>
        </div>
        <p id="search-console-progress-percent" class="text-2xl font-bold tracking-tight text-sky-700">0%</p>
      </div>
      <div class="mt-4 h-2.5 overflow-hidden rounded-full bg-sky-100">
        <div id="search-console-progress-bar" class="h-full rounded-full bg-sky-600 transition-all duration-500" style="width: 0%"></div>
      </div>
    </div>

    <div id="search-console-site-list" hx-get="/search-console/site-list" hx-trigger="load" hx-swap="innerHTML">
      <p class="text-sm text-slate-500">Search Console durumlari yukleniyor...</p>
    </div>
  </div>
</div>

<script>
  function createSearchConsoleProgressController(config) {
    const panel = document.getElementById('search-console-progress-panel');
    const title = document.getElementById('search-console-progress-title');
    const detail = document.getElementById('search-console-progress-detail');
    const percent = document.getElementById('search-console-progress-percent');
    const bar = document.getElementById('search-console-progress-bar');
    const steps = config.steps || [];
    let index = 0;
    let timer = null;

    function render(step) {
      if (!panel || !title || !detail || !percent || !bar) {
        return;
      }
      panel.classList.remove('hidden');
      title.textContent = step.title || config.title || 'Yenileniyor';
      detail.textContent = step.detail || config.detail || 'Islem suruyor.';
      percent.textContent = String(step.percent || 0) + '%';
      bar.style.width = String(step.percent || 0) + '%';
    }

    render({
      percent: 6,
      title: config.title,
      detail: config.detail,
    });

    if (steps.length) {
      timer = window.setInterval(function () {
        if (index >= steps.length) {
          window.clearInterval(timer);
          timer = null;
          return;
        }
        render(steps[index]);
        index += 1;
      }, config.interval || 900);
    }

    return {
      complete: function (doneTitle, doneDetail) {
        if (timer) {
          window.clearInterval(timer);
        }
        render({
          percent: 100,
          title: doneTitle || 'Tamamlandi',
          detail: doneDetail || 'Kartlar guncellendi.',
        });
      },
      fail: function (errorTitle, errorDetail) {
        if (timer) {
          window.clearInterval(timer);
        }
        if (panel) {
          panel.classList.remove('border-sky-200', 'bg-sky-50/80');
          panel.classList.add('border-rose-200', 'bg-rose-50');
        }
        if (bar) {
          bar.classList.remove('bg-sky-600');
          bar.classList.add('bg-rose-600');
        }
        render({
          percent: Math.max(parseInt((bar && bar.style.width) || '12', 10) || 12, 12),
          title: errorTitle || 'Yenileme basarisiz',
          detail: errorDetail || 'Dis kaynaktan veri cekilirken bir hata olustu.',
        });
      },
      resetTone: function () {
        if (panel) {
          panel.classList.remove('border-rose-200', 'bg-rose-50');
          panel.classList.add('border-sky-200', 'bg-sky-50/80');
        }
        if (bar) {
          bar.classList.remove('bg-rose-600');
          bar.classList.add('bg-sky-600');
        }
      },
    };
  }

  function refreshSearchConsoleSites(button) {
    const trigger = button || document.getElementById('refresh-search-console-sites-button');
    const target = document.getElementById('search-console-site-list');
    const original = trigger ? trigger.textContent : '';
    const progress = createSearchConsoleProgressController({
      title: 'Tum siteler yenileniyor',
      detail: 'Bagli siteler icin Search Console API akisi baslatildi.',
      steps: [
        { percent: 14, title: 'Baglantilar kontrol ediliyor', detail: 'OAuth baglantilari ve property hedefleri kontrol ediliyor.' },
        { percent: 31, title: 'API cagrilari basladi', detail: 'Bagli siteler sirayla Search Console API uzerinden yenileniyor.' },
        { percent: 52, title: 'Snapshot kaydi yapiliyor', detail: 'Yeni query, trend ve ozet satirlari veritabanina yaziliyor.' },
        { percent: 73, title: 'Alert senkronu hesaplaniyor', detail: 'Yeni Search Console verisine gore iliskili uyarilar guncelleniyor.' },
        { percent: 91, title: 'Kartlar hazirlaniyor', detail: 'Ekrandaki tum kartlar yeni verilerle yeniden olusturuluyor.' },
      ],
    });
    progress.resetTone();
    if (trigger) {
      trigger.disabled = true;
      trigger.textContent = 'Yenileniyor...';
    }

    fetch('/search-console/refresh-all', {
      method: 'POST',
      headers: { 'HX-Request': 'true' }
    })
      .then(function (response) {
        if (!response.ok) {
          throw new Error('refresh failed');
        }
        return response.text();
      })
      .then(function (html) {
        if (target) {
          target.innerHTML = html;
          window.setTimeout(function () {
            initSearchConsolePanels(target);
          }, 50);
        }
        progress.complete('Tum siteler guncellendi', 'Search Console kartlari yeni verilerle yeniden cizildi.');
      })
      .catch(function (error) {
        console.warn('Search Console bulk refresh failed:', error);
        progress.fail('Tum siteler yenilenemedi', 'Search Console toplu yenileme tamamlanamadi. Log ve baglanti durumunu kontrol et.');
      })
      .finally(function () {
        if (trigger) {
          trigger.disabled = false;
          trigger.textContent = original;
        }
      });
  }

  function fitSearchConsoleText(root) {
    const scope = root || document;
    const baseFontSize = parseFloat(window.getComputedStyle(document.documentElement).fontSize || '16');
    scope.querySelectorAll('[data-fit-text]').forEach(function (element) {
      const maxRem = parseFloat(element.dataset.fitTextMax || '3');
      const minRem = parseFloat(element.dataset.fitTextMin || '1');
      const maxPx = maxRem * baseFontSize;
      const minPx = minRem * baseFontSize;

      element.style.fontSize = maxPx + 'px';
      if (!element.parentElement) {
        return;
      }

      let nextSize = maxPx;
      const maxWidth = element.clientWidth || element.parentElement.clientWidth || 0;
      const maxHeight = element.parentElement.clientHeight || 0;

      while (nextSize > minPx && (element.scrollWidth > maxWidth || (maxHeight && element.scrollHeight > maxHeight))) {
        nextSize -= 0.5;
        element.style.fontSize = nextSize + 'px';
      }
    });
  }

  function renderSearchConsoleTrendCharts(root) {
    (root || document).querySelectorAll('[data-search-console-trend]').forEach(function (element) {
      if (element.closest('.hidden')) {
        return;
      }
      if (element.dataset.chartReady === '1') {
        if (window.Plotly) {
          window.requestAnimationFrame(function () {
            Plotly.Plots.resize(element);
          });
        }
        return;
      }
      const renderChart = function (attempt) {
        if (element.dataset.chartReady === '1') {
          return;
        }
        if (!window.Plotly) {
          if (attempt < 10) {
            window.setTimeout(function () { renderChart(attempt + 1); }, 250);
          }
          return;
        }
        try {
          const trend = JSON.parse(element.dataset.searchConsoleTrend || '{}');
          const isLast28Days = trend.mode === 'last_28d';
          const labels = trend.labels || ['1', '2', '3', '4', '5', '6', '7'];
          const xValues = isLast28Days ? (trend.dates || labels) : labels;
          const currentClicks = isLast28Days ? (trend.clicks || []) : (trend.current_clicks || []);
          const previousClicks = isLast28Days ? [] : (trend.previous_clicks || []);
          const currentPosition = isLast28Days ? (trend.position || []) : (trend.current_position || []);
          const previousPosition = isLast28Days ? [] : (trend.previous_position || []);
          const traces = [
            {
              x: xValues,
              y: currentClicks,
              type: 'scatter',
              mode: 'lines',
              name: isLast28Days ? 'Clicks' : 'Clicks 7G',
              line: { color: '#4f83e3', width: 3 },
              yaxis: 'y1',
            },
            {
              x: xValues,
              y: currentPosition,
              type: 'scatter',
              mode: 'lines',
              name: isLast28Days ? 'Position' : 'Position 7G',
              line: { color: '#dd7a2a', width: 3 },
              yaxis: 'y2',
            }
          ];

          if (!isLast28Days) {
            traces.push(
              {
                x: xValues,
                y: previousClicks,
                type: 'scatter',
                mode: 'lines',
                name: 'Clicks Onceki 7G',
                line: { color: '#4f83e3', width: 3, dash: 'dash' },
                yaxis: 'y1',
              },
              {
                x: xValues,
                y: previousPosition,
                type: 'scatter',
                mode: 'lines',
                name: 'Position Onceki 7G',
                line: { color: '#dd7a2a', width: 3, dash: 'dash' },
                yaxis: 'y2',
              }
            );
          }

          Plotly.newPlot(
            element,
            traces,
            {
              autosize: true,
              height: 360,
              margin: { l: 56, r: 56, t: 20, b: 92 },
              paper_bgcolor: 'rgba(0,0,0,0)',
              plot_bgcolor: 'rgba(0,0,0,0)',
              legend: {
                orientation: 'h',
                x: 0,
                y: -0.22,
                xanchor: 'left',
                yanchor: 'top',
                font: { size: 11 },
              },
              xaxis: {
                gridcolor: '#e2e8f0',
                automargin: true,
                type: isLast28Days ? 'date' : 'category',
                tickangle: isLast28Days ? -45 : 0,
                tickfont: { size: isLast28Days ? 10 : 12 },
                tickformat: isLast28Days ? '%d.%m' : undefined,
              },
              yaxis: { title: 'Clicks', gridcolor: '#e2e8f0', zeroline: false, automargin: true },
              yaxis2: {
                title: 'Position',
                overlaying: 'y',
                side: 'right',
                autorange: 'reversed',
                zeroline: false,
                automargin: true,
              },
              hovermode: 'x unified',
            },
            { displayModeBar: false, responsive: true }
          ).then(function () {
            element.dataset.chartReady = '1';
            window.requestAnimationFrame(function () {
              Plotly.Plots.resize(element);
            });
            window.setTimeout(function () {
              Plotly.Plots.resize(element);
            }, 150);
          });
        } catch (error) {
          console.warn('Search Console trend render failed:', error);
        }
      };

      renderChart(0);
    });
  }

  function initSearchConsoleTables(root) {
    (root || document).querySelectorAll('[data-search-console-table]').forEach(function (table) {
      if (table.dataset.tableReady === '1') {
        return;
      }
      table.dataset.tableReady = '1';
      const tbody = table.querySelector('tbody');
      const buttons = table.querySelectorAll('[data-sort-key]');
      buttons.forEach(function (button) {
        button.addEventListener('click', function () {
          const key = button.dataset.sortKey;
          const type = button.dataset.sortType || 'string';
          const currentDirection = button.dataset.sortDirection === 'asc' ? 'asc' : 'desc';
          const nextDirection = currentDirection === 'asc' ? 'desc' : 'asc';
          buttons.forEach(function (item) {
            item.dataset.sortDirection = '';
          });
          button.dataset.sortDirection = nextDirection;
          const rows = Array.from(tbody.querySelectorAll('tr')).filter(function (row) {
            return row.dataset.query;
          });
          rows.sort(function (left, right) {
            const leftValue = left.dataset[key];
            const rightValue = right.dataset[key];
            if (type === 'number') {
              const leftNumber = parseFloat(leftValue || '0');
              const rightNumber = parseFloat(rightValue || '0');
              return nextDirection === 'asc' ? leftNumber - rightNumber : rightNumber - leftNumber;
            }
            return nextDirection === 'asc'
              ? String(leftValue || '').localeCompare(String(rightValue || ''), 'tr')
              : String(rightValue || '').localeCompare(String(leftValue || ''), 'tr');
          });
          rows.forEach(function (row) {
            tbody.appendChild(row);
          });
        });
      });
    });
  }

  function initSearchConsoleDeviceSwitches(root) {
    (root || document).querySelectorAll('[data-search-console-device-switch]').forEach(function (switcher) {
      if (switcher.dataset.switchReady === '1') {
        return;
      }
      switcher.dataset.switchReady = '1';
      const hostCard = switcher.closest('section');
      const buttons = switcher.querySelectorAll('[data-device-toggle]');
      const activateDevice = function (deviceKey) {
        buttons.forEach(function (button) {
          button.dataset.active = button.dataset.deviceToggle === deviceKey ? 'true' : 'false';
        });
        hostCard.querySelectorAll('[data-device-panel]').forEach(function (panel) {
          const isActive = panel.dataset.devicePanel === deviceKey;
          panel.classList.toggle('hidden', !isActive);
        });
        window.setTimeout(function () {
          initSearchConsoleTables(hostCard);
          renderSearchConsoleTrendCharts(hostCard);
          fitSearchConsoleText(hostCard);
        }, 40);
      };

      buttons.forEach(function (button) {
        button.addEventListener('click', function () {
          activateDevice(button.dataset.deviceToggle);
        });
      });

      const initialButton = Array.from(buttons).find(function (button) {
        return button.dataset.active === 'true';
      }) || buttons[0];
      if (initialButton) {
        activateDevice(initialButton.dataset.deviceToggle);
      }
    });
  }

  function initSearchConsoleExpandables(root) {
    (root || document).querySelectorAll('[data-search-console-expandable]').forEach(function (card) {
      if (card.dataset.expandReady === '1') {
        return;
      }
      card.dataset.expandReady = '1';

      const button = card.querySelector('[data-site-expand-toggle]');
      const panel = card.querySelector('[data-site-expand-panel]');
      const icon = card.querySelector('[data-site-expand-icon]');
      const label = button ? button.querySelector('[data-site-expand-label]') : null;
      const trigger = button ? button.querySelector('[data-site-expand-trigger]') : null;

      if (!button || !panel) {
        return;
      }

      const setExpanded = function (expanded) {
        card.dataset.expanded = expanded ? 'true' : 'false';
        button.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        panel.classList.toggle('hidden', !expanded);
        if (icon) {
          icon.style.transform = expanded ? 'rotate(180deg)' : 'rotate(0deg)';
        }
        if (label) {
          label.textContent = expanded ? 'Detayları Gizle' : 'Detayları Aç';
        }
        if (trigger) {
          trigger.classList.toggle('bg-sky-700', !expanded);
          trigger.classList.toggle('bg-sky-800', expanded);
        }
        if (expanded) {
          window.setTimeout(function () {
            fitSearchConsoleText(panel);
            initSearchConsoleTables(panel);
            renderSearchConsoleTrendCharts(panel);
          }, 60);
        }
      };

      button.addEventListener('click', function () {
        setExpanded(button.getAttribute('aria-expanded') !== 'true');
      });

      setExpanded(card.dataset.expanded === 'true');
    });
  }

  function initSearchConsolePanels(root) {
    initSearchConsoleExpandables(root);
    initSearchConsoleDeviceSwitches(root);
    bindSearchConsoleRefreshForms(root);
    renderSearchConsoleTrendCharts(root);
    initSearchConsoleTables(root);
    fitSearchConsoleText(root);
  }

  function bindSearchConsoleRefreshForms(root) {
    (root || document).querySelectorAll('[data-search-console-refresh-form]').forEach(function (form) {
      if (form.dataset.bound === '1') {
        return;
      }
      form.dataset.bound = '1';
      form.addEventListener('submit', function (event) {
        event.preventDefault();
        const target = document.getElementById('search-console-site-list');
        const button = form.querySelector('button[type="submit"]');
        const original = button ? button.textContent : '';
        const siteDomain = form.dataset.siteDomain || 'site';
        const progress = createSearchConsoleProgressController({
          title: siteDomain + ' icin Search Console yenileniyor',
          detail: 'Google Search Console API uzerinden yeni snapshot cekiliyor.',
          steps: [
            { percent: 16, title: 'Baglanti hazirlaniyor', detail: siteDomain + ' icin OAuth ve property bilgisi dogrulaniyor.' },
            { percent: 37, title: 'API verisi cekiliyor', detail: siteDomain + ' icin Search Console ozet ve query verisi aliniyor.' },
            { percent: 59, title: 'Snapshot yaziliyor', detail: 'Yeni query, trend ve ozet satirlari kaydediliyor.' },
            { percent: 79, title: 'Alert senkronu guncelleniyor', detail: 'Bu siteye ait Search Console uyari verileri yeniden hesaplanıyor.' },
            { percent: 93, title: 'Kart yenileniyor', detail: 'Kart yeni verilerle tekrar olusturuluyor.' },
          ],
        });
        progress.resetTone();
        if (button) {
          button.disabled = true;
          button.textContent = 'Yenileniyor...';
        }

        fetch(form.action, {
          method: 'POST',
          headers: { 'HX-Request': 'true' }
        })
          .then(function (response) {
            if (!response.ok) {
              throw new Error('refresh failed');
            }
            return response.text();
          })
          .then(function (html) {
            if (target) {
              target.innerHTML = html;
              window.setTimeout(function () {
                initSearchConsolePanels(target);
              }, 50);
            }
            progress.complete(siteDomain + ' guncellendi', 'Search Console karti yeni verilerle yenilendi.');
          })
          .catch(function (error) {
            console.warn('Search Console site refresh failed:', error);
            progress.fail(siteDomain + ' yenilenemedi', 'Bu site icin Search Console verisi yenilenemedi. Baglanti ve backend loglarini kontrol et.');
          })
          .finally(function () {
            if (button) {
              button.disabled = false;
              button.textContent = original;
            }
          });
      });
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    initSearchConsolePanels(document);
  });

  window.addEventListener('resize', function () {
    window.requestAnimationFrame(function () {
      fitSearchConsoleText(document);
    });
  });

  document.body.addEventListener('htmx:afterSwap', function (event) {
    if (event.target && event.target.id === 'search-console-site-list') {
      window.setTimeout(function () {
        initSearchConsolePanels(event.target);
      }, 50);
    }
  });
</script>
{% endblock %}
