{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
  <div class="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
    <div class="mb-4 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <button
        id="refresh-search-console-sites-button"
        type="button"
        class="w-full rounded-full border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:border-slate-900 hover:text-slate-900 sm:w-auto"
        onclick="refreshSearchConsoleSites(this)"
      >
        Tum Siteleri Yenile
      </button>
    </div>

    <div id="search-console-site-list" hx-get="/search-console/site-list" hx-trigger="load" hx-swap="innerHTML">
      <p class="text-sm text-slate-500">Search Console durumlari yukleniyor...</p>
    </div>
  </div>
</div>

<script>
  function refreshSearchConsoleSites(button) {
    const trigger = button || document.getElementById('refresh-search-console-sites-button');
    const target = document.getElementById('search-console-site-list');
    const original = trigger ? trigger.textContent : '';
    if (trigger) {
      trigger.disabled = true;
      trigger.textContent = 'Yenileniyor...';
    }

    fetch('/search-console/refresh-all', {
      method: 'POST',
      headers: { 'HX-Request': 'true' }
    })
      .then(function (response) {
        if (!response.ok) {
          throw new Error('refresh failed');
        }
        return response.text();
      })
      .then(function (html) {
        if (target) {
          target.innerHTML = html;
          window.setTimeout(function () {
            initSearchConsolePanels(target);
          }, 50);
        }
      })
      .catch(function (error) {
        console.warn('Search Console bulk refresh failed:', error);
      })
      .finally(function () {
        if (trigger) {
          trigger.disabled = false;
          trigger.textContent = original;
        }
      });
  }

  function fitSearchConsoleText(root) {
    const scope = root || document;
    const baseFontSize = parseFloat(window.getComputedStyle(document.documentElement).fontSize || '16');
    scope.querySelectorAll('[data-fit-text]').forEach(function (element) {
      const maxRem = parseFloat(element.dataset.fitTextMax || '3');
      const minRem = parseFloat(element.dataset.fitTextMin || '1');
      const maxPx = maxRem * baseFontSize;
      const minPx = minRem * baseFontSize;

      element.style.fontSize = maxPx + 'px';
      if (!element.parentElement) {
        return;
      }

      let nextSize = maxPx;
      const maxWidth = element.clientWidth || element.parentElement.clientWidth || 0;
      const maxHeight = element.parentElement.clientHeight || 0;

      while (nextSize > minPx && (element.scrollWidth > maxWidth || (maxHeight && element.scrollHeight > maxHeight))) {
        nextSize -= 0.5;
        element.style.fontSize = nextSize + 'px';
      }
    });
  }

  function renderSearchConsoleTrendCharts(root) {
    (root || document).querySelectorAll('[data-search-console-trend]').forEach(function (element) {
      if (element.closest('.hidden')) {
        return;
      }
      if (element.dataset.chartReady === '1') {
        if (window.Plotly) {
          window.requestAnimationFrame(function () {
            Plotly.Plots.resize(element);
          });
        }
        return;
      }
      const renderChart = function (attempt) {
        if (element.dataset.chartReady === '1') {
          return;
        }
        if (!window.Plotly) {
          if (attempt < 10) {
            window.setTimeout(function () { renderChart(attempt + 1); }, 250);
          }
          return;
        }
        try {
          const trend = JSON.parse(element.dataset.searchConsoleTrend || '{}');
          const isLast28Days = trend.mode === 'last_28d';
          const labels = trend.labels || ['1', '2', '3', '4', '5', '6', '7'];
          const xValues = isLast28Days ? (trend.dates || labels) : labels;
          const currentClicks = isLast28Days ? (trend.clicks || []) : (trend.current_clicks || []);
          const previousClicks = isLast28Days ? [] : (trend.previous_clicks || []);
          const currentPosition = isLast28Days ? (trend.position || []) : (trend.current_position || []);
          const previousPosition = isLast28Days ? [] : (trend.previous_position || []);
          const traces = [
            {
              x: xValues,
              y: currentClicks,
              type: 'scatter',
              mode: 'lines',
              name: isLast28Days ? 'Clicks' : 'Clicks 7G',
              line: { color: '#4f83e3', width: 3 },
              yaxis: 'y1',
            },
            {
              x: xValues,
              y: currentPosition,
              type: 'scatter',
              mode: 'lines',
              name: isLast28Days ? 'Position' : 'Position 7G',
              line: { color: '#dd7a2a', width: 3 },
              yaxis: 'y2',
            }
          ];

          if (!isLast28Days) {
            traces.push(
              {
                x: xValues,
                y: previousClicks,
                type: 'scatter',
                mode: 'lines',
                name: 'Clicks Onceki 7G',
                line: { color: '#4f83e3', width: 3, dash: 'dash' },
                yaxis: 'y1',
              },
              {
                x: xValues,
                y: previousPosition,
                type: 'scatter',
                mode: 'lines',
                name: 'Position Onceki 7G',
                line: { color: '#dd7a2a', width: 3, dash: 'dash' },
                yaxis: 'y2',
              }
            );
          }

          Plotly.newPlot(
            element,
            traces,
            {
              autosize: true,
              height: 360,
              margin: { l: 56, r: 56, t: 20, b: 92 },
              paper_bgcolor: 'rgba(0,0,0,0)',
              plot_bgcolor: 'rgba(0,0,0,0)',
              legend: {
                orientation: 'h',
                x: 0,
                y: -0.22,
                xanchor: 'left',
                yanchor: 'top',
                font: { size: 11 },
              },
              xaxis: {
                gridcolor: '#e2e8f0',
                automargin: true,
                type: isLast28Days ? 'date' : 'category',
                tickangle: isLast28Days ? -45 : 0,
                tickfont: { size: isLast28Days ? 10 : 12 },
                tickformat: isLast28Days ? '%d.%m' : undefined,
              },
              yaxis: { title: 'Clicks', gridcolor: '#e2e8f0', zeroline: false, automargin: true },
              yaxis2: {
                title: 'Position',
                overlaying: 'y',
                side: 'right',
                autorange: 'reversed',
                zeroline: false,
                automargin: true,
              },
              hovermode: 'x unified',
            },
            { displayModeBar: false, responsive: true }
          ).then(function () {
            element.dataset.chartReady = '1';
            window.requestAnimationFrame(function () {
              Plotly.Plots.resize(element);
            });
            window.setTimeout(function () {
              Plotly.Plots.resize(element);
            }, 150);
          });
        } catch (error) {
          console.warn('Search Console trend render failed:', error);
        }
      };

      renderChart(0);
    });
  }

  function initSearchConsoleTables(root) {
    (root || document).querySelectorAll('[data-search-console-table]').forEach(function (table) {
      if (table.dataset.tableReady === '1') {
        return;
      }
      table.dataset.tableReady = '1';
      const tbody = table.querySelector('tbody');
      const buttons = table.querySelectorAll('[data-sort-key]');
      buttons.forEach(function (button) {
        button.addEventListener('click', function () {
          const key = button.dataset.sortKey;
          const type = button.dataset.sortType || 'string';
          const currentDirection = button.dataset.sortDirection === 'asc' ? 'asc' : 'desc';
          const nextDirection = currentDirection === 'asc' ? 'desc' : 'asc';
          buttons.forEach(function (item) {
            item.dataset.sortDirection = '';
          });
          button.dataset.sortDirection = nextDirection;
          const rows = Array.from(tbody.querySelectorAll('tr')).filter(function (row) {
            return row.dataset.query;
          });
          rows.sort(function (left, right) {
            const leftValue = left.dataset[key];
            const rightValue = right.dataset[key];
            if (type === 'number') {
              const leftNumber = parseFloat(leftValue || '0');
              const rightNumber = parseFloat(rightValue || '0');
              return nextDirection === 'asc' ? leftNumber - rightNumber : rightNumber - leftNumber;
            }
            return nextDirection === 'asc'
              ? String(leftValue || '').localeCompare(String(rightValue || ''), 'tr')
              : String(rightValue || '').localeCompare(String(leftValue || ''), 'tr');
          });
          rows.forEach(function (row) {
            tbody.appendChild(row);
          });
        });
      });
    });
  }

  function initSearchConsoleDeviceSwitches(root) {
    (root || document).querySelectorAll('[data-search-console-device-switch]').forEach(function (switcher) {
      if (switcher.dataset.switchReady === '1') {
        return;
      }
      switcher.dataset.switchReady = '1';
      const hostCard = switcher.closest('section');
      const buttons = switcher.querySelectorAll('[data-device-toggle]');
      const activateDevice = function (deviceKey) {
        buttons.forEach(function (button) {
          button.dataset.active = button.dataset.deviceToggle === deviceKey ? 'true' : 'false';
        });
        hostCard.querySelectorAll('[data-device-panel]').forEach(function (panel) {
          const isActive = panel.dataset.devicePanel === deviceKey;
          panel.classList.toggle('hidden', !isActive);
        });
        window.setTimeout(function () {
          initSearchConsoleTables(hostCard);
          renderSearchConsoleTrendCharts(hostCard);
          fitSearchConsoleText(hostCard);
        }, 40);
      };

      buttons.forEach(function (button) {
        button.addEventListener('click', function () {
          activateDevice(button.dataset.deviceToggle);
        });
      });

      const initialButton = Array.from(buttons).find(function (button) {
        return button.dataset.active === 'true';
      }) || buttons[0];
      if (initialButton) {
        activateDevice(initialButton.dataset.deviceToggle);
      }
    });
  }

  function initSearchConsoleExpandables(root) {
    (root || document).querySelectorAll('[data-search-console-expandable]').forEach(function (card) {
      if (card.dataset.expandReady === '1') {
        return;
      }
      card.dataset.expandReady = '1';

      const button = card.querySelector('[data-site-expand-toggle]');
      const panel = card.querySelector('[data-site-expand-panel]');
      const icon = card.querySelector('[data-site-expand-icon]');
      const label = button ? button.querySelector('[data-site-expand-label]') : null;
      const trigger = button ? button.querySelector('[data-site-expand-trigger]') : null;

      if (!button || !panel) {
        return;
      }

      const setExpanded = function (expanded) {
        card.dataset.expanded = expanded ? 'true' : 'false';
        button.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        panel.classList.toggle('hidden', !expanded);
        if (icon) {
          icon.style.transform = expanded ? 'rotate(180deg)' : 'rotate(0deg)';
        }
        if (label) {
          label.textContent = expanded ? 'Detayları Gizle' : 'Detayları Aç';
        }
        if (trigger) {
          trigger.classList.toggle('bg-sky-700', !expanded);
          trigger.classList.toggle('bg-sky-800', expanded);
        }
        if (expanded) {
          window.setTimeout(function () {
            fitSearchConsoleText(panel);
            initSearchConsoleTables(panel);
            renderSearchConsoleTrendCharts(panel);
          }, 60);
        }
      };

      button.addEventListener('click', function () {
        setExpanded(button.getAttribute('aria-expanded') !== 'true');
      });

      setExpanded(false);
    });
  }

  function initSearchConsolePanels(root) {
    initSearchConsoleExpandables(root);
    initSearchConsoleDeviceSwitches(root);
    renderSearchConsoleTrendCharts(root);
    initSearchConsoleTables(root);
    fitSearchConsoleText(root);
  }

  document.addEventListener('DOMContentLoaded', function () {
    initSearchConsolePanels(document);
  });

  window.addEventListener('resize', function () {
    window.requestAnimationFrame(function () {
      fitSearchConsoleText(document);
    });
  });

  document.body.addEventListener('htmx:afterSwap', function (event) {
    if (event.target && event.target.id === 'search-console-site-list') {
      window.setTimeout(function () {
        initSearchConsolePanels(event.target);
      }, 50);
    }
  });
</script>
{% endblock %}
