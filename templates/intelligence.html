{% extends "base.html" %}

{% block content %}
<div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
  <div class="mb-8 flex flex-wrap items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-slate-100">NEWS</h1>
    </div>
    <div class="flex items-center gap-2">
      <button id="rt-news-sync-btn" type="button" onclick="rtSyncNews()" class="inline-flex items-center gap-2 rounded-lg border border-zinc-300 bg-white px-4 py-2 text-sm font-bold text-zinc-700 shadow-sm transition hover:bg-zinc-50 dark:border-zinc-700 dark:bg-zinc-900 dark:text-zinc-200 dark:hover:bg-zinc-800">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"/></svg>
        Güncelle
      </button>
    </div>
  </div>

  <div class="mt-4 rt-intel-container rounded-[2rem] border p-6 shadow-sm">
    <div class="mb-6 flex gap-1 overflow-x-auto border-b border-slate-200/60 pb-1 scrollbar-hide dark:border-white/5">
      <button type="button" onclick="rtSwitchIntelTab('İş Dünyası')" id="rt-intel-tab-is" class="rt-alarm-tab-active whitespace-nowrap flex-shrink-0">İş Dünyası</button>
      <button type="button" onclick="rtSwitchIntelTab('Finans & Borsa')" id="rt-intel-tab-fin" class="rt-alarm-tab-inactive whitespace-nowrap flex-shrink-0">Finans & Borsa</button>
      <button type="button" onclick="rtSwitchIntelTab('Rakip')" id="rt-intel-tab-rakip" class="rt-alarm-tab-inactive whitespace-nowrap flex-shrink-0">Rakip</button>
      <button type="button" onclick="rtSwitchIntelTab('Dünya')" id="rt-intel-tab-dunya" class="rt-alarm-tab-inactive whitespace-nowrap flex-shrink-0">Dünya</button>
      <button type="button" onclick="rtSwitchIntelTab('Türkiye')" id="rt-intel-tab-tr" class="rt-alarm-tab-inactive whitespace-nowrap flex-shrink-0">Türkiye</button>
      <button type="button" onclick="rtSwitchIntelTab('Bilim ve Teknoloji')" id="rt-intel-tab-tech" class="rt-alarm-tab-inactive whitespace-nowrap flex-shrink-0">Bilim ve Teknoloji</button>
      <button type="button" onclick="rtSwitchIntelTab('Yahoo Finance')" id="rt-intel-tab-yahoo" class="rt-alarm-tab-inactive whitespace-nowrap flex-shrink-0">Yahoo</button>
    </div>

    <div id="rt-intel-list" class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3">
      <!-- Dynamic list items -->
    </div>
    
    <!-- Loading state -->
    <div id="rt-intel-loading" class="hidden mt-8 flex justify-center py-8">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-500"></div>
    </div>
  </div>
</div>

<style>
  /* Global Container ve Kart Renkleri */
  .rt-intel-container { background-color: #ffffff; border-color: #f1f5f9; }
  html.dark .rt-intel-container { background-color: #09090b !important; border-color: rgba(255,255,255,0.03) !important; }

  .rt-intel-container {
    background-color: #09090b !important;
  }
  @media (max-width: 640px) {
    .rt-intel-container {
      padding: 1rem !important;
      border-radius: 1.5rem !important;
    }
  }
  .rt-intel-card {
    background-color: #121214 !important;
    border-color: rgba(255, 255, 255, 0.05) !important;
  }
  .scrollbar-hide::-webkit-scrollbar {
    display: none;
  }
  .scrollbar-hide {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  .rt-alarm-tab-active {
    padding: 0.75rem 1.25rem;
    font-size: 0.8125rem;
    font-weight: 700;
    color: #4f46e5;
    border-bottom: 2px solid #4f46e5;
    background: transparent;
    transition: all 0.2s;
  }
  html.dark .rt-alarm-tab-active {
    color: #818cf8;
    border-bottom: 2px solid #818cf8;
  }
  .rt-alarm-tab-inactive {
    padding: 0.75rem 1.25rem;
    font-size: 0.8125rem;
    font-weight: 600;
    color: #64748b;
    background: transparent;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  html.dark .rt-alarm-tab-inactive {
    color: #94a3b8;
  }
  .rt-alarm-tab-inactive:hover {
    color: #475569;
    background: #f8fafc;
  }
  html.dark .rt-alarm-tab-inactive:hover {
    color: #cbd5e1;
    background: rgba(255,255,255,0.03);
  }
</style>

<script>
    let _activeIntelCategory = 'İş Dünyası';
    let _intelOffset = 0;
    const _intelLimit = 30;
    let _intelLoading = false;
    let _intelFinished = false;

    async function rtSyncNews() {
      const btn = document.getElementById('rt-news-sync-btn');
      btn.disabled = true;
      btn.innerHTML = 'Güncelleniyor...';
      
      try {
        const r = await fetch('/api/admin/news-intelligence/sync', { method: 'POST' });
        const d = await r.json();
        if(d.ok) {
          _intelOffset = 0;
          _intelFinished = false;
          document.getElementById('rt-intel-list').innerHTML = '';
          rtFetchNewsIntelligence();
        }
      } catch(e) { console.error(e); }
      finally {
        btn.disabled = false;
        btn.innerHTML = '<svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"/></svg> Güncelle';
      }
    }
    
    function rtSwitchIntelTab(cat) {
      if(_activeIntelCategory === cat) return;
      _activeIntelCategory = cat;
      _intelOffset = 0;
      _intelFinished = false;
      
      document.querySelectorAll('[id^="rt-intel-tab-"]').forEach(btn => {
          btn.className = 'rt-alarm-tab-inactive whitespace-nowrap flex-shrink-0';
      });
      if(cat === 'İş Dünyası') document.getElementById('rt-intel-tab-is').className = 'rt-alarm-tab-active whitespace-nowrap flex-shrink-0';
      else if(cat === 'Finans & Borsa') document.getElementById('rt-intel-tab-fin').className = 'rt-alarm-tab-active whitespace-nowrap flex-shrink-0';
      else if(cat === 'Rakip') document.getElementById('rt-intel-tab-rakip').className = 'rt-alarm-tab-active whitespace-nowrap flex-shrink-0';
      else if(cat === 'Yahoo Finance') document.getElementById('rt-intel-tab-yahoo').className = 'rt-alarm-tab-active whitespace-nowrap flex-shrink-0';
      else if(cat === 'Dünya') document.getElementById('rt-intel-tab-dunya').className = 'rt-alarm-tab-active whitespace-nowrap flex-shrink-0';
      else if(cat === 'Türkiye') document.getElementById('rt-intel-tab-tr').className = 'rt-alarm-tab-active whitespace-nowrap flex-shrink-0';
      else if(cat === 'Bilim ve Teknoloji') document.getElementById('rt-intel-tab-tech').className = 'rt-alarm-tab-active whitespace-nowrap flex-shrink-0';
      
      document.getElementById('rt-intel-list').innerHTML = '';
      rtFetchNewsIntelligence();
    }

    function rtFetchNewsIntelligence() {
        if(_intelLoading || _intelFinished) return;
        _intelLoading = true;
        document.getElementById('rt-intel-loading').classList.remove('hidden');

        fetch(`/api/admin/news-intelligence/list?category=${encodeURIComponent(_activeIntelCategory)}&offset=${_intelOffset}&limit=${_intelLimit}`)
        .then(r => r.json())
        .then(data => {
          _intelLoading = false;
          document.getElementById('rt-intel-loading').classList.add('hidden');
          
          const items = data.items || [];
          if(items.length < _intelLimit) _intelFinished = true;
          if(items.length === 0 && _intelOffset === 0) {
            document.getElementById('rt-intel-list').innerHTML = '<div class="col-span-full py-12 text-center text-slate-500">Henüz haber bulunamadı.</div>';
            return;
          }
          
          const listEl = document.getElementById('rt-intel-list');
          
          const html = items.map(item => {
            const d = new Date(item.published_at);
            const timeStr = d.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            
            let faviconUrl = '';
            try {
              const targetUrl = item.source_url || item.url;
              const url = new URL(targetUrl);
              faviconUrl = `https://www.google.com/s2/favicons?domain=${url.hostname}&sz=64`;
            } catch(e) { faviconUrl = '/static/favicon.png'; }

            return `
              <div class="group rt-intel-card flex items-start gap-4 overflow-hidden rounded-2xl border p-4 transition-all duration-300 hover:border-indigo-200/50 hover:shadow-lg dark:hover:border-zinc-700/50 dark:hover:bg-[#18181b]">
                <div class="flex h-10 w-10 flex-shrink-0 items-center justify-center overflow-hidden rounded-lg bg-slate-100 p-1.5 dark:bg-zinc-800/40">
                  <img src="${faviconUrl}" 
                       class="h-full w-full object-contain" 
                       onerror="this.src='/static/favicon.png'">
                </div>
                <div class="flex flex-1 flex-col min-w-0">
                  <div class="flex items-center justify-between mb-1.5">
                    <span class="text-[10px] font-bold text-slate-500 dark:text-zinc-500 truncate uppercase tracking-wider">${item.source_name}</span>
                    <span class="text-[10px] font-medium text-slate-400 dark:text-zinc-400 opacity-40 shrink-0">${timeStr}</span>
                  </div>
                  <h3 class="text-[13px] font-bold text-slate-900 dark:text-zinc-200 mb-1 leading-snug line-clamp-3">
                    <a href="${item.url}" target="_blank" class="hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">${item.headline}</a>
                  </h3>
                  <p class="text-[11px] text-slate-500 dark:text-zinc-500 line-clamp-2 leading-relaxed">${item.content.replace(/<[^>]*>?/gm, '').split('...')[0]}...</p>
                </div>
              </div>
            `;
          }).join('');
          
          listEl.insertAdjacentHTML('beforeend', html);
          _intelOffset += items.length;
        });
    }

    // Infinite Scroll detection
    window.addEventListener('scroll', () => {
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
        rtFetchNewsIntelligence();
      }
    });

    document.addEventListener('DOMContentLoaded', rtFetchNewsIntelligence);
</script>
{% endblock %}
