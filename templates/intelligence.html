{% extends "base.html" %}

{% block content %}
<div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
  <div class="mb-8 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-slate-100">Market İstihbaratı</h1>
      <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Sektörel haber takibi ve rakip analizi.</p>
    </div>
    <button type="button" onclick="rtFetchNewsIntelligence()" class="inline-flex items-center gap-2 rounded-lg border border-zinc-300 bg-white px-4 py-2 text-sm font-bold text-zinc-700 shadow-sm transition hover:bg-zinc-50 dark:border-zinc-700 dark:bg-zinc-900 dark:text-zinc-200 dark:hover:bg-zinc-800">
      <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"/></svg>
      Güncelle
    </button>
  </div>

  <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700/90 dark:bg-zinc-900/50">
    <div class="mb-6 flex gap-1 border-b border-slate-200 dark:border-slate-700">
      <button type="button" onclick="rtSwitchIntelTab('İş Dünyası')" id="rt-intel-tab-is" class="rt-alarm-tab-active">İş Dünyası</button>
      <button type="button" onclick="rtSwitchIntelTab('Dünya')" id="rt-intel-tab-dunya" class="rt-alarm-tab-inactive">Dünya</button>
      <button type="button" onclick="rtSwitchIntelTab('Türkiye')" id="rt-intel-tab-tr" class="rt-alarm-tab-inactive">Türkiye</button>
    </div>

    <div id="rt-intel-list" class="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3">
      <div class="animate-pulse space-y-4">
        <div class="h-32 w-full rounded-xl bg-slate-100 dark:bg-slate-800/50"></div>
        <div class="h-32 w-full rounded-xl bg-slate-100 dark:bg-slate-800/50"></div>
        <div class="h-32 w-full rounded-xl bg-slate-100 dark:bg-slate-800/50"></div>
      </div>
    </div>
  </div>
</div>

<style>
  .rt-alarm-tab-active {
    padding: 0.75rem 1.25rem;
    font-size: 0.875rem;
    font-weight: 800;
    border-bottom: 2px solid #2563eb;
    color: #1e3a8a;
  }
  html.dark .rt-alarm-tab-active {
    color: #60a5fa;
    border-bottom-color: #3b82f6;
  }
  .rt-alarm-tab-inactive {
    padding: 0.75rem 1.25rem;
    font-size: 0.875rem;
    font-weight: 700;
    border-bottom: 2px solid transparent;
    color: rgb(100 116 139);
    background: transparent;
  }
  html.dark .rt-alarm-tab-inactive {
    color: rgb(113 113 122);
  }
</style>

<script>
    var _activeIntelCategory = "İş Dünyası";
    
    function rtSwitchIntelTab(cat) {
      _activeIntelCategory = cat;
      document.querySelectorAll('[id^="rt-intel-tab-"]').forEach(btn => {
          btn.className = 'rt-alarm-tab-inactive';
      });
      if(cat === 'İş Dünyası') document.getElementById('rt-intel-tab-is').className = 'rt-alarm-tab-active';
      else if(cat === 'Dünya') document.getElementById('rt-intel-tab-dunya').className = 'rt-alarm-tab-active';
      else if(cat === 'Türkiye') document.getElementById('rt-intel-tab-tr').className = 'rt-alarm-tab-active';
      rtFetchNewsIntelligence();
    }

    function rtFetchNewsIntelligence() {
      const listEl = document.getElementById('rt-intel-list');
      if(!listEl) return;
      
      fetch('/api/admin/news-intelligence?category=' + encodeURIComponent(_activeIntelCategory))
        .then(r => r.json())
        .then(items => {
          if(!items.length) {
            listEl.innerHTML = '<p class="text-sm text-slate-500 py-4 col-span-full">Bu kategoride henüz haber bulunamadı.</p>';
            return;
          }
          listEl.innerHTML = items.map(item => {
            const d = new Date(item.published_at);
            const dateStr = d.toLocaleDateString('tr-TR') + ' ' + d.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            return `
              <div class="flex flex-col rounded-xl border border-slate-100 bg-white p-4 transition hover:shadow-md dark:border-slate-800 dark:bg-zinc-900/80">
                <div class="flex items-center justify-between mb-2">
                  <span class="text-[10px] font-bold uppercase px-2 py-0.5 rounded bg-indigo-50 text-indigo-600 dark:bg-indigo-900/30 dark:text-indigo-300">${item.topic}</span>
                  <span class="text-[10px] text-slate-400">${dateStr}</span>
                </div>
                <h3 class="text-sm font-bold text-slate-900 dark:text-slate-100 mb-2 leading-snug">
                  <a href="${item.url}" target="_blank" class="hover:text-indigo-600 transition-colors">${item.headline}</a>
                </h3>
                <p class="text-xs text-slate-500 dark:text-slate-400 line-clamp-3 mb-4 flex-1">${item.content.replace(/<[^>]*>?/gm, '')}</p>
                <div class="flex items-center justify-between pt-3 border-t border-slate-50 dark:border-slate-800/50">
                  <span class="text-[11px] font-medium text-slate-400 italic">${item.source_name}</span>
                </div>
                ${item.ai_note ? `<div class="mt-3 text-[10px] bg-slate-50 dark:bg-slate-900/50 p-2 rounded border-l-2 border-indigo-400 text-slate-600 dark:text-slate-400"><b>SEO Notu:</b> ${item.ai_note}</div>` : ''}
              </div>
            `;
          }).join('');
        });
    }

    document.addEventListener('DOMContentLoaded', rtFetchNewsIntelligence);
</script>
{% endblock %}
