{% extends "base.html" %}

{% block content %}
<div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
  <div class="mb-8 flex flex-wrap items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-zinc-400">NEWS</h1>
    </div>
    <div class="flex items-center gap-3">
      <span id="rt-intel-last-update" class="text-[11px] text-slate-400 dark:text-slate-500 tabular-nums"></span>
      <button id="rt-news-sync-btn" type="button" onclick="rtSyncNews()" class="inline-flex items-center gap-2 rounded-lg border border-zinc-300 bg-white px-4 py-2 text-sm font-bold text-zinc-700 shadow-sm transition hover:bg-zinc-50 dark:border-zinc-700 dark:bg-zinc-900 dark:text-zinc-200 dark:hover:bg-zinc-800">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"/></svg>
        Güncelle
      </button>
    </div>
  </div>

  <div class="mt-4 rt-intel-container rounded-[2rem] border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-[#09090b]">
    <div id="rt-intel-list" class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3">
      <!-- Dynamic list items -->
    </div>

    <!-- Loading state -->
    <div id="rt-intel-loading" class="hidden mt-8 flex justify-center py-8">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-500"></div>
    </div>
  </div>
</div>

<style>
  /* Global Container ve Kart Renkleri */
  .rt-intel-container {
    background-color: #ffffff !important;
    border-color: #e2e8f0 !important;
  }
  html.dark .rt-intel-container {
    background-color: #111113 !important;
    border-color: rgba(255,255,255,0.06) !important;
  }

  @media (max-width: 640px) {
    .rt-intel-container {
      padding: 1rem !important;
      border-radius: 1.5rem !important;
    }
  }

  .rt-intel-card {
    background-color: #f8fafc !important;
    border-color: #f1f5f9 !important;
  }
  html.dark .rt-intel-card {
    background-color: #1c1c1f !important;
    border-color: rgba(255,255,255,0.07) !important;
  }
  html.dark .rt-intel-card:hover {
    background-color: #222226 !important;
    border-color: rgba(255,255,255,0.11) !important;
  }

  /* Başlık rengi — pitch white yerine dingin gri */
  html.dark .rt-intel-card h3,
  html.dark .rt-intel-card h3 a {
    color: #c4c4cc !important;
  }
  html.dark .rt-intel-card h3 a:hover {
    color: #a5b4fc !important;
  }

  /* Kaynak adı */
  html.dark .rt-intel-card .rt-source-name {
    color: #5c5c6e !important;
  }

  /* Saat */
  html.dark .rt-intel-card .rt-time {
    color: #46464e !important;
  }
</style>

<script>
    let _intelOffset = 0;
    const _intelLimit = 24;
    let _intelLoading = false;
    let _intelFinished = false;
    let _latestPublishedAt = null;   // en yeni haberin published_at'ı — auto-refresh için
    let _autoRefreshTimer = null;

    const _syncSvg = '<svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"/></svg>';

    async function rtSyncNews() {
      const btn = document.getElementById('rt-news-sync-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="animate-spin inline-block">↻</span> Çekiliyor...';

      try {
        await fetch('/api/admin/news-intelligence/sync', { method: 'POST' });
      } catch(e) { console.error(e); }

      btn.innerHTML = '<span class="animate-spin inline-block">↻</span> Bekleniyor...';
      await new Promise(r => setTimeout(r, 12000));

      _intelOffset = 0;
      _intelFinished = false;
      _latestPublishedAt = null;
      document.getElementById('rt-intel-list').innerHTML = '';
      rtAutoFillInitial();

      btn.disabled = false;
      btn.innerHTML = _syncSvg + ' Güncelle';
    }

    function _buildNewsCard(item, isNew) {
      const d = new Date(item.published_at);
      const now = new Date();
      const hhmm = d.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
      const isToday = d.toDateString() === now.toDateString();
      const isYesterday = d.toDateString() === new Date(now - 864e5).toDateString();
      const timeStr = isToday ? hhmm
        : isYesterday ? ('dün ' + hhmm)
        : (d.toLocaleDateString('tr-TR', {day:'numeric', month:'short'}) + ' ' + hhmm);
      let faviconUrl = '/static/favicon.png';
      try {
        const rawUrl = item.source_url || item.url || '';
        const parsed = new URL(rawUrl);
        const host = parsed.hostname;
        if (host && host !== 'news.google.com') {
          faviconUrl = `https://www.google.com/s2/favicons?domain=${host}&sz=64`;
        } else if (item.url) {
          const art = new URL(item.url);
          if (art.hostname && art.hostname !== 'news.google.com') {
            faviconUrl = `https://www.google.com/s2/favicons?domain=${art.hostname}&sz=64`;
          }
        }
      } catch(e) {}
      const newBadge = isNew
        ? `<span style="font-size:9px;font-weight:700;color:#16a34a;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:4px;padding:1px 5px;margin-left:6px;">YENİ</span>`
        : '';

      // Açıklama (description): HTML tag'lerini sıyır, &nbsp; vb. kodları normalize et,
      // ~110 karaktere kırp ve sonuna … ekle. Boşsa veya başlıkla aynıysa gösterme.
      let excerptHtml = '';
      const rawContent = (item.content || '').toString();
      if (rawContent) {
        const tmp = document.createElement('div');
        tmp.innerHTML = rawContent;
        let text = (tmp.textContent || tmp.innerText || '').replace(/\s+/g, ' ').trim();
        if (text && text.toLowerCase() !== (item.headline || '').toLowerCase()) {
          if (text.length > 110) text = text.slice(0, 110).replace(/\s+\S*$/, '') + '…';
          // Güvenlik: textContent ile DOM'a yazdığımız için XSS yok; metinden HTML üretiyoruz.
          const esc = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          excerptHtml = `<p class="rt-excerpt mt-1 text-[11.5px] text-slate-500 dark:text-zinc-500 leading-snug line-clamp-2">${esc}</p>`;
        }
      }

      return `<div class="group rt-intel-card flex flex-col gap-2.5 overflow-hidden rounded-2xl border p-4 transition-all duration-200${isNew ? ' ring-1 ring-emerald-800/40' : ''}">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-2 min-w-0">
            <div class="flex h-6 w-6 flex-shrink-0 items-center justify-center overflow-hidden rounded-md bg-slate-100 p-0.5 dark:bg-zinc-800/60">
              <img src="${faviconUrl}" class="h-full w-full object-contain" onerror="this.src='/static/favicon.png'">
            </div>
            <span class="rt-source-name text-[10px] font-bold text-slate-400 truncate uppercase tracking-wider">${item.source_name}</span>
            ${newBadge}
          </div>
          <span class="rt-time text-[10px] text-slate-300 dark:text-zinc-600 shrink-0">${timeStr}</span>
        </div>
        <div class="min-w-0">
          <h3 class="text-[13.5px] font-semibold text-slate-800 dark:text-[#b0b0b8] leading-snug line-clamp-5">
            <a href="${item.url}" target="_blank" class="transition-colors hover:text-indigo-700 dark:hover:text-[#9090b8]">${item.headline}</a>
          </h3>
          ${excerptHtml}
        </div>
      </div>`;
    }

    function rtFetchNewsIntelligence() {
        if(_intelLoading || _intelFinished) return;
        _intelLoading = true;
        document.getElementById('rt-intel-loading').classList.remove('hidden');

        // Tek karma feed: category parametresi gönderilmiyor → tüm kategoriler kronolojik karışır.
        return fetch(`/api/admin/news-intelligence/list?offset=${_intelOffset}&limit=${_intelLimit}`)
        .then(r => r.json())
        .then(data => {
          _intelLoading = false;
          document.getElementById('rt-intel-loading').classList.add('hidden');
          const items = data.items || [];
          if(items.length < _intelLimit) _intelFinished = true;
          if(items.length === 0 && _intelOffset === 0) {
            document.getElementById('rt-intel-list').innerHTML = '<div class="col-span-full py-12 text-center text-slate-500">Son 24 saatte haber bulunamadı.</div>';
            return;
          }
          if(_intelOffset === 0 && items.length > 0 && items[0].published_at) {
            _latestPublishedAt = items[0].published_at;
          }
          document.getElementById('rt-intel-list').insertAdjacentHTML('beforeend', items.map(i => _buildNewsCard(i, false)).join(''));
          _intelOffset += items.length;
        })
        .catch(() => { _intelLoading = false; document.getElementById('rt-intel-loading').classList.add('hidden'); });
    }

    // Sayfa scroll edilebilir hale gelene kadar (ya da haber tükenene kadar) sırayla fetch et.
    // Bu sayede kısa ekranlarda kullanıcı 24'lük ilk sayfaya takılı kalmıyor; otomatik
    // olarak son 24 saatin tüm haberleri yükleniyor.
    async function rtAutoFillInitial() {
      let guard = 20; // sonsuz döngüden korunma
      while (!_intelFinished && guard-- > 0) {
        const before = _intelOffset;
        await rtFetchNewsIntelligence();
        if (_intelOffset === before) break; // ilerleme yok → bitir
        // Sayfa scrollable mı?
        if (document.body.offsetHeight > window.innerHeight + 400) break;
        await new Promise(r => setTimeout(r, 80));
      }
    }

    function rtAutoRefreshNews() {
        if(!_latestPublishedAt) return;
        const url = `/api/admin/news-intelligence/list?limit=20&since=${encodeURIComponent(_latestPublishedAt)}`;
        fetch(url)
        .then(r => r.json())
        .then(data => {
          const items = data.items || [];
          if(items.length === 0) return;
          const listEl = document.getElementById('rt-intel-list');
          const html = items.map(i => _buildNewsCard(i, true)).join('');
          listEl.insertAdjacentHTML('afterbegin', html);
          _latestPublishedAt = items[0].published_at;
          const ts = document.getElementById('rt-intel-last-update');
          if(ts) ts.textContent = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}) + ' güncellendi · ' + items.length + ' yeni';
        })
        .catch(() => {});
    }

    function _startAutoRefresh() {
        if(_autoRefreshTimer) clearInterval(_autoRefreshTimer);
        _autoRefreshTimer = setInterval(rtAutoRefreshNews, 5 * 60 * 1000);  // 5 dakika
    }

    // Infinite Scroll
    window.addEventListener('scroll', () => {
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
        rtFetchNewsIntelligence();
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      rtAutoFillInitial();
      _startAutoRefresh();
    });
</script>
{% endblock %}
