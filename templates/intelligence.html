{% extends "base.html" %}

{% block content %}
<div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
  <div class="mb-8 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-slate-100">NEWS</h1>
      <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Sektörel haber takibi ve rakip analizi.</p>
    </div>
    <button id="rt-news-sync-btn" type="button" onclick="rtSyncNews()" class="inline-flex items-center gap-2 rounded-lg border border-zinc-300 bg-white px-4 py-2 text-sm font-bold text-zinc-700 shadow-sm transition hover:bg-zinc-50 dark:border-zinc-700 dark:bg-zinc-900 dark:text-zinc-200 dark:hover:bg-zinc-800">
      <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"/></svg>
      Güncelle
    </button>
  </div>

  <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-700/90 dark:bg-zinc-900/50">
    <div class="mb-6 flex gap-1 border-b border-slate-200 dark:border-slate-700">
      <button type="button" onclick="rtSwitchIntelTab('İş Dünyası')" id="rt-intel-tab-is" class="rt-alarm-tab-active">İş Dünyası</button>
      <button type="button" onclick="rtSwitchIntelTab('Dünya')" id="rt-intel-tab-dunya" class="rt-alarm-tab-inactive">Dünya</button>
      <button type="button" onclick="rtSwitchIntelTab('Türkiye')" id="rt-intel-tab-tr" class="rt-alarm-tab-inactive">Türkiye</button>
      <button type="button" onclick="rtSwitchIntelTab('Bilim ve Teknoloji')" id="rt-intel-tab-tech" class="rt-alarm-tab-inactive">Bilim ve Teknoloji</button>
    </div>

    <div id="rt-intel-list" class="grid grid-cols-1 gap-4 lg:grid-cols-2">
      <div class="animate-pulse space-y-4">
        <div class="h-24 w-full rounded-xl bg-slate-100 dark:bg-slate-800/50"></div>
        <div class="h-24 w-full rounded-xl bg-slate-100 dark:bg-slate-800/50"></div>
      </div>
    </div>
  </div>
</div>

<style>
  .rt-alarm-tab-active {
    padding: 0.75rem 1.25rem;
    font-size: 0.875rem;
    font-weight: 800;
    border-bottom: 2px solid #2563eb;
    color: #1e3a8a;
  }
  html.dark .rt-alarm-tab-active {
    color: #60a5fa;
    border-bottom-color: #3b82f6;
  }
  .rt-alarm-tab-inactive {
    padding: 0.75rem 1.25rem;
    font-size: 0.875rem;
    font-weight: 700;
    border-bottom: 2px solid transparent;
    color: rgb(100 116 139);
    background: transparent;
  }
  html.dark .rt-alarm-tab-inactive {
    color: rgb(113 113 122);
  }
</style>

<script>
    var _activeIntelCategory = "İş Dünyası";
    var _intelOffset = 0;
    var _intelLoading = false;
    var _intelFinished = false;
    
    async function rtSyncNews() {
      const btn = document.getElementById('rt-news-sync-btn');
      if(btn) {
        btn.disabled = true;
        btn.innerHTML = '<svg class="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg> Temizleniyor ve Taranıyor...';
      }
      try {
        await fetch('/api/admin/news-intelligence/sync?reset=true', { method: 'POST' });
      } catch(e) { console.error('Sync failed', e); }
      if(btn) {
        btn.disabled = false;
        btn.innerHTML = '<svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"/></svg> Güncelle';
      }
      // Reset state and reload
      _intelOffset = 0;
      _intelFinished = false;
      document.getElementById('rt-intel-list').innerHTML = '';
      rtFetchNewsIntelligence();
    }
    
    function rtSwitchIntelTab(cat) {
      if(_activeIntelCategory === cat) return;
      _activeIntelCategory = cat;
      _intelOffset = 0;
      _intelFinished = false;
      
      document.querySelectorAll('[id^="rt-intel-tab-"]').forEach(btn => {
          btn.className = 'rt-alarm-tab-inactive';
      });
      if(cat === 'İş Dünyası') document.getElementById('rt-intel-tab-is').className = 'rt-alarm-tab-active';
      else if(cat === 'Dünya') document.getElementById('rt-intel-tab-dunya').className = 'rt-alarm-tab-active';
      else if(cat === 'Türkiye') document.getElementById('rt-intel-tab-tr').className = 'rt-alarm-tab-active';
      else if(cat === 'Bilim ve Teknoloji') document.getElementById('rt-intel-tab-tech').className = 'rt-alarm-tab-active';
      
      document.getElementById('rt-intel-list').innerHTML = '';
      rtFetchNewsIntelligence();
    }

    function rtFetchNewsIntelligence() {
      if(_intelLoading || _intelFinished) return;
      
      const listEl = document.getElementById('rt-intel-list');
      if(!listEl) return;
      
      _intelLoading = true;
      const limit = 20;
      
      fetch(`/api/admin/news-intelligence?category=${encodeURIComponent(_activeIntelCategory)}&limit=${limit}&offset=${_intelOffset}`)
        .then(r => r.json())
        .then(items => {
          _intelLoading = false;
          if(!items.length) {
            if(_intelOffset === 0) {
              listEl.innerHTML = '<p class="text-sm text-slate-500 py-4 col-span-full text-center">Bu kategoride henüz haber bulunamadı.</p>';
            }
            _intelFinished = true;
            return;
          }
          
          const html = items.map(item => {
            const d = new Date(item.published_at);
            const dateStr = d.toLocaleDateString('tr-TR') + ' ' + d.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            
            let faviconUrl = '';
            try {
              const targetUrl = item.source_url || item.url;
              const url = new URL(targetUrl);
              faviconUrl = `https://www.google.com/s2/favicons?domain=${url.hostname}&sz=32`;
            } catch(e) { faviconUrl = '/static/favicon.png'; }

            return `
              <div class="group flex items-start gap-4 overflow-hidden rounded-2xl border border-slate-100 bg-white p-4 transition hover:border-indigo-200 hover:shadow-md dark:border-slate-800 dark:bg-zinc-900/80 dark:hover:border-indigo-900/50">
                <div class="relative h-24 w-24 flex-shrink-0 overflow-hidden rounded-xl bg-slate-100 dark:bg-slate-800">
                  <img src="${item.image_url || 'https://images.unsplash.com/photo-1504711432869-0df30d48bb24?q=80&w=200&auto=format&fit=crop'}" 
                       class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-105" 
                       onerror="this.src='https://images.unsplash.com/photo-1504711432869-0df30d48bb24?q=80&w=200&auto=format&fit=crop'">
                </div>
                <div class="flex flex-1 flex-col min-w-0">
                  <div class="flex items-center justify-between mb-1.5">
                    <div class="flex items-center gap-1.5 truncate">
                      <img src="${faviconUrl}" class="w-3.5 h-3.5 rounded-sm" onerror="this.src='/static/favicon.png'">
                      <span class="text-[10px] font-bold text-slate-500 dark:text-slate-400 truncate">${item.source_name}</span>
                    </div>
                    <span class="text-[9px] font-medium text-slate-400 shrink-0">${dateStr}</span>
                  </div>
                  <h3 class="text-sm font-bold text-slate-900 dark:text-slate-100 mb-1 leading-tight line-clamp-2">
                    <a href="${item.url}" target="_blank" class="hover:text-indigo-600 transition-colors">${item.headline.split(' - ')[0]}</a>
                  </h3>
                  <p class="text-[11px] text-slate-500 dark:text-slate-400 line-clamp-2 leading-snug mb-2">${item.content.replace(/<[^>]*>?/gm, '').split('...')[0]}...</p>
                  <div class="mt-auto">
                    <a href="${item.url}" target="_blank" class="text-[10px] font-bold text-indigo-600 hover:text-indigo-800 dark:text-indigo-400 flex items-center gap-1">
                      Haber Detayı
                      <svg class="w-2.5 h-2.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
                    </a>
                  </div>
                </div>
              </div>
            `;
          }).join('');
          
          listEl.insertAdjacentHTML('beforeend', html);
          _intelOffset += items.length;
        });
    }

    // Infinite Scroll detection
    window.addEventListener('scroll', () => {
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
        rtFetchNewsIntelligence();
      }
    });

    document.addEventListener('DOMContentLoaded', rtFetchNewsIntelligence);
</script>
{% endblock %}
