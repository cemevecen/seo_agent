{% extends "base.html" %}

{% block content %}
<div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
  <div class="mb-8 flex flex-wrap items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-slate-100">NEWS</h1>
    </div>
    <div class="flex items-center gap-2">
      <!-- Google Translate Element (Hidden) -->
      <div id="google_translate_element" style="display:none;"></div>
      <button type="button" onclick="triggerGoogleTranslate()" class="inline-flex items-center gap-2 rounded-lg border border-indigo-200 bg-indigo-50 px-3 py-2 text-sm font-bold text-indigo-700 shadow-sm transition hover:bg-indigo-100 dark:border-indigo-500/20 dark:bg-indigo-500/10 dark:text-indigo-400 dark:hover:bg-indigo-500/20">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5a18.022 18.022 0 01-3.827-5.802M10.5 5a9.052 9.052 0 00-2.862 5.5m3.362 5.5l-1.5-3.5m0 0l-1.5 3.5m1.5-3.5h-3m-1.5 8.5h3.5m1.5-1.5h1.5m1.5-1.5h1.5"/></svg>
        Sayfayı Çevir
      </button>
      <button id="rt-news-sync-btn" type="button" onclick="rtSyncNews()" class="inline-flex items-center gap-2 rounded-lg border border-zinc-300 bg-white px-4 py-2 text-sm font-bold text-zinc-700 shadow-sm transition hover:bg-zinc-50 dark:border-zinc-700 dark:bg-zinc-900 dark:text-zinc-200 dark:hover:bg-zinc-800">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"/></svg>
        Güncelle
      </button>
    </div>
  </div>

  <div class="mt-4 rt-intel-container rounded-[2rem] border p-6 shadow-sm">
    <div class="mb-6 flex gap-1 overflow-x-auto border-b border-slate-200/60 pb-1 scrollbar-hide dark:border-white/5">
      <button type="button" onclick="rtSwitchIntelTab('İş Dünyası')" id="rt-intel-tab-is" class="rt-alarm-tab-active whitespace-nowrap">İş Dünyası</button>
      <button type="button" onclick="rtSwitchIntelTab('Finans & Borsa')" id="rt-intel-tab-fin" class="rt-alarm-tab-inactive whitespace-nowrap">Finans & Borsa</button>
      <button type="button" onclick="rtSwitchIntelTab('Rakip')" id="rt-intel-tab-rakip" class="rt-alarm-tab-inactive whitespace-nowrap">Rakip</button>
      <button type="button" onclick="rtSwitchIntelTab('Dünya')" id="rt-intel-tab-dunya" class="rt-alarm-tab-inactive whitespace-nowrap">Dünya</button>
      <button type="button" onclick="rtSwitchIntelTab('Türkiye')" id="rt-intel-tab-tr" class="rt-alarm-tab-inactive whitespace-nowrap">Türkiye</button>
      <button type="button" onclick="rtSwitchIntelTab('Bilim ve Teknoloji')" id="rt-intel-tab-tech" class="rt-alarm-tab-inactive whitespace-nowrap">Bilim ve Teknoloji</button>
      <button type="button" onclick="rtSwitchIntelTab('Yahoo Finance')" id="rt-intel-tab-yahoo" class="rt-alarm-tab-inactive whitespace-nowrap">Yahoo</button>
    </div>

    <div id="rt-intel-list" class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3">
      <!-- Veriler yüklendiğinde buraya dolacak -->
    </div>
  </div>
</div>

<style>
  /* Global Container ve Kart Renkleri */
  .rt-intel-container { background-color: #ffffff; border-color: #f1f5f9; }
  html.dark .rt-intel-container { background-color: #09090b !important; border-color: rgba(255,255,255,0.03) !important; }

  .rt-intel-container {
    background-color: #09090b !important;
  }
  @media (max-width: 640px) {
    .rt-intel-container {
      padding: 1rem !important;
      border-radius: 1.5rem !important;
    }
  }
  .rt-intel-card {
    background-color: #121214 !important;
    border-color: rgba(255, 255, 255, 0.05) !important;
  }
  .scrollbar-hide::-webkit-scrollbar {
    display: none;
  }
  .scrollbar-hide {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  .rt-alarm-tab-active {
    padding: 0.75rem 1.25rem;
    font-size: 0.875rem;
    font-weight: 800;
    border-bottom: 2px solid #2563eb;
    color: #1e3a8a;
  }
  html.dark .rt-alarm-tab-active {
    color: #e4e4e7;
    border-bottom-color: #3f3f46;
  }
  .rt-alarm-tab-inactive {
    padding: 0.75rem 1.25rem;
    font-size: 0.875rem;
    font-weight: 700;
    border-bottom: 2px solid transparent;
    color: rgb(100 116 139);
    background: transparent;
  }
  html.dark .rt-alarm-tab-inactive {
    color: #52525b;
  }
</style>

<script>
    var _activeIntelCategory = "İş Dünyası";
    var _intelOffset = 0;
    var _intelLoading = false;
    var _intelFinished = false;
    
    async function rtSyncNews() {
      const btn = document.getElementById('rt-news-sync-btn');
      if(btn) {
        btn.disabled = true;
        btn.innerHTML = '<svg class="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg> Temizleniyor ve Taranıyor...';
      }
      try {
        await fetch('/api/admin/news-intelligence/sync?reset=true', { method: 'POST' });
      } catch(e) { console.error('Sync failed', e); }
      if(btn) {
        btn.disabled = false;
        btn.innerHTML = '<svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182"/></svg> Güncelle';
      }
      // Reset state and reload
      _intelOffset = 0;
      _intelFinished = false;
      document.getElementById('rt-intel-list').innerHTML = '';
      rtFetchNewsIntelligence();
    }
    
    function rtSwitchIntelTab(cat) {
      if(_activeIntelCategory === cat) return;
      _activeIntelCategory = cat;
      _intelOffset = 0;
      _intelFinished = false;
      
      document.querySelectorAll('[id^="rt-intel-tab-"]').forEach(btn => {
          btn.className = 'rt-alarm-tab-inactive';
      });
      if(cat === 'İş Dünyası') document.getElementById('rt-intel-tab-is').className = 'rt-alarm-tab-active';
      else if(cat === 'Finans & Borsa') document.getElementById('rt-intel-tab-fin').className = 'rt-alarm-tab-active';
      else if(cat === 'Rakip') document.getElementById('rt-intel-tab-rakip').className = 'rt-alarm-tab-active';
      else if(cat === 'Yahoo Finance') document.getElementById('rt-intel-tab-yahoo').className = 'rt-alarm-tab-active';
      else if(cat === 'Dünya') document.getElementById('rt-intel-tab-dunya').className = 'rt-alarm-tab-active';
      else if(cat === 'Türkiye') document.getElementById('rt-intel-tab-tr').className = 'rt-alarm-tab-active';
      else if(cat === 'Bilim ve Teknoloji') document.getElementById('rt-intel-tab-tech').className = 'rt-alarm-tab-active';
      
      document.getElementById('rt-intel-list').innerHTML = '';
      rtFetchNewsIntelligence();
    }

    function rtFetchNewsIntelligence() {
      if(_intelLoading || _intelFinished) return;
      
      const listEl = document.getElementById('rt-intel-list');
      if(!listEl) return;
      
      _intelLoading = true;
      const limit = 20;
      
      fetch(`/api/admin/news-intelligence?category=${encodeURIComponent(_activeIntelCategory)}&limit=${limit}&offset=${_intelOffset}`)
        .then(r => r.json())
        .then(items => {
          _intelLoading = false;
          if(!items.length) {
            if(_intelOffset === 0) {
              listEl.innerHTML = '<p class="text-sm text-slate-500 py-4 col-span-full text-center">Bu kategoride henüz haber bulunamadı.</p>';
            }
            _intelFinished = true;
            return;
          }
          
          const html = items.map(item => {
            const d = new Date(item.published_at);
            const timeStr = d.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            
            const translateBtn = _activeIntelCategory === "Yahoo Finance" 
              ? `<button onclick="rtTranslateCard(this)" class="text-[9px] font-bold text-indigo-500 hover:text-indigo-400 ml-2 transition-all">TR ÇEVİR</button>` 
              : '';
            
            let faviconUrl = '';
            try {
              const targetUrl = item.source_url || item.url;
              const url = new URL(targetUrl);
              faviconUrl = `https://www.google.com/s2/favicons?domain=${url.hostname}&sz=64`;
            } catch(e) { faviconUrl = '/static/favicon.png'; }

            return `
              <div class="group rt-intel-card flex items-start gap-4 overflow-hidden rounded-2xl border p-4 transition-all duration-300 hover:border-indigo-200/50 hover:shadow-lg dark:hover:border-zinc-700/50 dark:hover:bg-[#18181b]">
                <div class="flex h-10 w-10 flex-shrink-0 items-center justify-center overflow-hidden rounded-lg bg-slate-100 p-1.5 dark:bg-zinc-800/40">
                  <img src="${faviconUrl}" 
                       class="h-full w-full object-contain" 
                       onerror="this.src='/static/favicon.png'">
                </div>
                <div class="flex flex-1 flex-col min-w-0">
                  <div class="flex items-center justify-between mb-1.5">
                    <div class="flex items-center min-w-0">
                      <span class="text-[10px] font-bold text-slate-500 dark:text-zinc-500 truncate uppercase tracking-wider">${item.source_name}</span>
                      ${translateBtn}
                    </div>
                    <span class="text-[10px] font-medium text-slate-400 dark:text-zinc-400 opacity-40 shrink-0">${timeStr}</span>
                  </div>
                  <h3 class="text-[13px] font-bold text-slate-900 dark:text-zinc-200 mb-1 leading-snug line-clamp-2">
                    <a href="${item.url}" target="_blank" class="hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">${item.headline.split(' - ')[0]}</a>
                  </h3>
                  <p class="text-[11px] text-slate-500 dark:text-zinc-500 line-clamp-2 leading-relaxed">${item.content.replace(/<[^>]*>?/gm, '').split('...')[0]}...</p>
                </div>
              </div>
            `;
          }).join('');
          
          listEl.insertAdjacentHTML('beforeend', html);
          _intelOffset += items.length;
        });
    }

    async function rtTranslateCard(btn) {
      const card = btn.closest('.rt-intel-card');
      const headlineEl = card.querySelector('h3 a');
      const contentEl = card.querySelector('p');
      
      const originalText = headlineEl.innerText + " | " + contentEl.innerText;
      
      btn.disabled = true;
      const oldText = btn.innerText;
      btn.innerText = "ÇEVİRİLİYOR...";
      btn.classList.add('animate-pulse');
      
      const formData = new FormData();
      formData.append('text', originalText);
      
      try {
        const r = await fetch('/api/admin/news-intelligence/translate', {
            method: 'POST',
            body: formData
        });
        const data = await r.json();
        if(data.ok) {
            const parts = data.translated.split(' | ');
            if(parts.length >= 2) {
                headlineEl.innerText = parts[0];
                contentEl.innerText = parts[1];
            } else {
                headlineEl.innerText = data.translated;
            }
            btn.innerText = "ÇEVRİLDİ ✓";
            btn.classList.remove('text-indigo-500');
            btn.classList.add('text-green-500');
        } else {
            btn.innerText = "HATA!";
            console.error('Translation error:', data.error);
        }
      } catch(e) {
        btn.innerText = "HATA!";
        console.error('Translation fetch error:', e);
      } finally {
        btn.classList.remove('animate-pulse');
      }
    }

    // Infinite Scroll detection
    window.addEventListener('scroll', () => {
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
        rtFetchNewsIntelligence();
      }
    });

    document.addEventListener('DOMContentLoaded', rtFetchNewsIntelligence);
    // Google Translate Widget Integration
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'tr',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }

    function triggerGoogleTranslate() {
      const select = document.querySelector('.goog-te-combo');
      if (select) {
        select.value = 'tr';
        select.dispatchEvent(new Event('change'));
      } else {
        const widget = document.getElementById('google_translate_element');
        if (widget) widget.style.display = 'block';
      }
    }
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
{% endblock %}
