<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ site_name or "SEO Agent Dashboard" }}</title>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- HTMX CDN -->
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <!-- Plotly CDN -->
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top,_#f8fafc,_#e2e8f0_55%,_#cbd5e1)] text-slate-900">
  <div id="app-shell" class="flex min-h-screen">
    <aside id="sidebar" class="w-72 shrink-0 overflow-hidden bg-slate-900 text-slate-100 p-5 transition-all duration-300 ease-out">
      <h1 id="sidebar-title" class="text-xl font-bold">SEO Agent</h1>
      <p id="sidebar-subtitle" class="text-sm text-slate-300 mt-1">İzlenen Siteler</p>

      <nav id="sidebar-nav" class="mt-6 space-y-2">
        {% if sites %}
          {% for site in sites %}
            <a
              href="/site/{{ site.domain }}"
              class="block rounded-md px-3 py-2 text-sm font-medium hover:bg-slate-700 sidebar-link"
              hx-get="/site/{{ site.domain }}"
              hx-target="#content"
              hx-swap="innerHTML"
              hx-push-url="true"
            >
              {{ site.label }}
            </a>
          {% endfor %}
        {% else %}
          <span class="block rounded-md bg-slate-800 px-3 py-2 text-sm text-slate-300">
            Henüz site eklenmedi.
          </span>
        {% endif %}
      </nav>
    </aside>

    <main class="flex-1">
      <header class="border-b border-slate-200 bg-white px-6 py-4">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <button
              id="sidebar-toggle"
              type="button"
              class="inline-flex h-9 w-9 items-center justify-center rounded-md border border-slate-300 text-slate-700 hover:bg-slate-100"
              aria-expanded="true"
              aria-controls="sidebar"
              title="Sidebar Daralt/Genişlet"
            >
              <svg id="sidebar-toggle-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 rotate-180" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M12.293 14.707a1 1 0 010-1.414L15.586 10l-3.293-3.293a1 1 0 111.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0zm-6 0a1 1 0 010-1.414L9.586 10 6.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
              </svg>
            </button>
            <h2 id="header-site-title" class="text-lg font-semibold">{{ site_name or "SEO Agent Dashboard" }}</h2>
          </div>
          <div class="flex items-center gap-3 text-sm">
            <a href="/" class="text-slate-600 hover:text-slate-900">Dashboard</a>
            {% if domain %}
            <a id="header-data-explorer-link" href="/data-explorer/{{ domain }}" class="text-slate-600 hover:text-slate-900">Data Explorer</a>
            {% endif %}
            <a href="/alerts" class="text-slate-600 hover:text-slate-900">Uyarılar</a>
            <a href="/settings" class="text-slate-600 hover:text-slate-900">Ayarlar</a>
          </div>
        </div>
      </header>

      <section id="content" class="p-6">
        {% block content %}{% endblock %}
      </section>
    </main>
  </div>

  <script>
    (function () {
      const shell = document.getElementById('app-shell');
      const sidebar = document.getElementById('sidebar');
      const title = document.getElementById('sidebar-title');
      const subtitle = document.getElementById('sidebar-subtitle');
      const nav = document.getElementById('sidebar-nav');
      const toggle = document.getElementById('sidebar-toggle');
      const icon = document.getElementById('sidebar-toggle-icon');
      const linkItems = document.querySelectorAll('.sidebar-link');
      if (!shell || !sidebar || !toggle || !icon) {
        return;
      }

      function setCollapsed(collapsed) {
        sidebar.classList.toggle('w-72', !collapsed);
        sidebar.classList.toggle('w-0', collapsed);
        sidebar.classList.toggle('px-5', !collapsed);
        sidebar.classList.toggle('px-0', collapsed);
        sidebar.classList.toggle('py-5', !collapsed);
        sidebar.classList.toggle('py-0', collapsed);
        sidebar.classList.toggle('border-r', !collapsed);
        sidebar.classList.toggle('border-slate-800', !collapsed);

        if (title) {
          title.classList.toggle('hidden', collapsed);
        }
        if (subtitle) {
          subtitle.classList.toggle('hidden', collapsed);
        }
        if (nav) {
          nav.classList.toggle('hidden', collapsed);
        }
        linkItems.forEach(function (item) {
          item.classList.toggle('px-3', true);
          item.removeAttribute('title');
        });

        icon.classList.toggle('rotate-180', !collapsed);
        icon.classList.add('transition-transform', 'duration-300');
        toggle.setAttribute('aria-expanded', String(!collapsed));
        localStorage.setItem('seo-sidebar-collapsed', collapsed ? '1' : '0');
      }

      const stored = localStorage.getItem('seo-sidebar-collapsed') === '1';
      setCollapsed(stored);

      toggle.addEventListener('click', function () {
        const collapsed = sidebar.classList.contains('w-0');
        setCollapsed(!collapsed);
      });

      function syncHeaderFromContent() {
        const content = document.getElementById('content');
        if (!content) {
          return;
        }
        const siteRoot = content.querySelector('[data-site-domain]');
        if (!siteRoot) {
          return;
        }

        const siteDomain = siteRoot.getAttribute('data-site-domain');
        const siteTitle = siteRoot.getAttribute('data-site-title') || 'SEO Agent Dashboard';
        const headerTitle = document.getElementById('header-site-title');
        const explorerLink = document.getElementById('header-data-explorer-link');

        if (headerTitle) {
          headerTitle.textContent = siteTitle;
        }
        if (explorerLink && siteDomain) {
          explorerLink.setAttribute('href', '/data-explorer/' + siteDomain);
        }
        document.title = siteTitle;
      }

      document.body.addEventListener('htmx:afterSwap', function (event) {
        if (event.target && event.target.id === 'content') {
          syncHeaderFromContent();
        }
      });

      syncHeaderFromContent();
    })();
  </script>
</body>
</html>
