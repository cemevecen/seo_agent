<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ site_name or "Giriş — SEO Agent" }}</title>
  {% set favicon_v = "12" %}
  {% set app_css_v = "15" %}
  <link rel="icon" href="/static/favicon.png?v={{ favicon_v }}" sizes="any" type="image/png" />
  <link rel="stylesheet" href="/static/css/app.css?v={{ app_css_v }}" />
  <meta name="robots" content="noindex, nofollow" />
  <script>
    (function () {
      try {
        var k = 'seo-theme';
        var v = localStorage.getItem(k);
        var root = document.documentElement;
        if (v === 'midnight' || v === 'dark' || v === 'dim') {
          root.classList.add('dark', 'midnight');
        } else if (v === 'light') {
          root.classList.remove('dark', 'midnight');
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          root.classList.add('dark', 'midnight');
        }
      } catch (e) {}
    })();
  </script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900 dark:bg-zinc-950 dark:text-zinc-100">
  <div class="flex min-h-screen flex-col items-center justify-center px-4 py-10">
    <div class="mb-6 text-center">
      <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-zinc-500">SEO Agent</p>
      <p class="mt-1 text-sm text-slate-600 dark:text-zinc-400">Panele erişmek için giriş yapın</p>
    </div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
