{% extends "base.html" %}
{% block content %}
<div class="mx-auto w-full max-w-[1920px] space-y-4 mz-page app-banner-page" data-header-title="Ad · GA4 banner">
  <div class="flex flex-wrap items-center justify-between gap-3 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm dark:border-zinc-700 dark:bg-zinc-900">
    <div>
      <h1 class="text-lg font-extrabold text-slate-900 dark:text-zinc-100">GA4 · İlk açılış / kampanya</h1>
      <p class="mt-1 text-xs text-slate-500 dark:text-zinc-400">
        Exploration «android banner» — boyut: First user campaign · metrik: First opens veya Event count
      </p>
    </div>
    <a href="/ad" class="rounded-lg border border-slate-300 px-3 py-2 text-xs font-semibold text-slate-700 hover:bg-slate-50 dark:border-zinc-600 dark:text-zinc-200 dark:hover:bg-zinc-800">← Monetizasyon</a>
  </div>

  <div class="rounded-2xl border border-slate-200 bg-white p-4 dark:border-zinc-700 dark:bg-zinc-900">
    <div class="flex flex-wrap items-end gap-3">
      <label class="text-xs font-semibold text-slate-600 dark:text-zinc-300">
        Proje
        <select id="ab-project" class="mt-1 block rounded-lg border border-slate-300 px-2 py-1.5 text-sm dark:border-zinc-600 dark:bg-black">
          <option value="doviz" selected>doviz</option>
          <option value="sinemalar">sinemalar</option>
        </select>
      </label>
      <label class="text-xs font-semibold text-slate-600 dark:text-zinc-300">
        Uygulama
        <select id="ab-profile" class="mt-1 block rounded-lg border border-slate-300 px-2 py-1.5 text-sm dark:border-zinc-600 dark:bg-black">
          <option value="android" selected>Android</option>
          <option value="ios">iOS</option>
        </select>
      </label>
      <label class="text-xs font-semibold text-slate-600 dark:text-zinc-300">
        Metrik
        <select id="ab-metric" class="mt-1 block rounded-lg border border-slate-300 px-2 py-1.5 text-sm dark:border-zinc-600 dark:bg-black">
          <option value="first_opens" selected>First opens (first_open)</option>
          <option value="event_count">Event count (tüm eventler)</option>
        </select>
      </label>
      <label class="text-xs font-semibold text-slate-600 dark:text-zinc-300">
        Başlangıç
        <input id="ab-start" type="date" class="mt-1 block rounded-lg border border-slate-300 px-2 py-1.5 text-sm dark:border-zinc-600 dark:bg-black" />
      </label>
      <label class="text-xs font-semibold text-slate-600 dark:text-zinc-300">
        Bitiş
        <input id="ab-end" type="date" class="mt-1 block rounded-lg border border-slate-300 px-2 py-1.5 text-sm dark:border-zinc-600 dark:bg-black" />
      </label>
      <label class="text-xs font-semibold text-slate-600 dark:text-zinc-300">
        Kampanya (üst)
        <select id="ab-top" class="mt-1 block rounded-lg border border-slate-300 px-2 py-1.5 text-sm dark:border-zinc-600 dark:bg-black">
          <option value="10" selected>10</option>
          <option value="15">15</option>
          <option value="25">25</option>
        </select>
      </label>
      <button id="ab-run" type="button" class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-bold text-white hover:bg-slate-700 dark:bg-zinc-600">Yenile</button>
    </div>
    <p id="ab-meta" class="mt-3 text-xs text-slate-500 dark:text-zinc-400"></p>
    <p id="ab-error" class="mt-2 hidden rounded-lg border border-rose-300 bg-rose-50 px-3 py-2 text-xs text-rose-800 dark:border-rose-800 dark:bg-rose-950/40 dark:text-rose-200"></p>
  </div>

  <div class="rounded-2xl border border-slate-200 bg-white p-4 dark:border-zinc-700 dark:bg-zinc-900">
    <h2 id="ab-chart-total-title" class="mb-2 text-sm font-bold text-slate-800 dark:text-zinc-100">Toplam (günlük)</h2>
    <div id="ab-chart-total" class="mz-chart-plot w-full" style="min-height:320px;height:42vh;max-height:520px;"></div>
  </div>

  <div class="rounded-2xl border border-slate-200 bg-white p-4 dark:border-zinc-700 dark:bg-zinc-900">
    <h2 id="ab-chart-camp-title" class="mb-2 text-sm font-bold text-slate-800 dark:text-zinc-100">First user campaign (günlük)</h2>
    <div id="ab-chart-campaign" class="mz-chart-plot w-full" style="min-height:360px;height:48vh;max-height:640px;"></div>
  </div>

  <div class="rounded-2xl border border-slate-200 bg-white p-4 dark:border-zinc-700 dark:bg-zinc-900">
    <h2 class="mb-2 text-sm font-bold text-slate-800 dark:text-zinc-100">Dönem toplamı — kampanyalar</h2>
    <div class="overflow-x-auto">
      <table class="min-w-full text-left text-xs">
        <thead class="border-b border-slate-200 text-slate-500 dark:border-zinc-700">
          <tr><th class="px-2 py-2 font-bold">Kampanya</th><th class="px-2 py-2 font-bold">Toplam</th></tr>
        </thead>
        <tbody id="ab-table-body" class="divide-y divide-slate-100 dark:divide-zinc-800"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
(function () {
  var COLORS = ["#2563eb", "#7c3aed", "#059669", "#d97706", "#dc2626", "#0891b2", "#4f46e5", "#65a30d", "#c026d3", "#ea580c"];

  function qsParams() {
    var p = new URLSearchParams(window.location.search);
    return p;
  }

  function syncUrl() {
    var p = new URLSearchParams();
    p.set("project", document.getElementById("ab-project").value);
    p.set("profile", document.getElementById("ab-profile").value);
    p.set("metric", document.getElementById("ab-metric").value);
    p.set("start", document.getElementById("ab-start").value);
    p.set("end", document.getElementById("ab-end").value);
    p.set("top", document.getElementById("ab-top").value);
    var url = window.location.pathname + "?" + p.toString();
    window.history.replaceState({}, "", url);
  }

  function readUrlIntoForm() {
    var p = qsParams();
    if (p.get("project")) document.getElementById("ab-project").value = p.get("project");
    if (p.get("profile")) document.getElementById("ab-profile").value = p.get("profile");
    if (p.get("metric")) document.getElementById("ab-metric").value = p.get("metric");
    if (p.get("top")) document.getElementById("ab-top").value = p.get("top");
    if (p.get("start")) document.getElementById("ab-start").value = p.get("start");
    if (p.get("end")) document.getElementById("ab-end").value = p.get("end");
  }

  function defaultDates() {
    var end = new Date();
    end.setDate(end.getDate() - 1);
    var start = new Date(end);
    start.setDate(start.getDate() - 27);
    function iso(d) {
      return d.toISOString().slice(0, 10);
    }
    if (!document.getElementById("ab-start").value) document.getElementById("ab-start").value = iso(start);
    if (!document.getElementById("ab-end").value) document.getElementById("ab-end").value = iso(end);
  }

  function isDark() {
    return document.documentElement.classList.contains("dark") || document.documentElement.classList.contains("midnight");
  }

  function plotLayout(extra) {
    var dark = isDark();
    return Object.assign({
      autosize: true,
      margin: { l: 48, r: 16, t: 8, b: 40 },
      paper_bgcolor: "rgba(0,0,0,0)",
      plot_bgcolor: "rgba(0,0,0,0)",
      font: { size: 11, color: dark ? "#e4e4e7" : "#334155" },
      xaxis: { gridcolor: dark ? "#3f3f46" : "#e2e8f0", tickangle: -35 },
      yaxis: { gridcolor: dark ? "#3f3f46" : "#e2e8f0", title: extra && extra.yTitle ? extra.yTitle : "" },
      legend: { orientation: "h", y: 1.12, x: 0 },
      hovermode: "x unified",
    }, extra || {});
  }

  function drawLine(elId, traces, layout) {
    var el = document.getElementById(elId);
    if (!el || !window.Plotly) return;
    try { Plotly.purge(el); } catch (_) {}
    Plotly.newPlot(el, traces, layout, { responsive: true, displayModeBar: true });
  }

  function render(data) {
    var label = data.metric_label || "First opens";
    document.getElementById("ab-chart-total-title").textContent = label + " — toplam (günlük)";
    document.getElementById("ab-chart-camp-title").textContent = label + " — First user campaign (günlük, üst " + (data.top_campaigns || 10) + ")";

    var dates = (data.total_daily && data.total_daily.dates) || [];
    drawLine("ab-chart-total", [{
      x: dates,
      y: (data.total_daily && data.total_daily.values) || [],
      type: "scatter",
      mode: "lines",
      name: "Toplam",
      line: { width: 2, color: "#2563eb" },
    }], plotLayout({ yTitle: label }));

    var campTraces = (data.campaigns || []).map(function (c, i) {
      return {
        x: (c.daily && c.daily.dates) || dates,
        y: (c.daily && c.daily.values) || [],
        type: "scatter",
        mode: "lines",
        name: c.campaign || "(not set)",
        line: { width: 1.5, color: COLORS[i % COLORS.length] },
      };
    });
    drawLine("ab-chart-campaign", campTraces, plotLayout({ yTitle: label }));

    var tbody = document.getElementById("ab-table-body");
    tbody.innerHTML = "";
    (data.campaigns || []).forEach(function (c) {
      var tr = document.createElement("tr");
      tr.innerHTML = "<td class=\"px-2 py-1.5 font-medium text-slate-800 dark:text-zinc-100\">" + escapeHtml(c.campaign) + "</td>"
        + "<td class=\"px-2 py-1.5 tabular-nums\">" + formatNum(c.total) + "</td>";
      tbody.appendChild(tr);
    });

    document.getElementById("ab-meta").textContent = [
      data.domain || "",
      data.profile || "",
      data.start + " → " + data.end,
      "GA4 · " + (data.fetched_at ? new Date(data.fetched_at).toLocaleString("tr-TR") : ""),
    ].filter(Boolean).join(" · ");
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function formatNum(n) {
    return Number(n || 0).toLocaleString("tr-TR");
  }

  async function load() {
    var errEl = document.getElementById("ab-error");
    errEl.classList.add("hidden");
    syncUrl();
    var q = new URLSearchParams();
    q.set("project", document.getElementById("ab-project").value);
    q.set("profile", document.getElementById("ab-profile").value);
    q.set("metric", document.getElementById("ab-metric").value);
    q.set("start", document.getElementById("ab-start").value);
    q.set("end", document.getElementById("ab-end").value);
    q.set("top_campaigns", document.getElementById("ab-top").value);
    document.getElementById("ab-meta").textContent = "Yükleniyor…";
    try {
      var r = await fetch("/api/mz-analytics/ga4-app-banner?" + q.toString(), { credentials: "same-origin" });
      var body = await r.json();
      if (!r.ok) throw new Error(body.detail || "İstek başarısız");
      render(body);
    } catch (e) {
      errEl.textContent = (e && e.message) || "Veri alınamadı";
      errEl.classList.remove("hidden");
      document.getElementById("ab-meta").textContent = "";
    }
  }

  readUrlIntoForm();
  defaultDates();
  document.getElementById("ab-run").addEventListener("click", load);
  ["ab-project", "ab-profile", "ab-metric", "ab-top"].forEach(function (id) {
    document.getElementById(id).addEventListener("change", load);
  });
  load();
})();
</script>
{% endblock %}
