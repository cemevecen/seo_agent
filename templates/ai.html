{% extends "base.html" %}

{% block content %}
{% include "partials/ai_content.html" %}
<script>
(function () {
  function aiBriefLlmAvailability() {
    var root = document.getElementById("ai-brief-view");
    if (!root) {
      return { groq: false, gemini: false };
    }
    return {
      groq: root.getAttribute("data-groq-available") === "1",
      gemini: root.getAttribute("data-gemini-available") === "1",
    };
  }

  function applyAiBriefLlm(which) {
    var root = document.getElementById("ai-brief-view");
    var hid = document.getElementById("ai-brief-llm-value");
    if (!root || !hid) {
      return;
    }
    var av = aiBriefLlmAvailability();
    var w = which === "gemini" ? "gemini" : "groq";
    if (w === "groq" && !av.groq) {
      w = av.gemini ? "gemini" : "groq";
    }
    if (w === "gemini" && !av.gemini) {
      w = av.groq ? "groq" : "gemini";
    }
    hid.value = w;
    try {
      localStorage.setItem("seo-ai-llm-provider", w);
    } catch (e) {}
    root.querySelectorAll(".ai-brief-llm-btn").forEach(function (b) {
      var on = b.getAttribute("data-ai-brief-llm") === w;
      b.classList.toggle("bg-slate-900", on);
      b.classList.toggle("text-white", on);
      b.classList.toggle("dark:bg-sky-600", on);
      b.classList.toggle("shadow-sm", on);
    });
  }

  function bootAiBriefPage() {
    var av = aiBriefLlmAvailability();
    try {
      var s = localStorage.getItem("seo-ai-llm-provider");
      if (s === "gemini" && av.gemini) {
        applyAiBriefLlm("gemini");
      } else if (s === "groq" && av.groq) {
        applyAiBriefLlm("groq");
      } else {
        applyAiBriefLlm(av.groq ? "groq" : "gemini");
      }
    } catch (e) {
      applyAiBriefLlm(av.groq ? "groq" : "gemini");
    }
  }

  window.bootAiBriefPage = bootAiBriefPage;

  if (!window.__seoAiBriefLlmClickBound) {
    window.__seoAiBriefLlmClickBound = true;
    document.body.addEventListener("click", function (ev) {
      var lbtn = ev.target.closest("[data-ai-brief-llm]");
      if (!lbtn || !document.getElementById("ai-brief-view") || lbtn.disabled) {
        return;
      }
      ev.preventDefault();
      applyAiBriefLlm(lbtn.getAttribute("data-ai-brief-llm"));
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", bootAiBriefPage);
  } else {
    bootAiBriefPage();
  }

  if (!window.__seoAiBriefSubmitBound) {
    window.__seoAiBriefSubmitBound = true;
    document.body.addEventListener("submit", function (ev) {
      var form = ev.target;
      if (!form || form.id !== "ai-brief-generate-form") {
        return;
      }
      ev.preventDefault();
      if (form.getAttribute("data-ai-brief-busy") === "1") {
        return;
      }

      var view = document.getElementById("ai-brief-view");
      var wrap = document.getElementById("ai-brief-progress");
      var fill = document.getElementById("ai-brief-progress-fill");
      var pctEl = document.getElementById("ai-brief-progress-pct");
      var track = document.getElementById("ai-brief-progress-track");
      var btn = form.querySelector("button[type='submit']");

      form.setAttribute("data-ai-brief-busy", "1");
      if (btn) {
        btn.disabled = true;
      }
      if (wrap) {
        wrap.classList.remove("hidden");
      }
      if (fill) {
        fill.style.width = "0%";
      }
      if (pctEl) {
        pctEl.textContent = "0%";
      }
      if (track) {
        track.setAttribute("aria-valuenow", "0");
      }

      var start = Date.now();
      var tick = window.setInterval(function () {
        var elapsed = (Date.now() - start) / 1000;
        var asymptotic = 92 * (1 - Math.exp(-elapsed / 28));
        var p = Math.max(0, Math.min(100, Math.round(asymptotic)));
        if (fill) {
          fill.style.width = p + "%";
        }
        if (pctEl) {
          pctEl.textContent = p + "%";
        }
        if (track) {
          track.setAttribute("aria-valuenow", String(p));
        }
      }, 200);

      var url = form.getAttribute("action") || "/ai/generate";
      var fd = new FormData(form);
      fetch(url, {
        method: "POST",
        credentials: "same-origin",
        body: fd,
        headers: {
          "HX-Request": "true",
          Accept: "text/html",
        },
      })
        .then(function (res) {
          return res.text().then(function (html) {
            return { ok: res.ok, html: html };
          });
        })
        .then(function (result) {
          window.clearInterval(tick);
          if (!result.ok) {
            if (wrap) {
              wrap.classList.add("hidden");
            }
            if (fill) {
              fill.style.width = "0%";
            }
            if (pctEl) {
              pctEl.textContent = "0%";
            }
            if (track) {
              track.setAttribute("aria-valuenow", "0");
            }
            if (btn) {
              btn.disabled = false;
            }
            form.removeAttribute("data-ai-brief-busy");
            window.alert((result.html || "").trim() || "İstek başarısız oldu.");
            return;
          }
          if (fill) {
            fill.style.width = "100%";
          }
          if (pctEl) {
            pctEl.textContent = "100%";
          }
          if (track) {
            track.setAttribute("aria-valuenow", "100");
          }
          if (view && result.html) {
            var tpl = document.createElement("template");
            tpl.innerHTML = result.html.trim();
            var incoming = tpl.content.querySelector("#ai-brief-view");
            if (incoming && view.parentNode) {
              window.setTimeout(function () {
                view.parentNode.replaceChild(incoming, view);
                window.bootAiBriefPage();
              }, 180);
              return;
            }
          }
          window.location.assign("/ai");
        })
        .catch(function () {
          window.clearInterval(tick);
          if (wrap) {
            wrap.classList.add("hidden");
          }
          if (btn) {
            btn.disabled = false;
          }
          form.removeAttribute("data-ai-brief-busy");
        });
    });
  }

  if (!window.__seoAiBriefChartsBound) {
    window.__seoAiBriefChartsBound = true;

    window.renderAiBriefCharts = function (root, plotlyAttempt) {
      root = root || document.getElementById('ai-brief-view');
      var specEl = document.getElementById('ai-brief-charts-spec');
      if (!root || !specEl) {
        return;
      }
      plotlyAttempt = typeof plotlyAttempt === 'number' ? plotlyAttempt : 0;
      if (typeof Plotly === 'undefined') {
        if (plotlyAttempt < 48) {
          window.setTimeout(function () {
            window.renderAiBriefCharts(root, plotlyAttempt + 1);
          }, 80);
        }
        return;
      }
      var rows;
      try {
        rows = JSON.parse(specEl.textContent || '[]');
      } catch (e) {
        return;
      }
      if (!Array.isArray(rows) || !rows.length) {
        return;
      }
      var th = window.seoPlotlyTheme ? window.seoPlotlyTheme() : {};
      var baseLayout = {
        paper_bgcolor: th.paper || 'rgba(0,0,0,0)',
        plot_bgcolor: th.plot || 'rgba(0,0,0,0)',
        margin: { t: 8, r: 10, b: 36, l: 48 },
        font: { size: 11, color: th.tick || '#64748b' },
        showlegend: true,
        legend: { orientation: 'h', y: -0.2, font: { size: 10, color: th.legend } },
        xaxis: { gridcolor: th.grid, zeroline: false, tickfont: { size: 10, color: th.tick } },
        yaxis: { gridcolor: th.grid, zeroline: false, tickfont: { size: 10, color: th.tick } },
      };

      function shortNum(v) {
        if (v == null || v === '') {
          return '';
        }
        var n = Number(v);
        if (!isFinite(n)) {
          return '';
        }
        if (n >= 1e9) {
          return (n / 1e9).toFixed(1) + 'B';
        }
        if (n >= 1e6) {
          return (n / 1e6).toFixed(1) + 'M';
        }
        if (n >= 1e3) {
          return (n / 1e3).toFixed(1) + 'K';
        }
        return String(Math.round(n));
      }

      function barChart(el, labels, vals, color, yTitle) {
        if (!el) {
          return;
        }
        delete el.dataset.chartReady;
        if (!labels || !vals || !vals.length) {
          el.innerHTML =
            '<p class="flex h-full items-center justify-center px-2 text-center text-xs text-slate-400 dark:text-slate-500">Veri yok</p>';
          return;
        }
        var y = vals.map(function (v) {
          var n = Number(v);
          return isFinite(n) ? n : null;
        });
        if (!y.some(function (v) {
          return v != null;
        })) {
          el.innerHTML =
            '<p class="flex h-full items-center justify-center px-2 text-center text-xs text-slate-400 dark:text-slate-500">Sayısal veri yok</p>';
          return;
        }
        Plotly.purge(el);
        el.innerHTML = '';
        Plotly.newPlot(
          el,
          [
            {
              type: 'bar',
              x: labels,
              y: y,
              marker: { color: color },
              text: y.map(shortNum),
              textposition: 'outside',
            },
          ],
          Object.assign({}, baseLayout, {
            showlegend: false,
            yaxis: Object.assign({}, baseLayout.yaxis, { title: yTitle, rangemode: 'tozero' }),
          }),
          { displayModeBar: false, responsive: true }
        );
        el.dataset.chartReady = '1';
        window.requestAnimationFrame(function () {
          try {
            Plotly.Plots.resize(el);
          } catch (e1) {}
        });
      }

      rows.forEach(function (row, i) {
        var s = row.spec || {};
        var psEl = document.getElementById('ai-brief-plot-ps-' + i);
        var ga4El = document.getElementById('ai-brief-plot-ga4-' + i);
        var scC = document.getElementById('ai-brief-plot-sc-clicks-' + i);
        var scI = document.getElementById('ai-brief-plot-sc-impr-' + i);

        if (psEl) {
          delete psEl.dataset.chartReady;
          Plotly.purge(psEl);
          psEl.innerHTML = '';
          var mob = (s.pagespeed_trends && s.pagespeed_trends.mobil) || [];
          var desk = (s.pagespeed_trends && s.pagespeed_trends.masaustu) || [];
          var traces = [];
          if (mob.length) {
            traces.push({
              type: 'scatter',
              mode: 'lines+markers',
              name: 'Mobil',
              x: mob.map(function (p) {
                return p.tarih || '';
              }),
              y: mob.map(function (p) {
                var n = Number(p.deger);
                return isFinite(n) ? n : null;
              }),
              line: { width: 2, color: '#0ea5e9' },
              marker: { size: 5 },
            });
          }
          if (desk.length) {
            traces.push({
              type: 'scatter',
              mode: 'lines+markers',
              name: 'Masaüstü',
              x: desk.map(function (p) {
                return p.tarih || '';
              }),
              y: desk.map(function (p) {
                var n = Number(p.deger);
                return isFinite(n) ? n : null;
              }),
              line: { width: 2, color: '#a855f7' },
              marker: { size: 5 },
            });
          }
          traces = traces.filter(function (tr) {
            if (tr.type === 'scatter' && tr.y && tr.y.length) {
              return tr.y.some(function (v) {
                return v != null && isFinite(Number(v));
              });
            }
            return true;
          });
          if (!traces.length && s.pagespeed_bar && s.pagespeed_bar.labels) {
            var yBar = (s.pagespeed_bar.values || []).map(function (v) {
              if (v == null) {
                return null;
              }
              var n = Number(v);
              return isFinite(n) ? n : null;
            });
            if (yBar.some(function (v) {
              return v != null;
            })) {
              traces.push({
                type: 'bar',
                name: 'Güncel',
                x: s.pagespeed_bar.labels,
                y: yBar,
                marker: { color: ['#0ea5e9', '#a855f7'] },
              });
            }
          }
          if (traces.length) {
            var yaxisPs = Object.assign({}, baseLayout.yaxis, { title: 'Skor', rangemode: 'tozero' });
            if (traces[0].type === 'scatter') {
              yaxisPs.range = [0, 100];
            }
            Plotly.newPlot(
              psEl,
              traces,
              Object.assign({}, baseLayout, { yaxis: yaxisPs }),
              { displayModeBar: false, responsive: true }
            );
            psEl.dataset.chartReady = '1';
            window.requestAnimationFrame(function () {
              try {
                Plotly.Plots.resize(psEl);
              } catch (eR) {}
            });
          } else {
            psEl.innerHTML =
              '<p class="flex h-full items-center justify-center px-2 text-center text-xs text-slate-400 dark:text-slate-500">PageSpeed geçmişi yok</p>';
          }
        }

        if (ga4El) {
          delete ga4El.dataset.chartReady;
          if (s.ga4_sessions_bar && s.ga4_sessions_bar.labels && s.ga4_sessions_bar.values && s.ga4_sessions_bar.values.length) {
            var yGa = s.ga4_sessions_bar.values.map(function (v) {
              var n = Number(v);
              return isFinite(n) ? n : null;
            });
            if (!yGa.some(function (v) {
              return v != null;
            })) {
              Plotly.purge(ga4El);
              ga4El.innerHTML =
                '<p class="flex h-full items-center justify-center px-2 text-center text-xs text-slate-400 dark:text-slate-500">GA4 web oturum verisi yok</p>';
            } else {
            Plotly.purge(ga4El);
            ga4El.innerHTML = '';
            Plotly.newPlot(
              ga4El,
              [
                {
                  type: 'bar',
                  x: s.ga4_sessions_bar.labels,
                  y: yGa,
                  marker: { color: '#059669' },
                  text: yGa.map(shortNum),
                  textposition: 'outside',
                },
              ],
              Object.assign({}, baseLayout, {
                showlegend: false,
                yaxis: Object.assign({}, baseLayout.yaxis, { title: 'Oturum', rangemode: 'tozero' }),
              }),
              { displayModeBar: false, responsive: true }
            );
            ga4El.dataset.chartReady = '1';
            window.requestAnimationFrame(function () {
              try {
                Plotly.Plots.resize(ga4El);
              } catch (eG) {}
            });
            }
          } else {
            Plotly.purge(ga4El);
            ga4El.innerHTML =
              '<p class="flex h-full items-center justify-center px-2 text-center text-xs text-slate-400 dark:text-slate-500">GA4 web oturum verisi yok</p>';
          }
        }

        var scCdata = s.sc_clicks_bar;
        barChart(scC, scCdata && scCdata.labels, scCdata && scCdata.values, '#4f46e5', 'Tıklama');
        var scIdata = s.sc_impressions_bar;
        barChart(scI, scIdata && scIdata.labels, scIdata && scIdata.values, '#ea580c', 'Gösterim');
      });
      [0, 120, 320, 650, 1100].forEach(function (delayMs) {
        window.setTimeout(function () {
          if (window.relayoutAiBriefCharts) {
            window.relayoutAiBriefCharts();
          }
        }, delayMs);
      });
    };

    window.relayoutAiBriefCharts = function () {
      if (typeof Plotly === 'undefined') {
        return;
      }
      var specEl = document.getElementById('ai-brief-charts-spec');
      var rows;
      try {
        rows = JSON.parse(specEl && specEl.textContent ? specEl.textContent : '[]');
      } catch (e) {
        return;
      }
      if (!Array.isArray(rows)) {
        return;
      }
      rows.forEach(function (_, i) {
        ['ai-brief-plot-ps', 'ai-brief-plot-ga4', 'ai-brief-plot-sc-clicks', 'ai-brief-plot-sc-impr'].forEach(function (prefix) {
          var el = document.getElementById(prefix + '-' + i);
          if (el && el.dataset.chartReady === '1') {
            try {
              Plotly.Plots.resize(el);
            } catch (e2) {}
          }
        });
      });
    };

    document.addEventListener('seo-theme-change', function () {
      window.setTimeout(function () {
        if (window.relayoutAiBriefCharts) {
          window.relayoutAiBriefCharts();
        }
      }, 50);
    });
  }
  var _prevAiBriefBoot = window.bootAiBriefPage;
  if (typeof _prevAiBriefBoot === 'function') {
    window.bootAiBriefPage = function () {
      _prevAiBriefBoot();
      window.setTimeout(function () {
        if (window.renderAiBriefCharts) {
          window.renderAiBriefCharts();
        }
      }, 0);
      [280, 620, 1000].forEach(function (delayMs) {
        window.setTimeout(function () {
          if (window.relayoutAiBriefCharts) {
            window.relayoutAiBriefCharts();
          }
        }, delayMs);
      });
    };
  }
})();
</script>
<script>
  (function () {
    function redrawAiCharts() {
      if (typeof window.renderAiBriefCharts !== 'function') {
        return;
      }
      if (!document.getElementById('ai-brief-charts-spec')) {
        return;
      }
      window.setTimeout(function () {
        window.renderAiBriefCharts();
      }, 80);
      [240, 520, 900].forEach(function (delayMs) {
        window.setTimeout(function () {
          if (window.relayoutAiBriefCharts) {
            window.relayoutAiBriefCharts();
          }
        }, delayMs);
      });
    }
    window.addEventListener('load', redrawAiCharts);
    document.body.addEventListener('htmx:afterSwap', redrawAiCharts);
  })();
</script>
{% endblock %}
